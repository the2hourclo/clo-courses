<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to the Chief Leverage Officer's Community</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#131313;
  --surface-2:#181818;
  --surface-3:#1f1f1f;
  --border:#1e1e1e;
  --border-2:#2a2a2a;
  --text:#e4e5ef;
  --text-muted:#9ea3ba;
  --text-dim:#4a4d60;
  --accent:#79EA20;
  --accent-dim:rgba(121,234,32,.08);
  --accent-dim-2:rgba(121,234,32,.14);
  --accent-border:rgba(121,234,32,.35);
  --accent-text:#aff37e;
  --red:#f87171;
  --red-bg:rgba(248,113,113,.08);
  --red-border:rgba(248,113,113,.3);
  --radius:8px;
  --radius-lg:12px;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:48px 24px}

.container{max-width:1100px;margin:0 auto}

/* ── BRAND HEADER ── */
.brand-header{display:flex;align-items:center;justify-content:center;margin-bottom:48px}
.brand-logo{width:180px;height:auto;display:block;border-radius:6px}
@media(max-width:640px){.brand-header{margin-bottom:32px}.brand-logo{width:150px}body{padding:32px 16px}}

/* ── LOCK / EXPIRED SCREEN ── */
.lock-screen{max-width:480px;margin:0 auto;padding:32px;text-align:center}
.lock-screen-icon{font-size:48px;margin-bottom:16px;line-height:1}
.lock-screen h1{font-size:26px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px}
.lock-screen .lead{color:var(--text-muted);font-size:15px;margin-bottom:32px;line-height:1.6}
.lock-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.lock-form label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-align:left;text-transform:uppercase;letter-spacing:.5px}
.lock-form input{width:100%;padding:12px 14px;border:1px solid var(--border-2);border-radius:var(--radius);font-size:14px;font-family:'SF Mono','Monaco','Consolas',monospace;color:var(--text);background:var(--surface-2);outline:none;transition:border-color .2s}
.lock-form input:focus{border-color:var(--accent-border)}
.lock-form input::placeholder{color:var(--text-dim)}
.lock-form button{width:100%;padding:14px;background:var(--accent);color:var(--bg);border:none;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;transition:opacity .2s}
.lock-form button:hover{opacity:.9}
.lock-form button:disabled{opacity:.4;cursor:not-allowed}
.lock-error{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:12px;text-align:left;display:none}
.lock-error.show{display:block}
.lock-hint{font-size:13px;color:var(--text-dim);margin-top:14px}
.lock-hint a{color:var(--accent);text-decoration:none;font-weight:600}
.lock-hint a:hover{text-decoration:underline}

/* ── INTRO ── */
.intro{text-align:center;margin-bottom:48px}
.intro-thanks{font-size:15px;color:var(--text-muted);margin-bottom:14px}
.intro-thanks strong{color:var(--text);font-weight:600}
.intro h1{font-size:34px;font-weight:700;letter-spacing:-.6px;line-height:1.15;color:var(--text)}
@media(max-width:640px){.intro h1{font-size:26px}}

/* ── LICENSE DISPLAY BANNER ── */
.license-display-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
.license-display-card-label{font-size:12px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.license-display-card-value{font-family:'SF Mono','Monaco','Consolas',monospace;font-size:12px;color:var(--text);background:var(--surface-2);padding:6px 10px;border-radius:4px;border:1px solid var(--border-2);word-break:break-all}

/* ── CARDS ── */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
@media(max-width:900px){.cards{grid-template-columns:1fr;gap:16px}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px 22px;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;transition:border-color .2s}
.card:hover{border-color:var(--border-2)}
.card-num{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--bg);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}
.card-visual{background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius);padding:20px;margin-bottom:20px;width:100%;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:13px;color:var(--text-muted)}
.card-visual-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);margin-bottom:10px}
.card-visual code{display:block;font-family:'SF Mono','Monaco','Consolas',monospace;font-size:11px;color:var(--accent);background:#0a0a0a;border:1px solid var(--border);padding:8px 10px;border-radius:4px;margin:3px 0;width:100%;text-align:left;word-break:break-all;position:relative;padding-right:54px}
.copy-btn{position:absolute;top:50%;right:5px;transform:translateY(-50%);background:var(--surface);border:1px solid var(--border-2);color:var(--text-muted);font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--accent-dim);color:var(--accent);border-color:var(--accent-border)}
.copy-btn.copied{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.card-visual-logo{font-size:30px;font-weight:700;color:var(--accent);letter-spacing:-1px}
.card-visual-img{width:150px;height:150px;object-fit:contain;display:block;border-radius:6px}
.card-visual-sub{margin-top:10px;font-size:11px;color:var(--text-dim);font-weight:500;letter-spacing:.3px}

/* ── POLYNET COMMUNITY PREVIEW (card 1) ── */
.polynet-card{padding:0;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);position:relative;display:flex;flex-direction:column;align-items:stretch;text-align:left}
.polynet-card .card-num{top:-14px;left:50%;transform:translateX(-50%)}
.polynet-preview{padding:24px 22px 18px;display:flex;flex-direction:column;align-items:flex-start}
.polynet-logo{width:56px;height:56px;object-fit:contain;border-radius:8px;background:var(--surface-2);padding:6px;margin-bottom:14px;border:1px solid var(--border-2)}
.polynet-name{font-size:17px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.2}
.polynet-handle{font-size:12px;color:var(--text-dim);margin-bottom:14px}
.polynet-mission{font-size:13px;color:var(--text-muted);line-height:1.55;margin-bottom:18px;font-style:normal}
.polynet-cta{display:block;width:100%;padding:13px;background:#fff;color:#000;border-radius:8px;text-decoration:none;font-size:14px;font-weight:700;text-align:center;transition:opacity .2s}
.polynet-cta:hover{opacity:.88}
.polynet-footer{margin-top:12px;font-size:11px;color:var(--text-dim);text-align:center;width:100%}
.card-visual-sub{margin-top:14px;font-size:12px;color:var(--text-dim);font-weight:500}
.card-action{font-size:17px;font-weight:600;margin-bottom:10px;color:var(--text);line-height:1.4}
.card-action .pill{color:var(--accent)}
.card-action a{color:var(--accent);text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.card-action a:hover{opacity:.85}
.card-caption{font-size:13px;color:var(--text-muted);line-height:1.55}

/* ── BODY BLOCK ── */
.body-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:32px;margin-bottom:32px}
.body-block-headline{font-weight:700;color:var(--text);text-align:center;margin-bottom:20px;font-size:17px}
.body-block p{margin-bottom:16px;color:var(--text-muted);font-size:14.5px;line-height:1.7}
.body-block p:last-of-type{margin-bottom:0}
.body-block strong{color:var(--text);font-weight:700}

.cta-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:24px}
.cta{padding:13px 26px;border-radius:var(--radius);font-size:14px;font-weight:600;text-decoration:none;display:inline-block;transition:all .2s;cursor:pointer;border:1px solid var(--border-2)}
.cta-outline{background:transparent;color:var(--text)}
.cta-outline:hover{background:var(--surface-2);border-color:var(--accent-border)}
.cta-solid{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
.cta-solid:hover{opacity:.9}

/* ── FOOTER ── */
.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.footer a{color:var(--accent);text-decoration:none}
.footer-logout{margin-left:12px;cursor:pointer;color:var(--text-dim);background:none;border:none;font-size:13px;text-decoration:underline;font-family:inherit}
.footer-logout:hover{color:var(--text-muted)}

/* ── LOADING ── */
.loading-screen{text-align:center;padding:128px 32px;color:var(--text-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Verifying your access…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const PRODUCT = {
  name: 'CLO Community',
  store_id: 10600,
  product_id: 926993,
  variant_id: 1457440,
  checkout_url: 'https://chiefleverageofficer.lemonsqueezy.com/checkout/buy/14c15890-c46a-4ab8-ab8d-9e56cd04d38a',
  skillstack_slug: 'clo-community'
};
const STORAGE_KEY = 'clo_community_license';

// ══════════════════════════════════════════════════════
// INIT — runs on every page load
// ══════════════════════════════════════════════════════
const app = document.getElementById('app');

(async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  let licenseKey = urlParams.get('license_key');

  // Visual preview bypass — design review only, skips LS validation
  if (urlParams.get('preview') === 'YES') {
    return renderUnlocked('PREVIEW-MODE-FAKE-KEY-XXXX-XXXXXXXXXXXX');
  }

  if (!licenseKey) {
    licenseKey = localStorage.getItem(STORAGE_KEY);
  }

  if (!licenseKey) {
    return renderLocked();
  }

  const result = await validateLicense(licenseKey);

  if (!result.ok) {
    localStorage.removeItem(STORAGE_KEY);
    if (result.reason === 'expired') {
      return renderExpired();
    }
    return renderLocked(result.message);
  }

  localStorage.setItem(STORAGE_KEY, licenseKey);
  if (urlParams.has('license_key')) {
    history.replaceState(null, '', window.location.pathname);
  }
  renderUnlocked(licenseKey);
})();

// ══════════════════════════════════════════════════════
// LICENSE VALIDATION
// ══════════════════════════════════════════════════════
async function validateLicense(licenseKey) {
  try {
    const res = await fetch('https://api.lemonsqueezy.com/v1/licenses/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: licenseKey })
    });
    const data = await res.json();

    if (!data.valid) {
      const status = data.license_key?.status;
      if (status === 'expired' || status === 'disabled' || status === 'inactive') {
        return { ok: false, reason: 'expired' };
      }
      return { ok: false, reason: 'invalid', message: data.error || 'Invalid license key.' };
    }

    if (data.meta?.store_id !== PRODUCT.store_id || data.meta?.product_id !== PRODUCT.product_id) {
      return { ok: false, reason: 'wrong_product', message: 'This license is for a different product.' };
    }

    if (PRODUCT.variant_id && data.meta?.variant_id !== PRODUCT.variant_id) {
      return { ok: false, reason: 'wrong_variant', message: 'This license is for a different subscription tier.' };
    }

    if (data.license_key?.status && data.license_key.status !== 'active') {
      return { ok: false, reason: 'expired' };
    }

    return { ok: true, meta: data.meta, license_key: data.license_key };
  } catch (err) {
    return { ok: false, reason: 'network', message: 'Could not reach the license server. Check your connection and try again.' };
  }
}

// ══════════════════════════════════════════════════════
// LOCKED STATE
// ══════════════════════════════════════════════════════
function renderLocked(errorMessage) {
  app.innerHTML = `
    <div class="brand-header">
      <img class="brand-logo" src="assets/clo-logo-full.png" alt="Chief Leverage Officer">
    </div>
    <div class="lock-screen">
      <div class="lock-screen-icon">🔒</div>
      <h1>The Chief Leverage Officer's Community</h1>
      <p class="lead">Enter your license key to unlock the onboarding course.</p>

      <form class="lock-form" id="unlockForm">
        <label for="licenseInput">License key</label>
        <input type="text" id="licenseInput" placeholder="XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX" required autofocus>
        <button type="submit" id="unlockBtn">Unlock Course</button>
        <div class="lock-error ${errorMessage ? 'show' : ''}" id="lockError">${errorMessage || ''}</div>
      </form>

      <div class="lock-hint">Find your license key in your purchase confirmation email.</div>
      <div class="lock-hint">No license yet? <a href="${PRODUCT.checkout_url}" target="_blank">Join the community →</a></div>
    </div>
    <div class="footer">Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a></div>
  `;
  document.getElementById('unlockForm').addEventListener('submit', handleUnlock);
}

async function handleUnlock(e) {
  e.preventDefault();
  const licenseKey = document.getElementById('licenseInput').value.trim();
  const errorEl = document.getElementById('lockError');
  const btn = document.getElementById('unlockBtn');
  if (!licenseKey) return;

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errorEl.classList.remove('show');

  const result = await validateLicense(licenseKey);

  if (!result.ok) {
    btn.disabled = false;
    btn.textContent = 'Unlock Course';
    errorEl.textContent = result.reason === 'expired'
      ? 'This license has expired. Renew your subscription to regain access.'
      : (result.message || 'Could not verify license. Check the key and try again.');
    errorEl.classList.add('show');
    return;
  }

  localStorage.setItem(STORAGE_KEY, licenseKey);
  renderUnlocked(licenseKey);
}

// ══════════════════════════════════════════════════════
// EXPIRED STATE
// ══════════════════════════════════════════════════════
function renderExpired() {
  app.innerHTML = `
    <div class="brand-header">
      <img class="brand-logo" src="assets/clo-logo-full.png" alt="Chief Leverage Officer">
    </div>
    <div class="lock-screen">
      <div class="lock-screen-icon">⏱</div>
      <h1>Your subscription has ended</h1>
      <p class="lead">This license is no longer active. Renew to regain access to the course, the community, and the clo-community plugin.</p>
      <a href="${PRODUCT.checkout_url}" target="_blank" class="cta cta-solid" style="display:inline-block">Renew Subscription</a>
      <div class="lock-hint" style="margin-top:32px">Already renewed? <button class="footer-logout" onclick="location.reload()">Reload page</button></div>
    </div>
    <div class="footer">Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a></div>
  `;
}

// ══════════════════════════════════════════════════════
// UNLOCKED STATE
// ══════════════════════════════════════════════════════
function renderUnlocked(licenseKey) {
  app.innerHTML = `
    <div class="brand-header">
      <img class="brand-logo" src="assets/clo-logo-full.png" alt="Chief Leverage Officer">
    </div>

    <div class="intro">
      <div class="intro-thanks">Welcome to <strong>the Chief Leverage Officer's Community</strong>.</div>
      <h1>Just a few steps to get you onboarded.</h1>
    </div>

    <div class="license-display-card">
      <span class="license-display-card-label">Your license:</span>
      <span class="license-display-card-value" id="licenseDisplay">${licenseKey}</span>
      <button class="copy-btn" data-copy-target="licenseDisplay" style="position:static;transform:none">Copy</button>
    </div>

    <div class="cards">

      <div class="card polynet-card">
        <div class="card-num">1</div>
        <div class="polynet-preview">
          <img class="polynet-logo" src="assets/clo-logo-full.png" alt="Chief Leverage Officer">
          <div class="polynet-name">Chief Leverage Officers</div>
          <div class="polynet-handle">c/chief-leverage-officers</div>
          <p class="polynet-mission">Mission: Build digital assets and employ AI Employees to do 80-90% of the work for us.</p>
          <a class="polynet-cta" href="https://www.polynet.ai/c/chief-leverage-officers" target="_blank">Enter community</a>
          <div class="polynet-footer">Powered by Polynet</div>
        </div>
        <div class="card-caption" style="padding:0 22px 22px;text-align:center">Once you're in, <strong style="color:var(--text)">watch the onboarding module</strong> to get started with Claude Code.</div>
      </div>

      <div class="card">
        <div class="card-num">2</div>
        <div class="card-visual">
          <div class="card-visual-label">In Claude Code, run:</div>
          <code><span id="cmd1">/plugin marketplace add https://github.com/SkillStacks/skillstack.git</span><button class="copy-btn" data-copy-target="cmd1">Copy</button></code>
          <code><span id="cmd2">/plugin install ${PRODUCT.skillstack_slug}@skillstack-marketplace</span><button class="copy-btn" data-copy-target="cmd2">Copy</button></code>
          <code><span id="cmd3">/restart</span><button class="copy-btn" data-copy-target="cmd3">Copy</button></code>
          <code><span id="cmd4">/activate-license</span><button class="copy-btn" data-copy-target="cmd4">Copy</button></code>
        </div>
        <div class="card-action">Install <span class="pill">clo-community</span> in Claude Code</div>
        <div class="card-caption">Run these commands, paste your license when /activate-license prompts you.</div>
      </div>

      <div class="card">
        <div class="card-num">3</div>
        <div class="card-visual">
          <div class="card-visual-label">Once installed, run:</div>
          <code><span id="cmd5">onboard me</span><button class="copy-btn" data-copy-target="cmd5">Copy</button></code>
          <div style="margin-top:12px;font-size:12px;color:var(--text-dim);text-align:left;width:100%;line-height:1.5">Scaffolds your workspace, runs your Business X-Ray, fills in your digital assets, builds your first AI Employee.</div>
        </div>
        <div class="card-action">Run <span class="pill">/onboard</span> in Claude Code</div>
        <div class="card-caption">Takes ~30 minutes. End state: a workspace configured for YOUR business.</div>
      </div>

    </div>

    <div class="body-block">
      <div class="body-block-headline">Once you're done with these 3 steps, you've officially been onboarded.</div>
      <p>Next step is <strong>booking your onboarding call with me (Rashid)</strong>, where we'll visually map out your business, identify the bottleneck slowing growth, and assemble a 90-day plan of action — which Digital Assets to build first, which AI Employees to deploy, and which workflows to compound on.</p>
      <p>So we can leverage our time best before the call, you'll do an <strong>AI-Assisted Guided Audit of Your Business</strong> using the Business X-Ray skill. That way we walk into the call with your bottlenecks already surfaced and your highest-leverage projects already mapped — instead of spending the first 30 minutes on background. We get straight to building your roadmap.</p>
      <p>This takes about 30 minutes of your time. Set it aside, run through it, then book the call. If you get stuck or have questions, message me in the Polynet community.</p>
      <div class="cta-row">
        <a class="cta cta-outline" href="#">Run the Business X-Ray Audit</a>
        <a class="cta cta-solid" href="#">Book Your Onboarding Call</a>
      </div>
    </div>

    <div class="footer">
      Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a>
      <button class="footer-logout" onclick="signOut()">Sign out</button>
    </div>
  `;
  wireCopyButtons();
}

// ══════════════════════════════════════════════════════
// SHARED UTILITIES
// ══════════════════════════════════════════════════════
function wireCopyButtons() {
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.copyTarget;
      if (!target) return;
      const text = document.getElementById(target).textContent.trim();
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1400);
      });
    });
  });
}

function signOut() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
</script>

</body>
</html>
