<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to the Chief Leverage Officer's Community</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf7;
  --surface:#ffffff;
  --green-card:#d4f0c8;
  --green-card-border:#a8d090;
  --green-accent:#4a8a2e;
  --green-cta:#5cb33e;
  --green-cta-hover:#4a9a2e;
  --text:#1a1a1a;
  --text-muted:#555;
  --text-dim:#888;
  --border:#e5e5e0;
  --red:#c44d4d;
  --red-bg:#fdecec;
  --radius:12px;
  --radius-sm:8px;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding:48px 24px}

.container{max-width:1100px;margin:0 auto}

/* ── BRAND HEADER (shown on every state) ── */
.brand-header{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:48px}
.brand-mark{width:44px;height:44px;background:var(--green-cta);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;letter-spacing:-.5px}
.brand-text{font-size:18px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.brand-text-sub{color:var(--text-muted);font-weight:500;margin-left:4px}
@media(max-width:640px){.brand-header{margin-bottom:32px}.brand-text{font-size:16px}}

/* ── LOCK / EXPIRED SCREEN ── */
.lock-screen{max-width:480px;margin:0 auto;padding:64px 32px;text-align:center}
.lock-screen-icon{font-size:48px;margin-bottom:16px;line-height:1}
.lock-screen h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px}
.lock-screen .lead{color:var(--text-muted);font-size:15px;margin-bottom:32px;line-height:1.6}
.lock-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
.lock-form label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px;text-align:left}
.lock-form input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'SF Mono','Monaco','Consolas',monospace;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s}
.lock-form input:focus{border-color:var(--green-cta)}
.lock-form button{width:100%;padding:14px;background:var(--green-cta);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
.lock-form button:hover{background:var(--green-cta-hover)}
.lock-form button:disabled{opacity:.5;cursor:not-allowed}
.lock-error{background:var(--red-bg);border:1px solid var(--red);color:var(--red);padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-top:12px;text-align:left;display:none}
.lock-error.show{display:block}
.lock-hint{font-size:13px;color:var(--text-dim);margin-top:16px}
.lock-hint a{color:var(--green-accent);text-decoration:none;font-weight:600}
.expired .lock-screen-icon{color:var(--red)}

/* ── UNLOCKED COURSE CONTENT ── */
.intro{text-align:center;margin-bottom:48px}
.intro-thanks{font-size:16px;color:var(--text-muted);margin-bottom:16px}
.intro-thanks strong{color:var(--text);font-weight:600}
.intro h1{font-size:36px;font-weight:700;letter-spacing:-.5px;line-height:1.2}
@media(max-width:640px){.intro h1{font-size:28px}body{padding:32px 16px}}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px}
@media(max-width:900px){.cards{grid-template-columns:1fr;gap:16px}}

.card{background:var(--green-card);border:1px solid var(--green-card-border);border-radius:var(--radius);padding:32px 24px;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center}
.card-num{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--green-card);border:1px solid var(--green-card-border);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text)}
.card-visual{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;margin-bottom:20px;width:100%;min-height:180px;display:flex;flex-direction:column;justify-content:center;align-items:center;font-size:13px;color:var(--text-muted);position:relative}
.card-visual-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:10px}
.card-visual code{display:block;font-family:'SF Mono','Monaco','Consolas',monospace;font-size:11px;color:var(--green-accent);background:#f5f5f0;padding:8px 10px;border-radius:4px;margin:2px 0;width:100%;text-align:left;word-break:break-all;position:relative;padding-right:54px}
.copy-btn{position:absolute;top:50%;right:6px;transform:translateY(-50%);background:#fff;border:1px solid var(--border);color:var(--text-muted);font-size:10px;font-weight:600;padding:3px 8px;border-radius:3px;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--green-card);color:var(--green-accent);border-color:var(--green-card-border)}
.copy-btn.copied{background:var(--green-cta);color:#fff;border-color:var(--green-cta)}
.card-visual-logo{font-size:32px;font-weight:700;color:var(--green-accent);letter-spacing:-1px}
.card-action{font-size:18px;font-weight:600;margin-bottom:10px;color:var(--text)}
.card-action a{color:var(--green-accent);text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.card-action a:hover{color:var(--green-cta-hover)}
.card-caption{font-size:14px;font-style:italic;color:var(--text-muted);line-height:1.5}

.license-display-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
.license-display-card-label{font-size:13px;color:var(--text-muted);font-weight:600}
.license-display-card-value{font-family:'SF Mono','Monaco','Consolas',monospace;font-size:13px;color:var(--text);background:var(--bg);padding:6px 10px;border-radius:4px;border:1px dashed var(--border);word-break:break-all}

.body-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:32px}
.body-block-headline{font-weight:700;color:var(--text);text-align:center;margin-bottom:20px;font-size:18px}
.body-block p{margin-bottom:16px;color:var(--text);font-size:15px;line-height:1.7}
.body-block p:last-of-type{margin-bottom:0}
.body-block strong{color:var(--text);font-weight:700}

.cta-row{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-top:24px}
.cta{padding:14px 28px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;text-decoration:none;display:inline-block;transition:all .2s;cursor:pointer;border:2px solid var(--green-cta)}
.cta-outline{background:transparent;color:var(--text)}
.cta-outline:hover{background:var(--surface)}
.cta-solid{background:var(--green-cta);color:#fff;border-color:var(--green-cta)}
.cta-solid:hover{background:var(--green-cta-hover);border-color:var(--green-cta-hover)}

.footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.footer a{color:var(--green-accent);text-decoration:none}
.footer-logout{margin-left:12px;cursor:pointer;color:var(--text-dim);background:none;border:none;font-size:13px;text-decoration:underline}
.footer-logout:hover{color:var(--text)}

.loading-screen{text-align:center;padding:128px 32px;color:var(--text-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--green-cta);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="container" id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div>Verifying your access…</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const PRODUCT = {
  name: 'CLO Community',
  store_id: 10600,
  product_id: 926993,
  variant_id: 1457440,
  checkout_url: 'https://chiefleverageofficer.lemonsqueezy.com/checkout/buy/14c15890-c46a-4ab8-ab8d-9e56cd04d38a',
  skillstack_slug: 'clo-community'
};
const STORAGE_KEY = 'clo_community_license';

// ══════════════════════════════════════════════════════
// INIT — runs on every page load
// ══════════════════════════════════════════════════════
const app = document.getElementById('app');

(async function init() {
  // 1. Try URL param first, fall back to localStorage
  const urlParams = new URLSearchParams(window.location.search);
  let licenseKey = urlParams.get('license_key');

  // Visual preview bypass — skips LS validation, renders unlocked state with dummy key.
  // Use: ?preview=YES (case-sensitive). For design review only — does NOT test the real flow.
  if (urlParams.get('preview') === 'YES') {
    return renderUnlocked('PREVIEW-MODE-FAKE-KEY-XXXX-XXXXXXXXXXXX');
  }

  if (!licenseKey) {
    licenseKey = localStorage.getItem(STORAGE_KEY);
  }

  // 2. No license at all — show locked screen
  if (!licenseKey) {
    return renderLocked();
  }

  // 3. Validate against Lemon Squeezy on every load
  const result = await validateLicense(licenseKey);

  if (!result.ok) {
    // Validation failed — wipe stored key, show appropriate state
    localStorage.removeItem(STORAGE_KEY);
    if (result.reason === 'expired') {
      return renderExpired();
    }
    return renderLocked(result.message);
  }

  // 4. Valid — cache + render unlocked content
  localStorage.setItem(STORAGE_KEY, licenseKey);
  // Strip license_key from URL so it doesn't leak in shared screenshots
  if (urlParams.has('license_key')) {
    history.replaceState(null, '', window.location.pathname);
  }
  renderUnlocked(licenseKey);
})();

// ══════════════════════════════════════════════════════
// LICENSE VALIDATION
// ══════════════════════════════════════════════════════
async function validateLicense(licenseKey) {
  try {
    const res = await fetch('https://api.lemonsqueezy.com/v1/licenses/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: licenseKey })
    });
    const data = await res.json();

    if (!data.valid) {
      // Could be expired, disabled, never existed — LS lumps these together
      const status = data.license_key?.status;
      if (status === 'expired' || status === 'disabled' || status === 'inactive') {
        return { ok: false, reason: 'expired' };
      }
      return { ok: false, reason: 'invalid', message: data.error || 'Invalid license key.' };
    }

    // Cross-check it's for THIS product AND variant
    if (data.meta?.store_id !== PRODUCT.store_id || data.meta?.product_id !== PRODUCT.product_id) {
      return { ok: false, reason: 'wrong_product', message: 'This license is for a different product.' };
    }
    if (PRODUCT.variant_id && data.meta?.variant_id !== PRODUCT.variant_id) {
      return { ok: false, reason: 'wrong_variant', message: 'This license is for a different subscription tier.' };
    }

    // Status check — subscription cancelled = no access
    if (data.license_key?.status && data.license_key.status !== 'active') {
      return { ok: false, reason: 'expired' };
    }

    return { ok: true, meta: data.meta, license_key: data.license_key };
  } catch (err) {
    return { ok: false, reason: 'network', message: 'Could not reach the license server. Check your connection and try again.' };
  }
}

// ══════════════════════════════════════════════════════
// LOCKED STATE — no license / invalid
// ══════════════════════════════════════════════════════
function renderLocked(errorMessage) {
  app.innerHTML = `
    <div class="brand-header">
      <div class="brand-mark">CLO</div>
      <div class="brand-text">Chief Leverage Officer<span class="brand-text-sub"> · Community</span></div>
    </div>
    <div class="lock-screen">
      <div class="lock-screen-icon">🔒</div>
      <h1>The Chief Leverage Officer's Community</h1>
      <p class="lead">Enter your license key to unlock the onboarding course.</p>

      <form class="lock-form" id="unlockForm">
        <label for="licenseInput">License key</label>
        <input type="text" id="licenseInput" placeholder="XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX" required autofocus>
        <button type="submit" id="unlockBtn">Unlock Course</button>
        <div class="lock-error ${errorMessage ? 'show' : ''}" id="lockError">${errorMessage || ''}</div>
      </form>

      <div class="lock-hint">Find your license key in your purchase confirmation email.</div>
      <div class="lock-hint">No license yet? <a href="${PRODUCT.checkout_url}" target="_blank">Join the community →</a></div>
    </div>
    <div class="footer">Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a></div>
  `;
  document.getElementById('unlockForm').addEventListener('submit', handleUnlock);
}

async function handleUnlock(e) {
  e.preventDefault();
  const licenseKey = document.getElementById('licenseInput').value.trim();
  const errorEl = document.getElementById('lockError');
  const btn = document.getElementById('unlockBtn');
  if (!licenseKey) return;

  btn.disabled = true;
  btn.textContent = 'Verifying…';
  errorEl.classList.remove('show');

  const result = await validateLicense(licenseKey);

  if (!result.ok) {
    btn.disabled = false;
    btn.textContent = 'Unlock Course';
    errorEl.textContent = result.reason === 'expired'
      ? 'This license has expired. Renew your subscription to regain access.'
      : (result.message || 'Could not verify license. Check the key and try again.');
    errorEl.classList.add('show');
    return;
  }

  localStorage.setItem(STORAGE_KEY, licenseKey);
  renderUnlocked(licenseKey);
}

// ══════════════════════════════════════════════════════
// EXPIRED STATE — license once valid, now expired/cancelled
// ══════════════════════════════════════════════════════
function renderExpired() {
  app.innerHTML = `
    <div class="brand-header">
      <div class="brand-mark">CLO</div>
      <div class="brand-text">Chief Leverage Officer<span class="brand-text-sub"> · Community</span></div>
    </div>
    <div class="lock-screen expired">
      <div class="lock-screen-icon">⏱</div>
      <h1>Your subscription has ended</h1>
      <p class="lead">This license is no longer active. Renew to regain access to the course, the community, and the clo-community plugin.</p>

      <a href="${PRODUCT.checkout_url}" target="_blank" class="cta cta-solid" style="display:inline-block">Renew Subscription</a>

      <div class="lock-hint" style="margin-top:32px">Already renewed? <button class="footer-logout" onclick="location.reload()">Reload page</button></div>
    </div>
    <div class="footer">Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a></div>
  `;
}

// ══════════════════════════════════════════════════════
// UNLOCKED STATE — valid license, full course content
// ══════════════════════════════════════════════════════
function renderUnlocked(licenseKey) {
  app.innerHTML = `
    <div class="brand-header">
      <div class="brand-mark">CLO</div>
      <div class="brand-text">Chief Leverage Officer<span class="brand-text-sub"> · Community</span></div>
    </div>
    <div class="intro">
      <div class="intro-thanks">Welcome to <strong>the Chief Leverage Officer's Community</strong>.</div>
      <h1>Just a few steps to get you onboarded.</h1>
    </div>

    <div class="license-display-card">
      <span class="license-display-card-label">Your license:</span>
      <span class="license-display-card-value" id="licenseDisplay">${licenseKey}</span>
      <button class="copy-btn" data-copy-target="licenseDisplay" style="position:static;transform:none">Copy</button>
    </div>

    <div class="cards">

      <div class="card">
        <div class="card-num">1</div>
        <div class="card-visual">
          <div class="card-visual-label">In Claude Code, run:</div>
          <code><span id="cmd1">/plugin marketplace add https://github.com/SkillStacks/skillstack.git</span><button class="copy-btn" data-copy-target="cmd1">Copy</button></code>
          <code><span id="cmd2">/plugin install ${PRODUCT.skillstack_slug}@skillstack-marketplace</span><button class="copy-btn" data-copy-target="cmd2">Copy</button></code>
          <code><span id="cmd3">/restart</span><button class="copy-btn" data-copy-target="cmd3">Copy</button></code>
          <code><span id="cmd4">/activate-license</span><button class="copy-btn" data-copy-target="cmd4">Copy</button></code>
        </div>
        <div class="card-action">Install <span style="color:var(--green-accent)">clo-community</span> in Claude Code</div>
        <div class="card-caption">Run these commands, paste your license when /activate-license prompts you.</div>
      </div>

      <div class="card">
        <div class="card-num">2</div>
        <div class="card-visual">
          <div class="card-visual-logo">Polynet</div>
          <div style="margin-top:8px;font-size:12px;color:var(--text-dim)">Chief Leverage Officers</div>
        </div>
        <div class="card-action">Join the <a href="https://www.polynet.ai/c/chief-leverage-officers" target="_blank">Chief Leverage Officers community</a></div>
        <div class="card-caption">Where I post updates, host live calls, and other members share what's working.</div>
      </div>

      <div class="card">
        <div class="card-num">3</div>
        <div class="card-visual">
          <div class="card-visual-label">Once installed, run:</div>
          <code><span id="cmd5">onboard me</span><button class="copy-btn" data-copy-target="cmd5">Copy</button></code>
          <div style="margin-top:12px;font-size:12px;color:var(--text-dim);text-align:left;width:100%">Scaffolds your workspace, runs your Business X-Ray, fills in your digital assets, builds your first AI Employee.</div>
        </div>
        <div class="card-action">Run <span style="color:var(--green-accent)">/onboard in Claude Code</span></div>
        <div class="card-caption">Takes ~30 minutes. End state: a workspace configured for YOUR business.</div>
      </div>

    </div>

    <div class="body-block">
      <div class="body-block-headline">Once you're done with these 3 steps, you've officially been onboarded.</div>
      <p>Next step is <strong>booking your onboarding call with me (Rashid)</strong>, where we'll visually map out your business, identify the bottleneck slowing growth, and assemble a 90-day plan of action — which Digital Assets to build first, which AI Employees to deploy, and which workflows to compound on.</p>
      <p>So we can leverage our time best before the call, you'll do an <strong>AI-Assisted Guided Audit of Your Business</strong> using the Business X-Ray skill. That way we walk into the call with your bottlenecks already surfaced and your highest-leverage projects already mapped — instead of spending the first 30 minutes on background. We get straight to building your roadmap.</p>
      <p>This takes about 30 minutes of your time. Set it aside, run through it, then book the call. If you get stuck or have questions, message me in the Polynet community.</p>
      <div class="cta-row">
        <a class="cta cta-outline" href="#">Run the Business X-Ray Audit</a>
        <a class="cta cta-solid" href="#">Book Your Onboarding Call</a>
      </div>
    </div>

    <div class="footer">
      Questions? Email <a href="mailto:rashid@thepeakperformer.io">rashid@thepeakperformer.io</a>
      <button class="footer-logout" onclick="signOut()">Sign out</button>
    </div>
  `;
  wireCopyButtons();
}

// ══════════════════════════════════════════════════════
// SHARED UTILITIES
// ══════════════════════════════════════════════════════
function wireCopyButtons() {
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.copyTarget;
      if (!target) return;
      const text = document.getElementById(target).textContent.trim();
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1400);
      });
    });
  });
}

function signOut() {
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}
</script>

</body>
</html>
