<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Business X-Ray Skill — Interactive Course</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d0d;--surface:#131313;--surface-2:#181818;--surface-3:#1f1f1f;
--border:#1e1e1e;--border-2:#2a2a2a;--border-3:#333;
--text:#e4e5ef;--text-muted:#9ea3ba;--text-dim:#4a4d60;
--accent:#79EA20;--accent-dim:rgba(121,234,32,.12);--accent-border:rgba(121,234,32,.35);
--ann-red:#FF6B6B;--ann-orange:#FFA500;--ann-green:#90EE90;--ann-purple:#9370DB;
--score-green:#4ade80;--score-green-bg:rgba(74,222,128,.08);
--score-yellow:#fde68a;--score-yellow-bg:rgba(253,230,138,.08);
--score-red:#f87171;--score-red-bg:rgba(248,113,113,.08);
--tier-critical:#FF6B6B;--tier-important:#FFA500;--tier-secondary:#4a4d60;
--sidebar-w:260px;--radius:8px;--radius-lg:12px;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* ===== HEADER ===== */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--bg)}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-sub{color:var(--text-muted);font-size:13px;margin-left:8px}
.progress-wrap{display:flex;align-items:center;gap:12px}
.progress-text{font-size:12px;color:var(--text-muted);white-space:nowrap}
.progress-bar{width:160px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.menu-btn{display:none;width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:18px}

/* ===== LAYOUT ===== */
.app{display:flex;flex:1;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;flex-shrink:0;padding:16px 0;display:flex;flex-direction:column}
.sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);padding:0 16px;margin-bottom:8px;margin-top:16px}
.sidebar-label:first-child{margin-top:0}
.lesson-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;font-size:13px;color:var(--text-muted)}
.lesson-item:hover{background:var(--surface-2)}
.lesson-item.active{background:var(--accent-dim);border-left-color:var(--accent);color:var(--text)}
.lesson-item.completed{color:var(--text-muted)}
.lesson-item.completed .lesson-check{color:var(--accent)}
.lesson-check{width:20px;height:20px;border:2px solid var(--border-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.lesson-item.completed .lesson-check{border-color:var(--accent);background:var(--accent-dim)}
.lesson-item.active .lesson-check{border-color:var(--accent)}
.lesson-name{flex:1}
.lesson-hint{display:none;font-size:10px;color:var(--text-dim);padding:4px 16px 8px 48px;line-height:1.4}

/* ===== MAIN CONTENT ===== */
.main{flex:1;overflow-y:auto;padding:40px;max-width:900px;margin:0 auto;width:100%}
.lesson{display:none;animation:fadeIn .3s ease}
.lesson.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ===== LESSON COMMON ===== */
.lesson-header{margin-bottom:32px}
.lesson-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px}
.lesson h2{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.lesson .subtitle{color:var(--text-muted);font-size:15px;max-width:640px}
h3{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:8px}
h4{font-size:16px;font-weight:600;margin-bottom:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;transition:all .25s}
.card:hover{border-color:var(--border-2)}
.callout{background:var(--surface-2);border-left:3px solid var(--accent);padding:16px 20px;border-radius:0 var(--radius) var(--radius) 0;margin:24px 0;font-size:14px;color:var(--text-muted)}
.callout strong{color:var(--text)}
.spacer{height:32px}

/* ===== NAVIGATION FOOTER ===== */
.lesson-footer{display:flex;align-items:center;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border)}
.nav-btn{padding:10px 20px;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;border:1px solid var(--border);background:var(--surface);color:var(--text-muted)}
.nav-btn:hover{border-color:var(--border-2);color:var(--text)}
.nav-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.nav-btn.primary:hover{opacity:.9}
.nav-btn.disabled{opacity:.3;pointer-events:none}
.complete-check{display:none}
.mark-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.3px;border:1.5px solid var(--border-2);background:transparent;color:var(--text-muted);transition:all .25s;user-select:none}
.mark-btn:hover{border-color:var(--accent-border);color:var(--text);background:var(--accent-dim)}
.mark-btn.done{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.mark-btn .mark-icon{width:18px;height:18px;border:1.5px solid currentColor;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .25s}
.mark-btn.done .mark-icon{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* ===== SKIP BANNER ===== */
.skip-banner{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:24px;font-size:13px;color:var(--text-muted);display:flex;align-items:center;gap:8px}
.skip-banner .skip-icon{color:var(--ann-orange);font-size:16px}

/* ===== SETUP PATHS ===== */
.setup-paths{display:flex;flex-direction:column;gap:12px;margin:24px 0}
.setup-path{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.setup-path-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;background:var(--surface);transition:background .2s}
.setup-path-header:hover{background:var(--surface-2)}
.setup-path-header h4{margin:0;font-size:15px}
.setup-path-badge{font-size:10px;font-weight:600;text-transform:uppercase;padding:3px 10px;border-radius:12px;letter-spacing:.5px}
.setup-path-badge.rec{color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}
.setup-path-badge.alt{color:var(--text-dim);background:var(--surface-2);border:1px solid var(--border)}
.setup-path-chevron{color:var(--text-dim);transition:transform .2s}
.setup-path.open .setup-path-chevron{transform:rotate(180deg)}
.setup-path-body{display:none;padding:20px;border-top:1px solid var(--border);background:var(--surface-2)}
.setup-path.open .setup-path-body{display:block}
.setup-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.setup-step:last-child{border-bottom:none}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;color:var(--text-muted);line-height:1.6}
.step-text a{color:var(--accent);text-decoration:none}
.step-text a:hover{text-decoration:underline}
.step-text code{background:var(--surface-3);padding:2px 6px;border-radius:4px;font-size:12px;font-family:'SF Mono',Consolas,monospace;color:var(--text)}

/* ===== LEVEL CARDS ===== */
.level-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.level-card{cursor:pointer;position:relative;overflow:hidden}
.level-card:hover{border-color:var(--accent-border);transform:translateY(-2px)}
.level-num{font-size:48px;font-weight:800;color:var(--accent);opacity:.12;position:absolute;top:-8px;right:12px;line-height:1}
.level-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:6px}
.level-card p{color:var(--text-muted);font-size:13px;line-height:1.5}

/* ===== SVG / MAP ===== */
.map-layout{display:grid;grid-template-columns:1fr 320px;gap:20px;margin:24px 0}
.svg-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;overflow-x:auto}
.info-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.info-panel h3{margin-bottom:8px}
.info-panel .examples{color:var(--text-muted);font-size:13px;margin-top:12px}
.info-panel .examples li{margin-bottom:4px}
.info-panel .look-for{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.info-panel .look-for h4{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:6px}
.info-panel .look-for p{font-size:13px;color:var(--text-muted)}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.svg-col{cursor:pointer;transition:opacity .2s}
.svg-col.active rect:first-child{stroke:var(--accent);stroke-width:2}
.svg-stage{cursor:pointer;transition:opacity .2s}
.svg-stage.active rect{stroke:var(--accent);stroke-width:2}

/* ===== SWIM LANES ===== */
.swim-tabs{display:flex;gap:8px;margin-bottom:16px}
.swim-tab{padding:8px 16px;font-size:13px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text-muted);background:var(--surface);transition:all .2s}
.swim-tab.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.signals{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px}
.signal-card{cursor:pointer;border-left:3px solid var(--text-dim);padding-left:16px}
.signal-card:hover{border-left-color:var(--accent)}
.signal-card.active{border-left-color:var(--accent);background:var(--accent-dim)}
.signal-card h4{font-size:14px;margin-bottom:4px}
.signal-card p{color:var(--text-muted);font-size:12px}

/* ===== LEVEL 3 TOGGLE ===== */
.toggle-wrap{display:flex;align-items:center;gap:16px;margin:20px 0}
.toggle{width:52px;height:28px;border-radius:14px;background:var(--border-2);cursor:pointer;position:relative;transition:background .3s}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .3s}
.toggle.on::after{transform:translateX(24px)}
.level3-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0}
.checklist{list-style:none;margin-top:16px}
.checklist li{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;color:var(--text-muted);display:flex;align-items:center;gap:10px}
.checklist li::before{content:'';width:18px;height:18px;border:2px solid var(--accent);border-radius:4px;flex-shrink:0}

/* ===== ANNOTATIONS ===== */
.ann-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:24px 0}
.ann-card{cursor:pointer;position:relative;overflow:hidden}
.ann-card[data-type="bottleneck"]{border-left:4px solid var(--ann-red)}
.ann-card[data-type="automate"]{border-left:4px solid var(--ann-orange)}
.ann-card[data-type="high-value"]{border-left:4px solid var(--ann-green)}
.ann-card[data-type="digital-asset"]{border-left:4px solid var(--ann-purple)}
.ann-card.active{background:var(--surface-2)}
.ann-swatch{width:28px;height:28px;border-radius:6px;margin-bottom:10px}
.ann-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.ann-card h4{font-size:14px;margin-bottom:4px}
.ann-card p{color:var(--text-muted);font-size:13px}
.ann-examples{margin-top:10px;display:none;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted)}
.ann-card.active .ann-examples{display:block}

/* ===== 24 ASSETS ===== */
.assets-layout{display:grid;grid-template-columns:260px 1fr;gap:20px;min-height:500px}
.assets-sidebar{position:sticky;top:0;align-self:start}
.archetype-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.arch-pill{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text-muted);background:var(--surface);transition:all .2s}
.arch-pill.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.leverage-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.leverage-score{font-size:32px;font-weight:800;color:var(--accent);line-height:1}
.leverage-bar{width:100%;height:8px;background:var(--border);border-radius:4px;margin:10px 0;overflow:hidden}
.leverage-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s ease}
.leverage-interp{font-size:12px;color:var(--text-muted)}
.filter-section{margin-bottom:12px}
.filter-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px}
.filter-pills{display:flex;flex-wrap:wrap;gap:4px}
.filter-pill{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:14px;cursor:pointer;color:var(--text-muted);background:transparent;transition:all .2s}
.filter-pill.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.reset-btn{width:100%;padding:8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;color:var(--text-muted);background:var(--surface);margin-top:8px}
.reset-btn:hover{border-color:var(--ann-red);color:var(--ann-red)}
.category-section{margin-bottom:24px}
.category-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px;cursor:pointer}
.category-header h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:0}
.category-header .count{font-size:12px;color:var(--text-dim)}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.category-section.collapsed .category-grid{display:none}
.asset-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s}
.asset-card:hover{border-color:var(--border-2);transform:translateY(-1px)}
.asset-card-top{display:flex;align-items:start;justify-content:space-between;margin-bottom:6px}
.asset-num{font-size:11px;color:var(--text-dim);font-weight:600}
.asset-tier{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px}
.asset-tier.critical{color:var(--tier-critical);background:rgba(255,107,107,.1)}
.asset-tier.important{color:var(--tier-important);background:rgba(255,165,0,.1)}
.asset-tier.secondary{color:var(--tier-secondary);background:rgba(74,77,96,.1)}
.asset-name{font-size:14px;font-weight:600;margin-bottom:4px}
.asset-desc{font-size:12px;color:var(--text-muted);line-height:1.4;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.score-btns{display:flex;gap:4px}
.score-btn{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);cursor:pointer;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent;color:var(--text-dim)}
.score-btn:hover{transform:scale(1.15)}
.score-btn.green.active{border-color:var(--score-green);background:var(--score-green-bg);color:var(--score-green)}
.score-btn.yellow.active{border-color:var(--score-yellow);background:var(--score-yellow-bg);color:var(--score-yellow)}
.score-btn.red.active{border-color:var(--score-red);background:var(--score-red-bg);color:var(--score-red)}

/* ===== ASSET EXPLORER ===== */
.ax-wrap{margin-bottom:32px}
.ax-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.ax-pill{padding:5px 12px;font-size:11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--text-muted);background:var(--surface);transition:all .2s;white-space:nowrap}
.ax-pill:hover{border-color:var(--border-2);color:var(--text)}
.ax-pill.active{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.ax-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;transition:opacity .2s ease}
.ax-card-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.ax-card-num{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.ax-card-cat{font-size:11px;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
.ax-card-name{font-size:22px;font-weight:700;line-height:1.2}
.ax-card-desc{font-size:15px;color:var(--text-muted);line-height:1.8;margin-bottom:20px}
.ax-scores{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:20px}
.ax-score-box{padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.7}
.ax-score-label{font-weight:700;margin-bottom:4px;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.ax-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0}
.ax-meta-box{padding:12px;border-radius:8px;background:var(--surface-2);font-size:12px;color:var(--text-muted);line-height:1.6}
.ax-meta-label{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-dim);font-weight:600;margin-bottom:4px}
.ax-nav{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.ax-nav-btn{padding:8px 20px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.ax-nav-btn:hover{border-color:var(--accent-border);color:var(--text);background:var(--accent-dim)}
.ax-nav-btn:disabled{opacity:.3;cursor:default;border-color:var(--border);background:var(--surface);color:var(--text-dim)}
.ax-progress{text-align:center;font-size:12px;color:var(--text-dim)}
.ax-progress-bar{width:200px;height:4px;background:var(--surface-2);border-radius:2px;margin:6px auto 0;overflow:hidden}
.ax-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s ease}

/* ===== DRAWER ===== */
.drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-overlay.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-440px;width:440px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:201;transition:right .3s ease;overflow-y:auto;padding:32px}
.drawer.open{right:0}
.drawer-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:var(--surface);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.drawer-close:hover{border-color:var(--ann-red);color:var(--ann-red)}
.drawer h2{font-size:22px;margin-bottom:4px}
.drawer .cat-label{font-size:12px;color:var(--text-muted);margin-bottom:20px}
.scoring-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:12px}
.scoring-table th{text-align:left;padding:8px;border-bottom:1px solid var(--border);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase}
.scoring-table td{padding:8px;border-bottom:1px solid var(--border);color:var(--text-muted);vertical-align:top;line-height:1.5}
.scoring-table .green-col{border-left:3px solid var(--score-green)}
.scoring-table .yellow-col{border-left:3px solid var(--score-yellow)}
.scoring-table .red-col{border-left:3px solid var(--score-red)}
.playbook{margin-bottom:20px}
.playbook h4{font-size:13px;font-weight:600;margin-bottom:8px}
.playbook-section{background:var(--surface-2);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.playbook-section h5{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.playbook-section.rty h5{color:var(--score-yellow)}
.playbook-section.ytg h5{color:var(--score-green)}
.playbook-section ul{list-style:none}
.playbook-section li{font-size:12px;color:var(--text-muted);padding:4px 0 4px 12px;position:relative}
.playbook-section li::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--text-dim);position:absolute;left:0;top:10px}
.quality-tests{margin-bottom:20px}
.quality-tests h4{font-size:13px;font-weight:600;margin-bottom:8px}
.qt{display:flex;gap:8px;padding:4px 0;font-size:12px}
.qt-icon{color:var(--accent);flex-shrink:0}
.qt-name{font-weight:600;color:var(--text)}
.qt-q{color:var(--text-muted)}

/* ===== VIDEO EMBED ===== */
.video-container{width:100%;max-width:680px;aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;margin:24px 0;background:var(--surface);border:1px solid var(--border)}
.video-container iframe{width:100%;height:100%;border:0}
.video-optional{margin:20px 0}
.video-toggle{display:flex;align-items:center;gap:8px;padding:10px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-muted);background:var(--surface);transition:all .2s}
.video-toggle:hover{border-color:var(--border-2)}
.video-toggle .chevron{transition:transform .2s}
.video-toggle.open .chevron{transform:rotate(180deg)}
.video-body{display:none;margin-top:12px}
.video-toggle.open+.video-body{display:block}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.sidebar{display:none;position:fixed;top:53px;left:0;bottom:0;z-index:150;width:280px}
.sidebar.open{display:flex}
.menu-btn{display:flex;align-items:center;justify-content:center}
.level-cards{grid-template-columns:1fr}
.map-layout{grid-template-columns:1fr}
.assets-layout{grid-template-columns:1fr}
.assets-sidebar{position:static}
.signals{grid-template-columns:1fr}
.ann-grid{grid-template-columns:1fr}
.level3-grid{grid-template-columns:1fr}
.drawer{width:100%}
.main{padding:24px 16px}
}
</style>
</head>

// ========== RENDER SIDEBAR ==========
function renderSidebar() {
  let html = '';
  let lastGroup = '';
  LESSONS.forEach((lesson, i) => {
    if (lesson.group !== lastGroup) {
      html += `<div class="sidebar-label">${lesson.group}</div>`;
      lastGroup = lesson.group;
    }
    const isActive = lesson.id === state.currentLesson;
    const isDone = state.completed.has(lesson.id);
    const idx = LESSONS.findIndex(l => l.id === state.currentLesson);
    html += `<div class="lesson-item ${isActive?'active':''} ${isDone?'completed':''}" onclick="goToLesson('${lesson.id}')">
      <div class="lesson-check">${isDone?'\u2713':''}</div>
      <span class="lesson-name">${lesson.name}</span>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

// ========== RENDER PROGRESS ==========
function renderProgress() {
  const total = LESSONS.length;
  const done = state.completed.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ========== LESSON NAVIGATION ==========
function goToLesson(id) {
  state.currentLesson = id;
  renderSidebar();
  renderLesson(id);
  document.querySelector('.sidebar').classList.remove('open');
  document.querySelector('.main').scrollTo(0, 0);
}

function nextLesson() {
  const idx = LESSONS.findIndex(l => l.id === state.currentLesson);
  if (idx < LESSONS.length - 1) goToLesson(LESSONS[idx + 1].id);
}

function prevLesson() {
  const idx = LESSONS.findIndex(l => l.id === state.currentLesson);
  if (idx > 0) goToLesson(LESSONS[idx - 1].id);
}

function markComplete(id) {
  if (state.completed.has(id)) state.completed.delete(id); else state.completed.add(id);
  saveState();
  saveState();
  renderSidebar();
  renderProgress();
  // Update all mark-btn elements on the page
  document.querySelectorAll('.mark-btn').forEach(btn => {
    const isDone = state.completed.has(id);
    btn.classList.toggle('done', isDone);
    btn.querySelector('.mark-icon').textContent = isDone ? '\u2713' : '';
    btn.childNodes[1].textContent = isDone ? 'Completed' : 'Mark Complete';
  });
}

function markAndNext(id) {
  if (!state.completed.has(id)) state.completed.add(id);
  saveState();
  renderProgress();
  nextLesson();
}

// ========== RENDER MARK COMPLETE BUTTON ==========
function renderMarkBtn(id) {
  const isDone = state.completed.has(id);
  return `<button class="mark-btn ${isDone?'done':''}" onclick="markComplete('${id}')"><span class="mark-icon">${isDone?'\u2713':''}</span>${isDone?'Completed':'Mark Complete'}</button>`;
}

// ========== RENDER LESSON HEADER ACTIONS ==========
function renderLessonTopBar(id) {
  return `<div style="display:flex;justify-content:flex-end;margin-bottom:16px">${renderMarkBtn(id)}</div>`;
}

// ========== RENDER LESSON FOOTER ==========
function renderLessonFooter(id) {
  const idx = LESSONS.findIndex(l => l.id === id);
  return `<div class="lesson-footer">
    <button class="nav-btn ${idx===0?'disabled':''}" onclick="prevLesson()">\u2190 Previous</button>
    ${renderMarkBtn(id)}
    ${idx < LESSONS.length - 1
      ? `<button class="nav-btn primary" onclick="markAndNext('${id}')">Complete & Continue \u2192</button>`
      : `<button class="nav-btn primary" onclick="markComplete('${id}')">Finish Course \u2713</button>`}
  </div>`;
}

// ========== SKIP BANNER ==========
function skipBanner(id) {
  return '';
}

// ========== RENDER INDIVIDUAL LESSONS ==========
function renderLesson(id) {
  const main = document.getElementById('main');
  const idx = LESSONS.findIndex(l => l.id === id);
  const lesson = LESSONS[idx];
  let html = `<div class="lesson active">`;
  html += renderLessonTopBar(id);
  html += skipBanner(id);
  html += `<div class="lesson-header"><div class="lesson-num">Lesson ${idx + 1} of ${LESSONS.length}</div>`;

  switch(id) {
    case 'welcome': html += renderWelcome(); break;
    case 'setup': html += renderSetup(); break;
    case 'why-map': html += renderWhyMap(); break;
    case 'level3': html += renderLevel3(); break;
    case 'biz-map': html += renderBizMap(); break;
    case 'bowtie': html += renderBowtie(); break;
    case 'swimlanes': html += renderSwimlanes(); break;
    case 'annotations': html += renderAnnotations(); break;
    case 'roadmap': html += renderRoadmap(); break;
    case 'synthesis': html += renderSynthesis(); break;
    case 'prompts': html += renderPrompts(); break;
    case 'assets': html += renderAssetsLesson(); break;
    case 'asset-map': html += renderAssetMap(); break;
    case 'assets-score': html += renderAssetsScore(); break;
    case 'ready': html += renderReady(); break;
    case 'workshop-xray': html += renderWorkshopXray(); break;
    case 'workshop-assets': html += renderWorkshopAssets(); break;
  }

  html += `</div>` + renderLessonFooter(id) + `</div>`;
  main.innerHTML = html;

  // Post-render hooks
  if (id === 'biz-map') { initBizMapSvg(); initBizMapInfo(); }
  if (id === 'bowtie') { initBowtieSvg(); initBowtieInfo(); }
  if (id === 'swimlanes') initSwimSvg();
  if (id === 'annotations') initAnnSvg();
  if (id === 'assets' || id === 'asset-map') initAssetsUI();
  if (id === 'assets-score') initAssetsScoreUI();
  if (id === 'level3') renderL3Content();
}

// ===== LESSON: WELCOME =====
function renderWelcome() {
  return `<h2>Welcome to the Business X-Ray</h2>
  <p class="subtitle">The skill that turns your business from a jumble in your head into a clear, visual system you can see, diagnose, and improve.</p></div>
  <div class="spacer"></div>

  <div class="svg-wrap" style="padding:24px"><svg id="swimSvg" viewBox="0 0 800 320" width="100%"></svg></div>
  <h4 style="margin-top:24px;margin-bottom:8px">Spot the Pattern</h4>

    <div class="card signal-card" data-signal="ai-empty" onclick="toggleSignal('ai-empty')"><h4 style="color:var(--ann-orange)">\u2699 AI lane is empty</h4><p>Missed automation. Repetitive, rules-based work that doesn't need creative judgment could be handled by AI.</p></div>

function switchProcess(id){state.swimProcess=id;state.activeSignal=null;document.querySelectorAll('.swim-tab').forEach(t=>t.classList.toggle('active',t.dataset.process===id));document.querySelectorAll('.signal-card').forEach(c=>c.classList.remove('active'));renderSwimLaneSvg(id);}
function renderSwimLaneSvg(pid){
  const data=SWIM_DATA[pid];const svg=document.getElementById('swimSvg');
  const lc=['#dae8fc30','#ffe6cc30','#e1d5e730','#f8cecc30'];const ls=['#6c8ebf','#d79b00','#9673a6','#b85450'];
  const ac={bottleneck:'var(--ann-red)',automate:'var(--ann-orange)','high-value':'var(--ann-green)','digital-asset':'var(--ann-purple)'};

  // BX Standard: 120px boxes, 50px tall, 60px min gap, one element per X-slot
  const bw=120,bh=50,laneH=80,headerW=90,topY=42,gap=60;

  // Step 1: Assign unique x-slots per item (BX Rule 1: one element per slot)
  const phaseCounts={};
  data.items.forEach(item=>{const k=`${item.lane}-${item.phase}`;phaseCounts[k]=(phaseCounts[k]||0)+1;});
  const phaseMaxItems=data.phases.map((_,pi)=>{
    let mx=1;data.lanes.forEach((_,li)=>{mx=Math.max(mx,phaseCounts[`${li}-${pi}`]||0);});return mx;
  });
  // BX Standard: dynamic pool width = label_width + (num_columns * 180) + 40
  const phaseX=[],phaseWidths=[];
  let cx=headerW;
  data.phases.forEach((p,i)=>{
    phaseX.push(cx);
    const w=Math.max(1,phaseMaxItems[i])*(bw+gap)+gap;
    phaseWidths.push(w);cx+=w;
  });
  const totalW=cx+20;
  const totalH=data.lanes.length*laneH+topY;
  svg.setAttribute('viewBox',`0 0 ${totalW} ${totalH}`);

  let html='';
  // Title
  html+=`<text x="${totalW/2}" y="16" text-anchor="middle" fill="var(--text)" font-size="13" font-weight="700">${data.title}</text>`;
  // Phase headers
  data.phases.forEach((p,i)=>{
    html+=`<text x="${phaseX[i]+phaseWidths[i]/2}" y="34" text-anchor="middle" fill="var(--text-dim)" font-size="10" font-weight="600">${p}</text>`;
    if(i>0)html+=`<line x1="${phaseX[i]}" y1="${topY}" x2="${phaseX[i]}" y2="${totalH}" stroke="var(--border)" stroke-dasharray="3" opacity="0.4"/>`;
  });
  // Lane backgrounds
  data.lanes.forEach((lane,li)=>{
    const y=topY+li*laneH;
    html+=`<rect x="0" y="${y}" width="${headerW}" height="${laneH}" fill="${lc[li]}" rx="4" stroke="${ls[li]}" stroke-width="1"/>`;
    html+=`<text x="${headerW/2}" y="${y+laneH/2+4}" text-anchor="middle" fill="${ls[li]}" font-size="10" font-weight="700">${lane}</text>`;
    html+=`<rect x="${headerW}" y="${y}" width="${totalW-headerW}" height="${laneH}" fill="${lc[li]}" stroke="var(--border)" stroke-width="0.3"/>`;
  });

  // Step 2: Place items — BX Rule 7: every element gets own X, Rule 1: one per slot
  const positioned=[];const slotCount={};
  data.items.forEach(item=>{
    const k=`${item.lane}-${item.phase}`;if(!slotCount[k])slotCount[k]=0;
    const slot=slotCount[k]++;
    const x=phaseX[item.phase]+gap+slot*(bw+gap);
    const y=topY+item.lane*laneH+(laneH-bh)/2;
    positioned.push({...item,x,y,bw,bh});
    const stroke=item.ann?ac[item.ann]:'var(--border-2)';const sw=item.ann?2:1;
    const dash=item.ann==='automate'?' stroke-dasharray="4"':'';
    html+=`<g class="swim-item" data-ann="${item.ann||''}" data-lane="${item.lane}">`;
    html+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="6" fill="var(--surface-2)" stroke="${stroke}" stroke-width="${sw}"${dash}/>`;
    item.text.split('\n').forEach((line,li,arr)=>{
      html+=`<text x="${x+bw/2}" y="${y+bh/2+(li-(arr.length-1)/2)*13}" text-anchor="middle" fill="var(--text-muted)" font-size="10">${line}</text>`;
    });
    html+=`</g>`;
  });

  // Step 3: Draw arrows — BX Rule 2: RIGHT or DOWN only, orthogonal with rounded corners
  // 3a: Same-lane arrows (sequential items across phases)
  for(let li=0;li<data.lanes.length;li++){
    const laneItems=positioned.filter(p=>p.lane===li).sort((a,b)=>a.phase-b.phase||a.x-b.x);
    for(let i=0;i<laneItems.length-1;i++){
      const a=laneItems[i],b=laneItems[i+1];
      if(b.phase<=a.phase)continue;
      const ax=a.x+a.bw+2,ay=a.y+a.bh/2,bx=b.x-2,by=b.y+b.bh/2;
      if(bx-ax<4)continue;
      if(Math.abs(ay-by)<2){
        html+=`<path d="M${ax},${ay} L${bx},${ay}" fill="none" stroke="${ls[li]}" stroke-width="2" opacity="0.5"/>`;
      } else {
        const midX=ax+(bx-ax)*0.5;
        html+=`<path d="M${ax},${ay} L${midX},${ay} Q${midX},${by} ${midX},${by} L${bx},${by}" fill="none" stroke="${ls[li]}" stroke-width="2" opacity="0.5"/>`;
      }
      html+=`<polygon points="${bx-7},${by-4} ${bx},${by} ${bx-7},${by+4}" fill="${ls[li]}" opacity="0.5"/>`;
    }
  }
  // 3b: Cross-lane arrows — LEFT-TO-RIGHT flow, route LEFT around collisions
  if(data.crossLane){
    const exitCount={};
    data.crossLane.forEach(([fi])=>{exitCount[fi]=(exitCount[fi]||0)+1;});
    const exitUsed={};
    let routeIdx=0;
    data.crossLane.forEach(([fi,ti])=>{
      const a=positioned[fi],b=positioned[ti];if(!a||!b)return;
      const goingDown=b.lane>a.lane;
      if(!exitUsed[fi])exitUsed[fi]=0;
      const total=exitCount[fi];const idx=exitUsed[fi]++;
      const spread=Math.min(24,a.bw*0.6);
      const xOff=total>1?(idx/(total-1)-0.5)*spread:0;
      const srcCx=a.x+a.bw/2+xOff;
      const tgtCx=b.x+b.bw/2;
      const ay=goingDown?a.y+a.bh:a.y;
      const by=goingDown?b.y:b.y+b.bh;
      const r=5;const clr='rgba(255,255,255,0.5)';
      // Check if vertical path would hit any box in intermediate lanes
      const minL=Math.min(a.lane,b.lane)+1;const maxL=Math.max(a.lane,b.lane);
      let hitBox=null;
      for(let li=minL;li<maxL;li++){
        positioned.forEach(p=>{
          if(p.lane===li && srcCx>=p.x-4 && srcCx<=p.x+p.bw+4){
            if(goingDown?(p.y>a.y && p.y<b.y+b.bh):(p.y<a.y+a.bh && p.y+p.bh>b.y)){
              hitBox=p;
            }
          }
        });
      }
      if(!hitBox && Math.abs(srcCx-tgtCx)<6){
        // Clean vertical drop — no collision
        html+=`<path d="M${srcCx},${ay} L${tgtCx},${by}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      } else if(!hitBox){
        // Different X, no collision — L-shape going forward
        const midY=ay+(by-ay)*0.5;
        html+=`<path d="M${srcCx},${ay} L${srcCx},${midY-r} Q${srcCx},${midY} ${srcCx+(tgtCx>srcCx?r:-r)},${midY} L${tgtCx-(tgtCx>srcCx?r:-r)},${midY} Q${tgtCx},${midY} ${tgtCx},${midY+r} L${tgtCx},${by}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      } else {
        // COLLISION: route LEFT through the phase gap, then down, then right into target
        routeIdx++;
        const gapX=Math.max(headerW+4, hitBox.x-12-routeIdx*8);
        html+=`<path d="M${srcCx},${ay} L${srcCx},${ay+r} Q${srcCx},${ay+2*r} ${srcCx-r},${ay+2*r} L${gapX+r},${ay+2*r} Q${gapX},${ay+2*r} ${gapX},${ay+3*r} L${gapX},${by-3*r} Q${gapX},${by-2*r} ${gapX+r},${by-2*r} L${tgtCx-r},${by-2*r} Q${tgtCx},${by-2*r} ${tgtCx},${by-r} L${tgtCx},${by}" fill="none" stroke="${clr}" stroke-width="1.5" stroke-dasharray="5,3"/>`;
      }
      // Arrowhead — always points DOWN into top of target
      html+=goingDown
        ?`<polygon points="${tgtCx-4},${by-6} ${tgtCx},${by} ${tgtCx+4},${by-6}" fill="${clr}"/>`
        :`<polygon points="${tgtCx-4},${by+6} ${tgtCx},${by} ${tgtCx+4},${by+6}" fill="${clr}"/>`;
    });
  }
  svg.innerHTML=html;
}
function toggleSignal(sig){
  if(state.activeSignal===sig){state.activeSignal=null;document.querySelectorAll('.signal-card').forEach(c=>c.classList.remove('active'));document.querySelectorAll('.swim-item').forEach(el=>el.style.opacity='1');return;}
  state.activeSignal=sig;document.querySelectorAll('.signal-card').forEach(c=>c.classList.toggle('active',c.dataset.signal===sig));
  document.querySelectorAll('.swim-item').forEach(el=>{
    if(sig==='owner-full')el.style.opacity=el.dataset.lane==='0'?'1':'0.2';
    else if(sig==='ai-empty')el.style.opacity=el.dataset.lane==='1'?'1':'0.2';
    else el.style.opacity='0.4';
  });
}

function copyPrompt(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'var(--accent)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; btn.style.borderColor = ''; }, 1500);
  });
}

  const ci=CATEGORIES.findIndex(c=>c.id===a.cat);const col=colors[ci];
  const card=document.getElementById('axCard');if(!card)return;
  card.innerHTML=`<div class="ax-card-head"><div class="ax-card-num" style="background:${col}22;border:1px solid ${col}44;color:${col}">${a.num}</div><div><div class="ax-card-cat" style="color:${col}">${CATEGORIES[ci].name}</div><div class="ax-card-name">${a.name}</div></div></div><p class="ax-card-desc">${a.desc}</p><div style="background:${col}08;border:1px solid ${col}20;border-radius:8px;padding:12px 14px;margin-bottom:12px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:${col};font-weight:700;margin-bottom:6px">Why It Creates Leverage</div><p style="font-size:13px;color:var(--text-muted);line-height:1.6;margin:0">${a.leverage}</p></div><div class="ax-scores"><div class="ax-score-box" style="background:var(--score-green)15;border:1px solid var(--score-green)33"><div class="ax-score-label" style="color:var(--score-green)">Green — Remarkable</div>${a.green}</div><div class="ax-score-box" style="background:var(--score-yellow)15;border:1px solid var(--score-yellow)33"><div class="ax-score-label" style="color:var(--score-yellow)">Yellow — Basic</div>${a.yellow}</div><div class="ax-score-box" style="background:var(--score-red)15;border:1px solid var(--score-red)33"><div class="ax-score-label" style="color:var(--score-red)">Red — Missing</div>${a.red}</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div class="ax-meta-box"><div class="ax-meta-label">↑ Red → Yellow</div><ul style="margin:4px 0 0;padding-left:16px;font-size:12px;color:var(--text-muted);line-height:1.7">${a.rty.map(s=>'<li>'+s+'</li>').join('')}</ul></div><div class="ax-meta-box"><div class="ax-meta-label">↑ Yellow → Green</div><ul style="margin:4px 0 0;padding-left:16px;font-size:12px;color:var(--text-muted);line-height:1.7">${a.ytg.map(s=>'<li>'+s+'</li>').join('')}</ul></div></div><div class="ax-meta"><div class="ax-meta-box"><div class="ax-meta-label">Effort</div>${a.effort}</div><div class="ax-meta-box"><div class="ax-meta-label">Connects To</div>${a.deps}</div></div>`;
  const total=ASSETS.length;
  const pt=document.getElementById('axProgressText');const pf=document.getElementById('axProgressFill');
  if(pt)pt.textContent=`${idx+1} of ${total}`;
  if(pf)pf.style.width=Math.round((idx+1)/total*100)+'%';
  const prev=document.getElementById('axPrev');const next=document.getElementById('axNext');
  if(prev)prev.disabled=idx===0;if(next)next.disabled=idx===total-1;
  renderAxPills();
}
function prevAsset(){if(state.assetExplorerIdx>0){state.assetExplorerIdx--;renderAssetCard(state.assetExplorerIdx);}}
function nextAsset(){if(state.assetExplorerIdx<ASSETS.length-1){state.assetExplorerIdx++;renderAssetCard(state.assetExplorerIdx);}}
function jumpToCategory(catId){const idx=ASSETS.findIndex(a=>a.cat===catId);if(idx>=0){state.assetExplorerIdx=idx;renderAssetCard(idx);}}
function jumpToAsset(num){const idx=ASSETS.findIndex(a=>a.num===num);if(idx>=0){state.assetExplorerIdx=idx;renderAssetCard(idx);document.getElementById('assetsWalkthrough')?.scrollIntoView({behavior:'smooth',block:'start'});}}
function selectArchetype(id){state.archetype=id;if(document.getElementById('assetsMain'))initAssetsScoreUI();else if(document.getElementById('assetsWalkthrough'))initAssetsUI();}
function renderFilterPills(){
  document.getElementById('tierFilters').innerHTML=['all','critical','important','secondary'].map(t=>`<div class="filter-pill ${t===state.tierFilter?'active':''}" onclick="setTierFilter('${t}')">${t==='all'?'All':t[0].toUpperCase()+t.slice(1)}</div>`).join('');
  document.getElementById('scoreFilters').innerHTML=['all','green','yellow','red','unscored'].map(s=>`<div class="filter-pill ${s===state.scoreFilter?'active':''}" onclick="setScoreFilter('${s}')">${s==='all'?'All':s[0].toUpperCase()+s.slice(1)}</div>`).join('');
}
function setTierFilter(t){state.tierFilter=t;renderFilterPills();renderAssetGrid();}
function setScoreFilter(s){state.scoreFilter=s;renderFilterPills();renderAssetGrid();}
function getAssetTier(a){return TIERS[state.archetype][a.cat]||'secondary';}
function renderAssetGrid(){
  const main=document.getElementById('assetsMain');let html='';
  CATEGORIES.forEach(cat=>{
    const catAssets=ASSETS.filter(a=>a.cat===cat.id).filter(a=>{
      const tier=getAssetTier(a);const score=state.scores[a.num]||'unscored';
      if(state.tierFilter!=='all'&&tier!==state.tierFilter)return false;
      if(state.scoreFilter!=='all'&&score!==state.scoreFilter)return false;return true;});
    if(!catAssets.length&&(state.tierFilter!=='all'||state.scoreFilter!=='all'))return;
    const ct=TIERS[state.archetype][cat.id];const tc=ct==='critical'?'var(--tier-critical)':ct==='important'?'var(--tier-important)':'var(--tier-secondary)';
    html+=`<div class="category-section"><div class="category-header" onclick="this.parentElement.classList.toggle('collapsed')"><h3><span style="color:${tc};margin-right:8px">\u25CF</span>${cat.name}</h3><span class="count">${catAssets.length}</span></div><div class="category-grid">`;
    catAssets.forEach(a=>{const tier=getAssetTier(a);const sc=state.scores[a.num]||'';
      html+=`<div class="asset-card" onclick="openDrawer(${a.num})"><div class="asset-card-top"><span class="asset-num">#${a.num}</span><span class="asset-tier ${tier}">${tier}</span></div><div class="asset-name">${a.name}</div><div class="asset-desc">${a.desc}</div><div class="score-btns" onclick="event.stopPropagation()"><button class="score-btn green ${sc==='green'?'active':''}" onclick="setScore(${a.num},'green')">G</button><button class="score-btn yellow ${sc==='yellow'?'active':''}" onclick="setScore(${a.num},'yellow')">Y</button><button class="score-btn red ${sc==='red'?'active':''}" onclick="setScore(${a.num},'red')">R</button></div></div>`;});
    html+=`</div></div>`;});
  main.innerHTML=html;
}
function setScore(n,s){if(state.scores[n]===s)delete state.scores[n];else state.scores[n]=s;saveState();renderAssetGrid();updateLeverageScore();}
function resetScores(){state.scores={};saveState();renderAssetGrid();updateLeverageScore();}
function updateLeverageScore(){
  const scored=Object.entries(state.scores);if(!scored.length){document.getElementById('leverageScore').textContent='0%';document.getElementById('leverageFill').style.width='0%';document.getElementById('leverageInterp').textContent='Score your assets to calculate';return;}
  const g=scored.filter(([,s])=>s==='green').length;const t=scored.length;const pct=Math.round(g/t*100);
  document.getElementById('leverageScore').textContent=pct+'%';document.getElementById('leverageFill').style.width=pct+'%';
  let interp=pct<=30?'Owner-dependent. Revenue stops if you step back.':pct<=50?'Some leverage. Business runs partly without you.':pct<=69?'Functional leverage. Can take short breaks.':'Business runs without you. Investable and sellable.';
  document.getElementById('leverageInterp').textContent=`${g}/${t} Green. ${interp}`;
}

// ===== DRAWER =====
function openDrawer(num){
  const a=ASSETS.find(x=>x.num===num);if(!a)return;const cat=CATEGORIES.find(c=>c.id===a.cat);const tier=getAssetTier(a);
  document.getElementById('drawerContent').innerHTML=`
    <div style="margin-bottom:4px"><span class="asset-tier ${tier}" style="font-size:11px">${tier}</span></div>
    <h2>#${a.num} ${a.name}</h2><div class="cat-label">${cat.name}</div>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:20px">${a.desc}</p>
    <h4 style="font-size:14px;margin-bottom:10px">Scoring Criteria</h4>
    <table class="scoring-table"><tr><th class="green-col" style="color:var(--score-green)">Green (Remarkable)</th></tr><tr><td class="green-col">${a.green}</td></tr><tr><th class="yellow-col" style="color:var(--score-yellow)">Yellow (Basic)</th></tr><tr><td class="yellow-col">${a.yellow}</td></tr><tr><th class="red-col" style="color:var(--score-red)">Red (Missing)</th></tr><tr><td class="red-col">${a.red}</td></tr></table>
    <div class="quality-tests"><h4>4 Quality Tests</h4>
      <div class="qt"><span class="qt-icon">\u2713</span><span class="qt-name">Remarkability:</span><span class="qt-q">Would someone tell a friend?</span></div>
      <div class="qt"><span class="qt-icon">\u2713</span><span class="qt-name">90-Day Yachting:</span><span class="qt-q">Works if you disappeared 90 days?</span></div>
      <div class="qt"><span class="qt-icon">\u2713</span><span class="qt-name">Digital Scalability:</span><span class="qt-q">Can be shared digitally?</span></div>
      <div class="qt"><span class="qt-icon">\u2713</span><span class="qt-name">Evergreen:</span><span class="qt-q">Relevant in 3 years?</span></div></div>
    <div class="playbook"><h4>Action Playbook</h4>
      <div class="playbook-section rty"><h5>Red \u2192 Yellow</h5><ul>${a.rty.map(x=>`<li>${x}</li>`).join('')}</ul></div>
      <div class="playbook-section ytg"><h5>Yellow \u2192 Green</h5><ul>${a.ytg.map(x=>`<li>${x}</li>`).join('')}</ul></div></div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px"><strong style="color:var(--text)">Effort:</strong> ${a.effort}</div>
    <div style="font-size:12px;color:var(--text-muted)"><strong style="color:var(--text)">Dependencies:</strong> ${a.deps}</div>`;
  document.getElementById('drawerOverlay').classList.add('open');document.getElementById('drawer').classList.add('open');
}
function closeDrawer(){document.getElementById('drawerOverlay').classList.remove('open');document.getElementById('drawer').classList.remove('open');}

// ========== INIT ==========
function init(){
  renderSidebar();renderProgress();renderLesson(state.currentLesson);
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape')closeDrawer();
    if(e.key==='ArrowLeft'&&document.getElementById('axCard')&&!document.querySelector('.drawer.open'))prevAsset();
    if(e.key==='ArrowRight'&&document.getElementById('axCard')&&!document.querySelector('.drawer.open'))nextAsset();
  });
  // Post-render for level3 (level toggle)
  setTimeout(()=>{if(state.currentLesson==='level3')renderL3Content();},50);
}

// Boot after DOM
init();
</script>
</body>
</html>
