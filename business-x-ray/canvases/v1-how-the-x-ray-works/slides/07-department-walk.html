<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ LEFT — the walking pair: THE AI (robot) + YOU ============ -->
  <!-- robot (canonical black-marker) -->
  <g stroke="var(--ink)" stroke-width="4">
    <line x1="105" y1="250" x2="105" y2="264"/>
    <rect x="63" y="264" width="84" height="58" rx="12"/>
    <rect x="77" y="280" width="56" height="26" rx="7" stroke-width="3"/>
    <line x1="105" y1="322" x2="105" y2="332"/>
    <rect x="69" y="332" width="72" height="70" rx="12"/>
    <line x1="69" y1="356" x2="44" y2="380"/>
    <line x1="141" y1="356" x2="168" y2="372"/>
    <line x1="87" y1="402" x2="81" y2="430"/>
    <line x1="123" y1="402" x2="129" y2="430"/>
  </g>
  <rect x="85" y="350" width="40" height="22" rx="4" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="105" cy="244" r="6" fill="var(--green)" stroke="var(--green)"/>
  <circle cx="91" cy="296" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="119" cy="296" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <!-- pencil in robot's right hand -->
  <line x1="168" y1="372" x2="182" y2="384" stroke="var(--ink)" stroke-width="3"/>

  <!-- you = stick person, marker-circle head -->
  <g stroke="var(--ink)" stroke-width="4">
    <circle cx="215" cy="296" r="23"/>
    <line x1="215" y1="319" x2="215" y2="392"/>
    <line x1="215" y1="338" x2="190" y2="360"/>
    <line x1="215" y1="338" x2="242" y2="356"/>
    <line x1="215" y1="392" x2="198" y2="428"/>
    <line x1="215" y1="392" x2="232" y2="428"/>
  </g>

  <!-- dashed "captures a card" arrow into card 1 -->
  <line x1="264" y1="362" x2="342" y2="362" stroke="var(--dim)" stroke-width="2.5" stroke-dasharray="8 7"/>
  <polyline points="332,356 344,362 332,368" stroke="var(--dim)" stroke-width="2.5"/>

  <!-- ============ THREE STEP CARDS (one per step of your Sales walk) ============ -->
  <!-- CARD A -->
  <rect x="350" y="235" width="372" height="460" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="388" cy="272" r="16" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <line x1="370" y1="298" x2="702" y2="298" stroke="var(--dim)" stroke-width="2"/>
  <rect x="364" y="626" width="344" height="44" rx="8" fill="rgba(214,69,58,0.07)" stroke="none"/>
  <line x1="370" y1="612" x2="702" y2="612" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- CARD B -->
  <rect x="754" y="235" width="372" height="460" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="792" cy="272" r="16" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <line x1="774" y1="298" x2="1106" y2="298" stroke="var(--dim)" stroke-width="2"/>
  <rect x="768" y="626" width="344" height="44" rx="8" fill="rgba(214,69,58,0.07)" stroke="none"/>
  <line x1="774" y1="612" x2="1106" y2="612" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- CARD C -->
  <rect x="1158" y="235" width="372" height="460" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="1196" cy="272" r="16" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <line x1="1178" y1="298" x2="1510" y2="298" stroke="var(--dim)" stroke-width="2"/>
  <rect x="1172" y="626" width="344" height="44" rx="8" fill="rgba(214,69,58,0.07)" stroke="none"/>
  <line x1="1178" y1="612" x2="1510" y2="612" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- step-order chevrons between cards -->
  <polyline points="731,443 745,455 731,467" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="1135,443 1149,455 1135,467" stroke="var(--dim)" stroke-width="3"/>

  <!-- flow-context strip above the cards -->
  <rect x="558" y="172" width="484" height="36" rx="18" stroke="var(--dim)" stroke-width="2" fill="rgba(0,0,0,0.02)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + title + subtitle -->
<text x="50" y="58" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">PART 2 &#183; SEE THE CURRENT STATE</text>
<text x="800" y="102" font-size="48" font-weight="700" text-anchor="middle" fill="var(--ink)">The Department Walk &#8212; Where the Real Detail Lives</text>
<text x="800" y="144" font-size="24" text-anchor="middle" fill="var(--dim)">The AI walks ONE department with you, step by step, writing a card for every step.</text>

<!-- flow-context strip label -->
<text x="800" y="196" font-size="18" font-weight="700" text-anchor="middle" fill="var(--dim)">walking the Sales flow &#8212; steps 4&#8211;6 of 6</text>

<!-- pair labels -->
<text x="105" y="462" font-size="16" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI</text>
<text x="215" y="302" font-size="16" font-weight="700" text-anchor="middle" fill="var(--ink)">YOU</text>
<text x="160" y="492" font-size="20" text-anchor="middle" fill="var(--ink)">walk Sales together</text>
<text x="160" y="518" font-size="16" text-anchor="middle" fill="var(--dim)">a card per step</text>

<!-- ===== CARD A (STEP 4) ===== -->
<text x="414" y="280" font-size="20" font-weight="700" text-anchor="start" fill="var(--ink)">STEP 4</text>
<text x="374" y="332" font-size="16" text-anchor="start" fill="var(--dim)">WHAT HAPPENS</text>
<text x="374" y="356" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">Run the discovery</text>
<text x="374" y="384" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">call</text>
<text x="374" y="404" font-size="16" text-anchor="start" fill="var(--dim)">WHO / WHAT DOES IT</text>
<text x="374" y="432" font-size="25" font-weight="700" text-anchor="start" fill="var(--red)">You &#8212; yourself</text>
<text x="374" y="476" font-size="16" text-anchor="start" fill="var(--dim)">WHICH TOOL</text>
<text x="374" y="504" font-size="25" text-anchor="start" fill="var(--ink)">Zoom</text>
<text x="374" y="548" font-size="16" text-anchor="start" fill="var(--dim)">TIME COST</text>
<text x="374" y="576" font-size="25" text-anchor="start" fill="var(--ink)">45 min / call</text>
<text x="374" y="606" font-size="16" text-anchor="start" fill="var(--dim)">HANDOFF + PAIN</text>
<text x="374" y="654" font-size="23" text-anchor="start" fill="var(--red)">notes stay in your head</text>

<!-- ===== CARD B (STEP 5) ===== -->
<text x="818" y="280" font-size="20" font-weight="700" text-anchor="start" fill="var(--ink)">STEP 5</text>
<text x="778" y="332" font-size="16" text-anchor="start" fill="var(--dim)">WHAT HAPPENS</text>
<text x="778" y="360" font-size="26" font-weight="700" text-anchor="start" fill="var(--ink)">Send the proposal</text>
<text x="778" y="404" font-size="16" text-anchor="start" fill="var(--dim)">WHO / WHAT DOES IT</text>
<text x="778" y="432" font-size="25" font-weight="700" text-anchor="start" fill="var(--red)">You &#8212; yourself</text>
<text x="778" y="476" font-size="16" text-anchor="start" fill="var(--dim)">WHICH TOOL</text>
<text x="778" y="504" font-size="25" text-anchor="start" fill="var(--ink)">Google Docs</text>
<text x="778" y="548" font-size="16" text-anchor="start" fill="var(--dim)">TIME COST</text>
<text x="778" y="576" font-size="25" text-anchor="start" fill="var(--ink)">45 min</text>
<text x="778" y="606" font-size="16" text-anchor="start" fill="var(--dim)">HANDOFF + PAIN</text>
<text x="778" y="654" font-size="23" text-anchor="start" fill="var(--red)">sits 2 days in your inbox</text>

<!-- ===== CARD C (STEP 6) ===== -->
<text x="1222" y="280" font-size="20" font-weight="700" text-anchor="start" fill="var(--ink)">STEP 6</text>
<text x="1182" y="332" font-size="16" text-anchor="start" fill="var(--dim)">WHAT HAPPENS</text>
<text x="1182" y="356" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">Chase the signature</text>
<text x="1182" y="384" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">&amp; first invoice</text>
<text x="1182" y="404" font-size="16" text-anchor="start" fill="var(--dim)">WHO / WHAT DOES IT</text>
<text x="1182" y="432" font-size="25" font-weight="700" text-anchor="start" fill="var(--red)">You &#8212; yourself</text>
<text x="1182" y="476" font-size="16" text-anchor="start" fill="var(--dim)">WHICH TOOL</text>
<text x="1182" y="504" font-size="25" text-anchor="start" fill="var(--ink)">Stripe</text>
<text x="1182" y="548" font-size="16" text-anchor="start" fill="var(--dim)">TIME COST</text>
<text x="1182" y="576" font-size="25" text-anchor="start" fill="var(--ink)">30 min / week</text>
<text x="1182" y="606" font-size="16" text-anchor="start" fill="var(--dim)">HANDOFF + PAIN</text>
<text x="1182" y="654" font-size="24" text-anchor="start" fill="var(--red)">you chase it yourself</text>

<!-- ===== why it matters ===== -->
<text x="800" y="752" font-size="18" font-weight="700" text-anchor="middle" fill="var(--dim)">WHY IT MATTERS</text>
<text x="800" y="790" font-size="26" text-anchor="middle" fill="var(--ink)">These cards are the raw material every deep map is drawn from &#8212; swimlane, OS map, scorecard.</text>
<text x="800" y="828" font-size="26" text-anchor="middle" fill="var(--ink)">Shallow answers make pretty maps that <tspan fill="var(--red)" font-weight="700">lie.</tspan></text>

<!-- ===== takeaway bridge ===== -->
<text x="800" y="908" font-size="32" font-weight="700" text-anchor="middle" fill="var(--green)">Enough cards collected &#8212; now the AI lays them into lanes.</text>
</svg></body></html>
