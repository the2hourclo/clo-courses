<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --amber:rgb(214,140,40); --purple:rgb(147,112,219);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ YOU — the owner, running every step ============ -->
  <circle cx="180" cy="300" r="21" stroke="var(--ink)" stroke-width="3"/>
  <line x1="180" y1="321" x2="180" y2="370" stroke="var(--ink)" stroke-width="3"/>
  <line x1="152" y1="338" x2="208" y2="338" stroke="var(--ink)" stroke-width="3"/>
  <line x1="180" y1="370" x2="162" y2="398" stroke="var(--ink)" stroke-width="3"/>
  <line x1="180" y1="370" x2="198" y2="398" stroke="var(--ink)" stroke-width="3"/>
  <!-- you feed into the flow -->
  <line x1="214" y1="336" x2="290" y2="336" stroke="var(--dim)" stroke-width="2.5" stroke-dasharray="8 6"/>
  <polyline points="280,331 293,336 280,341" stroke="var(--dim)" stroke-width="2.5"/>

  <!-- ============ THE SWIMLANE — three real steps, each with its mark ============ -->
  <!-- Box 1 — BOTTLENECK (red, thick solid) -->
  <rect x="300" y="285" width="290" height="106" rx="14" stroke="var(--red)" stroke-width="4" fill="rgba(214,69,58,0.06)"/>
  <!-- Box 2 — AUTOMATE (amber, dashed) -->
  <rect x="670" y="285" width="290" height="106" rx="14" stroke="var(--amber)" stroke-width="3.5" stroke-dasharray="11 8" fill="rgba(214,140,40,0.06)"/>
  <!-- Box 3 — HIGH-VALUE (green, thick solid) -->
  <rect x="1040" y="285" width="290" height="106" rx="14" stroke="var(--green)" stroke-width="4" fill="rgba(45,140,60,0.06)"/>

  <!-- flow arrows between steps (ink) -->
  <line x1="596" y1="338" x2="662" y2="338" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="652,332 665,338 652,344" stroke="var(--ink)" stroke-width="3"/>
  <line x1="966" y1="338" x2="1032" y2="338" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="1022,332 1035,338 1022,344" stroke="var(--ink)" stroke-width="3"/>

  <!-- ============ the missing asset — purple, hanging under the bottleneck ============ -->
  <!-- dashed purple connector down from Box 1 -->
  <line x1="445" y1="391" x2="445" y2="432" stroke="var(--purple)" stroke-width="3" stroke-dasharray="8 6"/>
  <polyline points="439,422 445,435 451,422" stroke="var(--purple)" stroke-width="3"/>
  <!-- stacked-copy hint (the 'build once, reuse' shape) -->
  <rect x="356" y="440" width="190" height="80" rx="12" stroke="var(--purple)" stroke-width="2.5" fill="rgba(147,112,219,0.05)"/>
  <rect x="345" y="432" width="190" height="80" rx="12" stroke="var(--purple)" stroke-width="3" fill="rgba(147,112,219,0.10)"/>

  <!-- ============ LEGEND — four meaning cards ============ -->
  <rect x="75" y="592" width="340" height="252" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.012)"/>
  <rect x="445" y="592" width="340" height="252" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.012)"/>
  <rect x="815" y="592" width="340" height="252" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.012)"/>
  <rect x="1185" y="592" width="340" height="252" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.012)"/>

  <!-- swatches: each demonstrates its border treatment -->
  <rect x="97" y="620" width="96" height="46" rx="10" stroke="var(--red)" stroke-width="4" fill="rgba(214,69,58,0.06)"/>
  <rect x="467" y="620" width="96" height="46" rx="10" stroke="var(--amber)" stroke-width="3.5" stroke-dasharray="10 7" fill="rgba(214,140,40,0.06)"/>
  <rect x="837" y="620" width="96" height="46" rx="10" stroke="var(--green)" stroke-width="4" fill="rgba(45,140,60,0.06)"/>
  <!-- purple swatch with stacked hint -->
  <rect x="1215" y="627" width="96" height="46" rx="10" stroke="var(--purple)" stroke-width="2.5" fill="rgba(147,112,219,0.05)"/>
  <rect x="1207" y="620" width="96" height="46" rx="10" stroke="var(--purple)" stroke-width="3" fill="rgba(147,112,219,0.10)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + title + subtitle -->
<text x="80" y="66" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">PART 2 &#183; SEE THE CURRENT STATE</text>
<text x="800" y="120" font-size="52" font-weight="700" text-anchor="middle" fill="var(--ink)">Four Colors Tell You What to Do</text>
<text x="800" y="162" font-size="26" text-anchor="middle" fill="var(--dim)">Once your steps are drawn, each one gets one of four marks &#8212; and the mark IS the fix.</text>

<!-- swimlane label + owner tag -->
<text x="300" y="252" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">YOUR CLIENT FLOW &#183; you run every step yourself</text>
<text x="180" y="430" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">YOU</text>

<!-- per-step mark tags (tie each box to the legend) -->
<text x="445" y="278" font-size="17" font-weight="700" text-anchor="middle" fill="var(--red)">BOTTLENECK</text>
<text x="815" y="278" font-size="17" font-weight="700" text-anchor="middle" fill="var(--amber)">AUTOMATE</text>
<text x="1185" y="278" font-size="17" font-weight="700" text-anchor="middle" fill="var(--green)">HIGH-VALUE</text>

<!-- step labels -->
<text x="445" y="330" font-size="27" text-anchor="middle" fill="var(--ink)">Assemble</text>
<text x="445" y="366" font-size="27" text-anchor="middle" fill="var(--ink)">the proposal</text>
<text x="815" y="330" font-size="27" text-anchor="middle" fill="var(--ink)">Send &amp; chase</text>
<text x="815" y="366" font-size="27" text-anchor="middle" fill="var(--ink)">the invoice</text>
<text x="1185" y="330" font-size="27" text-anchor="middle" fill="var(--ink)">Run the</text>
<text x="1185" y="366" font-size="27" text-anchor="middle" fill="var(--ink)">coaching call</text>

<!-- purple asset label + causal note -->
<text x="440" y="475" font-size="24" font-weight="700" text-anchor="middle" fill="var(--purple)">Proposal</text>
<text x="440" y="502" font-size="24" font-weight="700" text-anchor="middle" fill="var(--purple)">template</text>
<text x="560" y="464" font-size="19" text-anchor="start" fill="var(--purple)">Build this once &#8212;</text>
<text x="560" y="490" font-size="19" text-anchor="start" fill="var(--purple)">and the red step</text>
<text x="560" y="516" font-size="19" text-anchor="start" fill="var(--purple)">stops slowing you.</text>

<!-- legend section label -->
<text x="800" y="572" font-size="20" font-weight="700" text-anchor="middle" fill="var(--dim)">WHAT EACH MARK MEANS</text>

<!-- Card 1 — BOTTLENECK -->
<text x="215" y="652" font-size="25" font-weight="700" text-anchor="start" fill="var(--red)">BOTTLENECK</text>
<text x="97" y="716" font-size="22" text-anchor="start" fill="var(--ink)">Slows everything down.</text>
<text x="97" y="766" font-size="20" text-anchor="start" fill="var(--dim)">building every proposal</text>
<text x="97" y="792" font-size="20" text-anchor="start" fill="var(--dim)">by hand, from scratch</text>

<!-- Card 2 — AUTOMATE -->
<text x="585" y="652" font-size="25" font-weight="700" text-anchor="start" fill="var(--amber)">AUTOMATE</text>
<text x="467" y="716" font-size="22" text-anchor="start" fill="var(--ink)">The AI should do it.</text>
<text x="467" y="766" font-size="20" text-anchor="start" fill="var(--dim)">chasing unpaid</text>
<text x="467" y="792" font-size="20" text-anchor="start" fill="var(--dim)">invoices every month</text>

<!-- Card 3 — HIGH-VALUE -->
<text x="955" y="652" font-size="25" font-weight="700" text-anchor="start" fill="var(--green)">HIGH-VALUE</text>
<text x="837" y="716" font-size="22" text-anchor="start" fill="var(--ink)">You keep doing this.</text>
<text x="837" y="766" font-size="20" text-anchor="start" fill="var(--dim)">the coaching call</text>
<text x="837" y="792" font-size="20" text-anchor="start" fill="var(--dim)">itself &#8212; your real work</text>

<!-- Card 4 — DIGITAL ASSET -->
<text x="1325" y="652" font-size="25" font-weight="700" text-anchor="start" fill="var(--purple)">DIGITAL ASSET</text>
<text x="1207" y="716" font-size="22" text-anchor="start" fill="var(--ink)">Build once, reuse it.</text>
<text x="1207" y="766" font-size="20" text-anchor="start" fill="var(--dim)">a proposal template</text>
<text x="1207" y="792" font-size="20" text-anchor="start" fill="var(--dim)">that must exist first</text>

<!-- takeaway + forward note + bridge -->
<text x="800" y="878" font-size="26" text-anchor="middle" fill="var(--ink)">These four marks are the language every PROCESS picture speaks &#8212;</text>
<text x="800" y="910" font-size="26" text-anchor="middle" fill="var(--ink)">the swimlanes, the system map, the roadmap's process items.</text>
<text x="800" y="946" font-size="20" text-anchor="middle" fill="var(--dim)">Your ASSETS get their own traffic light in Part 3 &#8212; a different question, a different scale.</text>
<text x="800" y="988" font-size="28" font-weight="700" text-anchor="middle" fill="var(--green)">Your steps are marked. Now do the same for your tools &#8212; see how your systems talk.</text>
</svg></body></html>
