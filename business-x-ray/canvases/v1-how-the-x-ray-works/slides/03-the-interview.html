<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --amber:rgb(214,140,40);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ LEFT — the chat panel ============ -->
  <rect x="70" y="248" width="700" height="558" rx="22" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>

  <!-- THE AI — canonical black-marker robot, top-left of chat -->
  <g stroke="var(--ink)" stroke-width="4">
    <line x1="155" y1="286" x2="155" y2="296"/>
    <rect x="119" y="296" width="72" height="48" rx="11"/>
    <rect x="133" y="309" width="44" height="22" rx="6" stroke-width="3"/>
    <line x1="155" y1="344" x2="155" y2="352"/>
    <rect x="123" y="352" width="64" height="54" rx="11"/>
    <line x1="123" y1="372" x2="103" y2="390"/>
    <line x1="187" y1="372" x2="207" y2="374"/>
  </g>
  <rect x="137" y="367" width="36" height="20" rx="4" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="155" cy="280" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="147" cy="326" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="163" cy="326" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>

  <!-- AI speech bubble + tail toward robot -->
  <rect x="250" y="290" width="500" height="118" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.02)"/>
  <polygon points="252,332 230,350 252,366" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>

  <!-- YOU stick figure, bottom-right of chat -->
  <g stroke="var(--green)" stroke-width="4">
    <circle cx="688" cy="548" r="27" fill="rgba(45,140,60,0.06)"/>
    <line x1="688" y1="575" x2="688" y2="648"/>
    <line x1="688" y1="600" x2="656" y2="628"/>
    <line x1="688" y1="600" x2="720" y2="628"/>
    <line x1="688" y1="648" x2="666" y2="690"/>
    <line x1="688" y1="648" x2="710" y2="690"/>
  </g>

  <!-- YOU reply bubble + tail toward YOU -->
  <rect x="118" y="500" width="472" height="96" rx="18" stroke="var(--green)" stroke-width="2.5" fill="rgba(45,140,60,0.07)"/>
  <polygon points="588,532 612,548 588,564" stroke="var(--green)" stroke-width="2.5" fill="rgba(45,140,60,0.07)"/>

  <!-- ============ RIGHT — the two passes ============ -->
  <!-- PASS 1 card -->
  <rect x="810" y="252" width="720" height="180" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <rect x="832" y="274" width="108" height="36" rx="10" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.03)"/>

  <!-- gate arrow through the lock: Pass 1 -> Pass 2 -->
  <line x1="860" y1="436" x2="860" y2="520" stroke="var(--amber)" stroke-width="3.5" stroke-dasharray="9 7"/>
  <polyline points="851,510 860,522 869,510" stroke="var(--amber)" stroke-width="3.5"/>
  <!-- lock glyph (the gate) -->
  <rect x="843" y="470" width="34" height="26" rx="5" stroke="var(--amber)" stroke-width="3" fill="rgba(214,140,40,0.10)"/>
  <path d="M849,470 Q849,454 860,454 Q871,454 871,470" stroke="var(--amber)" stroke-width="3"/>

  <!-- PASS 2 card -->
  <rect x="810" y="528" width="720" height="188" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <rect x="832" y="550" width="108" height="36" rx="10" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.03)"/>

  <!-- reassurance chip (dim, soft aside) -->
  <rect x="810" y="732" width="720" height="104" rx="16" stroke="var(--dim)" stroke-width="2" stroke-dasharray="2 6" fill="rgba(0,0,0,0.012)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + title + subtitle -->
<text x="70" y="66" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">PART 1 &#183; YOU CAN'T SEE IT</text>
<text x="800" y="120" font-size="50" font-weight="700" text-anchor="middle" fill="var(--ink)">It Interviews You. You Just Confirm.</text>
<text x="800" y="162" font-size="26" text-anchor="middle" fill="var(--dim)">The AI guesses from what it already knows &#8212; you confirm or correct, one question at a time.</text>

<!-- robot label -->
<text x="155" y="430" font-size="18" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI</text>

<!-- AI bubble text -->
<text x="272" y="330" font-size="25" text-anchor="start" fill="var(--ink)">Coaching business? Here's my guess</text>
<text x="272" y="364" font-size="25" text-anchor="start" fill="var(--ink)">at your flow: videos &#8594; email list</text>
<text x="272" y="398" font-size="25" text-anchor="start" fill="var(--ink)">&#8594; discovery calls &#8594; 1:1 clients?</text>

<!-- middle marker -->
<text x="420" y="456" font-size="20" text-anchor="middle" fill="var(--dim)">&#183; one question at a time, never a form &#183;</text>

<!-- YOU bubble text -->
<text x="150" y="542" font-size="27" font-weight="700" text-anchor="start" fill="var(--green)">Yes &#8212; plus a small course.</text>
<text x="150" y="574" font-size="19" text-anchor="start" fill="var(--dim)">you just confirm or correct the guess</text>

<!-- YOU figure label -->
<text x="688" y="554" font-size="18" font-weight="700" text-anchor="middle" fill="var(--green)">YOU</text>

<!-- ===== right column header ===== -->
<text x="810" y="230" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">HOW IT ASKS &#183; TWO PASSES</text>

<!-- PASS 1 -->
<text x="886" y="299" font-size="20" font-weight="700" text-anchor="middle" fill="var(--ink)">PASS 1</text>
<text x="962" y="300" font-size="30" font-weight="700" text-anchor="start" fill="var(--ink)">The funnel overview</text>
<text x="835" y="348" font-size="22" text-anchor="start" fill="var(--dim)">business type &#183; traffic &#183; offers &#183; team</text>
<text x="835" y="398" font-size="23" text-anchor="start" fill="var(--dim)">&#8594; feeds your</text>
<text x="1002" y="398" font-size="23" font-weight="700" text-anchor="start" fill="var(--ink)">Business Map + Bow-Tie</text>

<!-- GATE label -->
<text x="893" y="478" font-size="22" font-weight="700" text-anchor="start" fill="var(--amber)">deep pictures need Pass 2</text>
<text x="893" y="504" font-size="19" text-anchor="start" fill="var(--dim)">the AI never draws a deep map from shallow answers</text>

<!-- PASS 2 -->
<text x="886" y="575" font-size="20" font-weight="700" text-anchor="middle" fill="var(--ink)">PASS 2</text>
<text x="962" y="576" font-size="30" font-weight="700" text-anchor="start" fill="var(--ink)">The department walk</text>
<text x="835" y="624" font-size="22" text-anchor="start" fill="var(--dim)">step by step, department by department &#8212;</text>
<text x="835" y="654" font-size="22" text-anchor="start" fill="var(--dim)">who does what, which tools, where the time goes</text>
<text x="835" y="700" font-size="23" text-anchor="start" fill="var(--dim)">&#8594; feeds</text>
<text x="938" y="700" font-size="23" font-weight="700" text-anchor="start" fill="var(--ink)">every deeper map</text>

<!-- reassurance chip text -->
<text x="836" y="766" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">A guided conversation &#8212; minutes per department, not hours.</text>
<text x="836" y="794" font-size="18" text-anchor="start" fill="var(--dim)">It guesses from what it knows about businesses like yours;</text>
<text x="836" y="818" font-size="18" text-anchor="start" fill="var(--dim)">you just confirm.</text>

<!-- ===== takeaway bridge ===== -->
<text x="800" y="866" font-size="24" text-anchor="middle" fill="var(--dim)">You never sit and fill in a blank form.</text>
<text x="800" y="916" font-size="32" font-weight="700" text-anchor="middle" fill="var(--green)">A few confirmed answers in &#8212; and the first picture appears.</text>
</svg></body></html>
