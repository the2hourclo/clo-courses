<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --amber:rgb(214,140,40);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ THE FOUR CLOCKWISE LOOP ARCS (green = the engine of progress) ============ -->
  <!-- BUILD -> RESCORE -->
  <path d="M 915,356 Q 1035,372 1040,472" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="1032,458 1040,474 1049,458" stroke="var(--green)" stroke-width="3.5"/>
  <!-- RESCORE -> RE-SCAN -->
  <path d="M 1040,614 Q 1036,732 949,782" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="962,773 946,783 962,791" stroke="var(--green)" stroke-width="3.5"/>
  <!-- RE-SCAN -> NEXT RED -->
  <path d="M 651,782 Q 560,732 560,616" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="551,630 560,614 569,630" stroke="var(--green)" stroke-width="3.5"/>
  <!-- NEXT RED -> BUILD -->
  <path d="M 560,472 Q 566,372 673,356" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="660,347 676,356 668,371" stroke="var(--green)" stroke-width="3.5"/>

  <!-- ============ HUB — the one living X-Ray file, at the center ============ -->
  <rect x="712" y="494" width="176" height="104" rx="12" stroke="var(--ink)" stroke-width="2.5" fill="rgba(45,140,60,0.05)"/>
  <path d="M 866,494 L 866,510 L 888,510" stroke="var(--ink)" stroke-width="2.5"/>
  <!-- heartbeat = it's alive / it keeps changing -->
  <polyline points="726,558 758,558 770,536 783,580 797,540 807,558 874,558" stroke="var(--green)" stroke-width="3"/>

  <!-- ============ 1 · BUILD (top) ============ -->
  <rect x="675" y="248" width="250" height="116" rx="16" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="700" cy="276" r="15" stroke="var(--ink)" stroke-width="2.5"/>
  <!-- shipped check -->
  <polyline points="866,299 876,309 894,285" stroke="var(--green)" stroke-width="4.5"/>

  <!-- ============ 2 · RESCORE (right) ============ -->
  <rect x="915" y="474" width="250" height="138" rx="16" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="940" cy="500" r="15" stroke="var(--ink)" stroke-width="2.5"/>
  <!-- climbing arrow 34 -> 52 -->
  <path d="M 1030,600 L 1058,568" stroke="var(--green)" stroke-width="4"/>
  <polyline points="1047,568 1059,566 1057,579" stroke="var(--green)" stroke-width="4"/>

  <!-- ============ 4 · NEXT RED (left) ============ -->
  <rect x="406" y="474" width="266" height="138" rx="16" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="462" cy="500" r="15" stroke="var(--ink)" stroke-width="2.5"/>
  <!-- just-fixed tile (green) -> next-red tile (red) -->
  <rect x="474" y="558" width="38" height="24" rx="6" fill="rgba(45,140,60,0.16)" stroke="var(--green)" stroke-width="2.5"/>
  <polyline points="481,570 487,576 500,562" stroke="var(--green)" stroke-width="3"/>
  <line x1="518" y1="570" x2="552" y2="570" stroke="var(--ink)" stroke-width="2.5"/>
  <polyline points="545,564 555,570 545,576" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="560" y="558" width="38" height="24" rx="6" fill="rgba(214,69,58,0.13)" stroke="var(--red)" stroke-width="2.5"/>

  <!-- ============ 3 · RE-SCAN (bottom) — the AI reopens the file ============ -->
  <rect x="655" y="712" width="290" height="124" rx="16" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <circle cx="682" cy="738" r="15" stroke="var(--ink)" stroke-width="2.5"/>
  <!-- the .drawio file -->
  <rect x="678" y="764" width="32" height="40" rx="4" stroke="var(--ink)" stroke-width="2.5"/>
  <path d="M 700,764 L 700,772 L 710,772" stroke="var(--ink)" stroke-width="2.5"/>
  <line x1="685" y1="782" x2="703" y2="782" stroke="var(--dim)" stroke-width="2"/>
  <line x1="685" y1="791" x2="700" y2="791" stroke="var(--dim)" stroke-width="2"/>
  <!-- handed back to the AI -->
  <line x1="716" y1="792" x2="756" y2="792" stroke="var(--green)" stroke-width="3"/>
  <polyline points="748,786 758,792 748,798" stroke="var(--green)" stroke-width="3"/>
  <!-- the AI (compact canonical robot) — dropped 14px so the antenna clears the RE-SCAN title band -->
  <g stroke="var(--ink)" stroke-width="3">
    <line x1="787" y1="774" x2="787" y2="780"/>
    <rect x="768" y="780" width="38" height="28" rx="7"/>
    <rect x="774" y="810" width="26" height="9" rx="3"/>
  </g>
  <circle cx="787" cy="770" r="4" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="779" cy="795" r="3.4" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="795" cy="795" r="3.4" fill="var(--ink)" stroke="var(--ink)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + title + subtitle -->
<text x="80" y="66" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">PART 5 &#183; ACT ON IT</text>
<text x="800" y="114" font-size="50" font-weight="700" text-anchor="middle" fill="var(--ink)">The X-Ray Is a Loop, Not an Event</text>
<text x="800" y="154" font-size="25" text-anchor="middle" fill="var(--dim)">Build, rescore, re-scan, repeat &#8212; the map keeps working long after the first pass.</text>

<!-- ===== HUB label ===== -->
<text x="800" y="528" font-size="21" font-weight="700" text-anchor="middle" fill="var(--ink)">YOUR X-RAY</text>
<text x="800" y="632" font-size="18" text-anchor="middle" fill="var(--dim)">one file &#183; a living document</text>

<!-- ===== 1 · BUILD ===== -->
<text x="700" y="283" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">1</text>
<text x="732" y="290" font-size="26" font-weight="700" text-anchor="start" fill="var(--ink)">BUILD</text>
<text x="700" y="336" font-size="20" text-anchor="start" fill="var(--dim)">ship a roadmap item</text>

<!-- ===== 2 · RESCORE ===== -->
<text x="940" y="507" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">2</text>
<text x="972" y="514" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">RESCORE</text>
<text x="935" y="546" font-size="16" text-anchor="start" fill="var(--dim)">same 24 tiles &#183; quarterly</text>
<text x="985" y="596" font-size="30" font-weight="700" text-anchor="middle" fill="var(--amber)">34</text>
<text x="1098" y="596" font-size="34" font-weight="700" text-anchor="middle" fill="var(--green)">52</text>
<text x="1180" y="583" font-size="16" font-weight="700" text-anchor="start" fill="var(--green)">target: 70+</text>
<text x="1180" y="605" font-size="16" text-anchor="start" fill="var(--dim)">runs without you</text>
<text x="1180" y="632" font-size="16" text-anchor="start" fill="var(--dim)">worked example numbers</text>

<!-- ===== 4 · NEXT RED ===== -->
<text x="462" y="507" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">4</text>
<text x="494" y="514" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">NEXT RED</text>
<text x="426" y="546" font-size="16" text-anchor="start" fill="var(--dim)">fix one &#8212; the next surfaces</text>
<text x="493" y="604" font-size="16" font-weight="700" text-anchor="middle" fill="var(--green)">just fixed</text>
<text x="579" y="604" font-size="16" font-weight="700" text-anchor="middle" fill="var(--red)">next red</text>

<!-- ===== 3 · RE-SCAN ===== -->
<text x="682" y="745" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">3</text>
<text x="714" y="752" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">RE-SCAN</text>
<text class="mono" x="690" y="824" font-size="16" text-anchor="start" fill="var(--dim)">.drawio</text>
<text x="818" y="770" font-size="17" font-weight="700" text-anchor="start" fill="var(--green)">picks up</text>
<text x="818" y="792" font-size="17" font-weight="700" text-anchor="start" fill="var(--green)">where you</text>
<text x="818" y="814" font-size="17" font-weight="700" text-anchor="start" fill="var(--green)">left off</text>

<!-- ===== SEED DIRECT — the close ===== -->
<text x="800" y="946" font-size="27" text-anchor="middle" fill="var(--ink)">Your map is now a living document &#8212; see it, watch it improve, hand it off piece by piece.</text>
<text x="800" y="998" font-size="31" font-weight="700" text-anchor="middle" fill="var(--green)">Run it again in 90 days &#8212; that&#8217;s the whole game.</text>
</svg></body></html>
