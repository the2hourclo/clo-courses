<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --amber:rgb(214,140,40);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ LEFT PANEL — the score itself, on a gauge ============ -->
  <rect x="90" y="250" width="680" height="560" rx="20" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>

  <!-- gauge bands: red 0-30 (owner-run) · amber 31-69 (partial) · green 70-100 (free) -->
  <path d="M 260 560 A 170 170 0 0 0 330.1 422.5" stroke="var(--red)" stroke-width="17"/>
  <path d="M 330.1 422.5 A 170 170 0 0 0 529.9 422.5" stroke="var(--amber)" stroke-width="17"/>
  <path d="M 529.9 422.5 A 170 170 0 0 0 600 560" stroke="var(--green)" stroke-width="17"/>

  <!-- needle pointing to 34 -->
  <line x1="430" y1="560" x2="348" y2="411" stroke="var(--ink)" stroke-width="5"/>
  <circle cx="430" cy="560" r="9" fill="var(--ink)" stroke="var(--ink)"/>

  <!-- ============ RIGHT PANEL — what the number is FOR (trajectory) ============ -->
  <rect x="830" y="250" width="680" height="560" rx="20" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>

  <!-- baseline -->
  <line x1="920" y1="720" x2="1420" y2="720" stroke="var(--ink)" stroke-width="2.5"/>

  <!-- 70 = runs-without-you threshold (green dashed) -->
  <line x1="920" y1="510" x2="1440" y2="510" stroke="var(--green)" stroke-width="2.5" stroke-dasharray="10 8"/>

  <!-- TODAY bar = 34 (amber) -->
  <rect x="962" y="618" width="96" height="102" rx="6" stroke="var(--amber)" stroke-width="2.5" fill="rgba(214,140,40,0.16)"/>
  <!-- AFTER-CYCLE-ONE bar = ~52 (green) -->
  <rect x="1282" y="564" width="96" height="156" rx="6" stroke="var(--green)" stroke-width="2.5" fill="rgba(45,140,60,0.16)"/>

  <!-- progress arrow: today -> after -->
  <path d="M 1066 604 Q 1185 566 1276 570" stroke="var(--green)" stroke-width="4"/>
  <polyline points="1264,563 1278,570 1264,577" stroke="var(--green)" stroke-width="4"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + title + subtitle -->
<text x="80" y="66" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">PART 3 &#183; SCORE WHAT YOU HAVE</text>
<text x="800" y="114" font-size="50" font-weight="700" text-anchor="middle" fill="var(--ink)">The Leverage Score &#8212; How Much Runs Without You</text>
<text x="800" y="158" font-size="25" text-anchor="middle" fill="var(--dim)">One number: the share of the business that keeps running when the owner steps away.</text>

<!-- ===== LEFT panel: the gauge ===== -->
<text x="430" y="234" font-size="20" font-weight="700" text-anchor="middle" fill="var(--dim)">YOUR LEVERAGE SCORE</text>

<!-- big number -->
<text x="430" y="656" text-anchor="middle"><tspan font-size="76" font-weight="700" fill="var(--ink)">34</tspan><tspan font-size="34" fill="var(--dim)">/100</tspan></text>

<!-- plain meaning -->
<text x="430" y="710" font-size="22" text-anchor="middle" fill="var(--ink)">Two-thirds of the business only moves when you push it.</text>

<!-- gauge band legend (states what the colors mean) — split so each box is measurable -->
<text x="240" y="752" font-size="18" text-anchor="middle" fill="var(--red)">0&#8211;30 owner-run</text>
<text x="358" y="752" font-size="18" text-anchor="middle" fill="var(--dim)">&#183;</text>
<text x="445" y="752" font-size="18" text-anchor="middle" fill="var(--amber)">31&#8211;69 partial</text>
<text x="540" y="752" font-size="18" text-anchor="middle" fill="var(--dim)">&#183;</text>
<text x="620" y="752" font-size="18" text-anchor="middle" fill="var(--green)">70+ runs free</text>

<!-- ===== RIGHT panel: trajectory ===== -->
<text x="1170" y="234" font-size="20" font-weight="700" text-anchor="middle" fill="var(--dim)">WHAT THE NUMBER IS FOR</text>

<!-- threshold label -->
<text x="928" y="502" font-size="18" font-weight="700" text-anchor="start" fill="var(--green)">70+ = runs without you</text>

<!-- bar value labels -->
<text x="1010" y="608" font-size="30" font-weight="700" text-anchor="middle" fill="var(--amber)">34</text>
<text x="1330" y="554" font-size="30" font-weight="700" text-anchor="middle" fill="var(--green)">~52</text>

<!-- bar base labels -->
<text x="1010" y="750" font-size="21" font-weight="700" text-anchor="middle" fill="var(--dim)">TODAY</text>
<text x="1330" y="750" font-size="21" font-weight="700" text-anchor="middle" fill="var(--dim)">AFTER CYCLE ONE</text>

<!-- right caption -->
<text x="1170" y="792" font-size="19" text-anchor="middle" fill="var(--dim)">Re-score the same 24 tiles each quarter &#8212; your progress meter.</text>

<!-- ===== takeaway bridge into Act 4 ===== -->
<text x="800" y="882" font-size="28" text-anchor="middle" fill="var(--ink)">Now you know what you have &#8212; and what's missing.</text>
<text x="800" y="930" font-size="30" font-weight="700" text-anchor="middle" fill="var(--green)">Time for the fun part &#8212; the same business, redrawn with AI Employees inside.</text>
</svg></body></html>
