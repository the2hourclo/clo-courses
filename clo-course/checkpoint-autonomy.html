<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map the business — AI Employee Builder</title>
<meta name="description" content="Checkpoint 1 — run your Business X-Ray and pick the highest-leverage thing to automate first.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="journey.css?v=3">
<style>
body{min-height:100vh;background:radial-gradient(1000px 560px at 50% -240px,color-mix(in srgb,var(--cp) 8%,transparent),transparent 70%),var(--bg)}
.wrap{max-width:640px;margin:0 auto;padding:0 20px 70px}

/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0 6px;gap:12px}
.back{font-size:13px;font-weight:700;color:var(--text-muted);display:inline-flex;align-items:center;gap:6px}
.back:hover{color:var(--cp);text-decoration:none}
.cp-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;padding:5px 12px;border-radius:20px;background:color-mix(in srgb,var(--cp) 16%,transparent);color:var(--cp);border:1px solid color-mix(in srgb,var(--cp) 34%,transparent)}
.cp-badge .cdot{width:8px;height:8px;border-radius:50%;background:var(--cp)}

/* surface toggle (Cowork vs Claude Code) */
.surface-row{display:flex;align-items:center;gap:10px;margin-top:12px}
.surface-label{font-size:12px;font-weight:700;color:var(--text-dim)}
.surface-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border-2);border-radius:20px;padding:3px;gap:3px}
.sbtn{font-family:var(--font-body);font-size:12px;font-weight:700;padding:5px 14px;border-radius:16px;border:0;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.sbtn:hover{color:var(--text)}
.sbtn.active{background:color-mix(in srgb,var(--cp) 18%,transparent);color:var(--cp)}

/* wizard bar */
.wizbar{margin:16px 0 22px}
.wiztop{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.wizcount{font-family:var(--font-display);font-size:15px;font-weight:800}
.wizcount b{color:var(--cp)}
.wizeta{font-size:12.5px;color:var(--text-muted);font-weight:600}
.wbar{height:8px;border-radius:6px;background:var(--surface-3);overflow:hidden}
.wfill{height:100%;width:0;background:linear-gradient(90deg,var(--cp),color-mix(in srgb,var(--cp) 55%,#fff));border-radius:6px;transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* step card */
.step{background:var(--surface);border:1px solid color-mix(in srgb,var(--cp) 30%,var(--border));border-radius:var(--radius-lg);padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.4)}
.step-type{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--cp);background:color-mix(in srgb,var(--cp) 14%,transparent);padding:3px 10px;border-radius:6px;margin-bottom:13px}
.step h2{font-family:var(--font-display);font-size:23px;font-weight:800;letter-spacing:-.5px;line-height:1.15;margin-bottom:11px}
.step p{color:var(--text-muted);font-size:15px;line-height:1.6;margin-bottom:12px}
.step p:last-child{margin-bottom:0}
.video{position:relative;width:100%;padding-top:56.25%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border-2);margin:4px 0 16px;background:#000}
.video iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.video-slot{position:relative;width:100%;padding-top:52%;border-radius:var(--radius);border:1px dashed var(--border-2);margin:4px 0 16px;background:var(--surface-2)}
.video-slot span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--text-dim)}
.cmd{display:flex;align-items:center;gap:10px;background:#070807;border:1px solid var(--border-2);border-radius:var(--radius);padding:12px 14px;margin:6px 0 14px}
.cmd .txt{flex:1;font-family:var(--font-mono);font-size:14px;color:var(--cp);white-space:pre-wrap;word-break:break-word}
.copy{flex-shrink:0;font-size:11px;font-weight:700;padding:6px 12px;border-radius:6px;border:1px solid var(--border-2);background:var(--surface);color:var(--text-muted);cursor:pointer;font-family:var(--font-body);transition:all .15s}
.copy:hover{border-color:var(--cp);color:var(--cp)}
.copy.copied{background:var(--cp);color:#0a0a0a;border-color:var(--cp)}
.gate{background:var(--surface-2);border:1px solid var(--border-2);border-left:3px solid var(--cp);border-radius:var(--radius);padding:13px 15px;margin-top:6px}
.gate .gl{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--cp);margin-bottom:5px}
.gate .gb{font-size:14px;color:var(--text-muted);line-height:1.55}
.gate .gb strong{color:var(--text)}

/* download button (real button, not a text link) */
.dl-btn{display:inline-block;padding:12px 26px;background:var(--cp);color:#0a0a0a;border-radius:var(--radius);font-weight:800;font-size:14px;text-decoration:none;margin:6px 0 4px}
.dl-btn:hover{filter:brightness(1.07);text-decoration:none;color:#0a0a0a}

/* sub bullet points inside a step body */
.step ul.sub{margin:9px 0 11px;padding:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.step ul.sub li{position:relative;padding-left:20px;color:var(--text-muted);font-size:14.5px;line-height:1.55}
.step ul.sub li::before{content:'';position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:color-mix(in srgb,var(--cp) 70%,transparent)}
.step ul.sub li strong{color:var(--text)}

/* nav */
.nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:18px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border-radius:10px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover:not(:disabled){border-color:var(--cp);color:var(--cp)}
.btn:disabled{opacity:.32;cursor:not-allowed}
.btn.primary{background:var(--cp);color:#0a0a0a;border-color:var(--cp)}
.btn.primary:hover{filter:brightness(1.06)}

/* completion */
.done-screen{text-align:center;background:linear-gradient(160deg,color-mix(in srgb,var(--cp) 16%,var(--surface)),var(--surface) 66%);border:1px solid color-mix(in srgb,var(--cp) 40%,transparent);border-radius:var(--radius-lg);padding:40px 26px;box-shadow:0 18px 60px rgba(0,0,0,.4)}
.done-screen .big{font-size:42px}
.done-screen h2{font-family:var(--font-display);font-size:26px;font-weight:800;margin:10px 0 8px}
.done-screen p{color:var(--text-muted);max-width:440px;margin:0 auto 22px}
.done-cta{display:flex;flex-direction:column;align-items:center;gap:13px}
.done-screen .big-cta{font-size:15.5px;padding:14px 32px;box-shadow:0 10px 30px color-mix(in srgb,var(--cp) 30%,transparent)}
.done-screen .board-link{font-size:13px;font-weight:700;color:var(--text-muted)}
.done-screen .board-link:hover{color:var(--cp);text-decoration:none}
</style>
<link rel="stylesheet" href="excalifont.css">
</head>
<body>
<div class="wrap">

  <div class="topbar rise">
    <a class="back" id="backLink" href="ai-employee-board.html">← Back to board</a>
    <span class="cp-badge"><span class="cdot"></span><span id="cpName"></span></span>
  </div>

  <div class="surface-row rise">
    <span class="surface-label">I build in:</span>
    <div class="surface-toggle">
      <button class="sbtn" id="sb-cowork" onclick="setSurface('cowork')">Cowork</button>
      <button class="sbtn" id="sb-cc" onclick="setSurface('claude-code')">Claude Code</button>
    </div>
  </div>

  <div class="wizbar rise">
    <div class="wiztop"><span class="wizcount" id="wizCount"></span><span class="wizeta" id="wizEta"></span></div>
    <div class="wbar"><div class="wfill" id="wizFill"></div></div>
  </div>

  <div id="stage" class="rise"></div>

</div>

<script src="progress.js?v=2"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   CHECKPOINT WIZARD — reusable template.
   To build another checkpoint: copy this file, change CONFIG, done.
   Each step: { type:'video'|'build'|'gate', title, body(HTML),
                video?:embedURL, command?:'do this in Claude', gate?:HTML }
   ═══════════════════════════════════════════════════════════════ */
var CONFIG = {
  id: 'cp4',
  name: 'Make it run itself',
  color: '#f472b6',
  board: 'ai-employee-board.html',
  steps: [
    { type:'video', title:'Review + harden',
      video:'', slotLabel:'📹 Explainer — coming soon',
      demoSlot:true, demoLabel:'🎬 Demo · watch me harden one — coming soon',
      command:'Harden this skill so it checks its own work and fails loudly instead of handing me something wrong. Walk me through it: find the ways it could quietly produce a bad result, then bake in a self-check that stops and tells me which line is wrong, plus a set of tests so the same mistake can never come back silently.',
      body:'Before you let it run alone, tighten it. <strong>Hardening</strong> makes the skill check its own work and fail loudly instead of quietly, so you can trust the output without re-reading every line. Just say <em>&ldquo;harden this skill&rdquo;</em> — the AI bakes in a self-check gate and a set of tests (an eval scorecard) so a bad result gets caught before it ever reaches you.' },

    { type:'video', title:'Build a harness',
      video:'', slotLabel:'📹 Explainer — coming soon',
      demoSlot:true, demoLabel:'🎬 Demo · watch me wrap the rig — coming soon',
      command:'Build a harness around this skill so its quality holds when I am not watching. I want an independent reviewer that did not write the output, a fix-and-retry loop with a hard cap so it can never run away, and a final check that confirms the work actually landed where it should instead of trusting what the AI reported.',
      body:'A <strong>harness</strong> is the set of guardrails and checks <em>around</em> a skill that hold its quality steady when you are not watching — an independent reviewer, a capped fix-and-retry loop, and a reality-check that confirms the work actually got done. Say <em>&ldquo;build a harness around this&rdquo;</em> and the AI builds the rig. Hardening makes the skill check itself; the harness is the second set of eyes that catches what it missed.' },

    { type:'video', title:'Schedule it / autonomy',
      video:'', slotLabel:'📹 Explainer — coming soon',
      demoSlot:true, demoLabel:'🎬 Demo · watch me schedule one — coming soon',
      command:'Put this skill on a schedule so it runs on its own and reports back. First check it has earned it — that it is proven on real work and safe to run unattended. Then pin the cadence, where it gets its input, where the result lands, and how I get notified. Anything risky must draft for my approval instead of sending on its own.',
      body:'The last piece is <strong>time</strong>. Put the system on a schedule or a trigger so it runs on its own and reports back, instead of waiting for you to ask — say <em>&ldquo;schedule this to run every Monday&rdquo;</em>. Anything risky (like sending to a client) drafts for your approval instead of firing on its own. And as your library grows, say <em>&ldquo;audit my skill library&rdquo;</em> — the <strong>audit-library</strong> skill checks every skill for overlaps and gaps and keeps the whole set clean.' },

    { type:'build', title:'Run autonomously or self-improve',
      video:'', demoSlot:true, demoLabel:'🎬 Demo · watch a correction stick — coming soon',
      command:'I want to correct this AI Employee once and have the fix stick for next time. Take the correction I am about to give you, write it back into the skill&#39;s own files so future runs already know it, and show me the exact line you added.',
      body:'Add the harness and the schedule (or just say <em>&ldquo;put this on autopilot&rdquo;</em>). From here the AI runs the function on its own and gets sharper each time you correct it — that is the <strong>retrospective</strong> skill: flag a miss with <em>&ldquo;note-friction&rdquo;</em> (or a win with <em>&ldquo;note-win&rdquo;</em>), then run <em>&ldquo;/review-retro&rdquo;</em> and your correction gets written back into the skill so next time it is already fixed. <strong>You review, it runs.</strong>' },

    { type:'gate', title:'It runs on its own',
      body:'Confirm the system runs without you kicking it off, and that when you correct it, the fix sticks for next time.',
      gate:'Your AI Employee runs a whole function <strong>on its own</strong> and improves when you correct it. That is <strong>Your AI Employee</strong> built. &#127881;' }
  ]
};

document.documentElement.style.setProperty('--cp', CONFIG.color);
document.getElementById('cpName').textContent = CONFIG.name;
document.getElementById('backLink').href = CONFIG.board;
document.title = CONFIG.name + ' — AI Employee Builder';

/* Surface (Cowork vs Claude Code) — shared with the board via localStorage.
   Steps may carry surface:'cowork'|'claude-code'; no surface = shown on both. */
var SURFACE_STORE = 'aieb_surface';
var surface = 'cowork';
try { var ss = localStorage.getItem(SURFACE_STORE); if (ss==='cowork'||ss==='claude-code') surface = ss; } catch(e){}
function activeSteps(){ return CONFIG.steps.filter(function(st){ return !st.surface || st.surface===surface; }); }
function paintSurface(){
  document.getElementById('sb-cowork').classList.toggle('active', surface==='cowork');
  document.getElementById('sb-cc').classList.toggle('active', surface==='claude-code');
}
function setSurface(s){
  surface = s;
  try { localStorage.setItem(SURFACE_STORE, s); } catch(e){}
  pos = Math.min(pos, activeSteps().length); save();
  paintSurface(); render();
}

var STORE = 'aieb_ckpt_'+CONFIG.id+'_v4'; // bump whenever the step ORDER changes — resets positions saved against the old order (v4: optional "Read & share your X-Ray" step inserted before the gate)
var pos = 0; // current step index (0..steps.length). steps.length = completion screen.
try { var saved = parseInt(localStorage.getItem(STORE),10); if(!isNaN(saved)) pos = Math.min(saved, activeSteps().length); } catch(e){}

function save(){ try { localStorage.setItem(STORE, String(pos)); localStorage.setItem(STORE+'_n', String(activeSteps().length)); } catch(e){} }
function copyCmd(btn){
  var t = btn.parentElement.querySelector('.txt').textContent.trim();
  navigator.clipboard.writeText(t).then(function(){
    var o=btn.textContent; btn.textContent='Copied!'; btn.classList.add('copied');
    setTimeout(function(){ btn.textContent=o; btn.classList.remove('copied'); },1400);
  });
}
var TYPE = { video:'📹 Watch', build:'🔨 Build', share:'📤 Share', gate:'🎯 Done-signal' };

function render(){
  var steps = activeSteps();
  var n = steps.length;
  var fill = document.getElementById('wizFill'), count = document.getElementById('wizCount'), eta = document.getElementById('wizEta');
  var stage = document.getElementById('stage');

  if (pos >= n){ // completion — congratulate, mark this checkpoint done, then continue FORWARD
    count.innerHTML='All done &#127881;'; eta.textContent=''; fill.style.width='100%';
    if (window.AIEB) AIEB.markDone(CONFIG.id);
    var nx = window.AIEB ? AIEB.next(CONFIG.id) : null;
    var lead, cta;
    if (nx && nx.wizard){        // a real next checkpoint → continuing is the loud, primary action
      lead = '<strong>'+CONFIG.name+'</strong> is done — and <strong>'+nx.name+'</strong> just unlocked. Keep the momentum going.';
      cta  = '<a class="btn primary big-cta" style="--cp:'+nx.color+'" href="'+nx.wizard+'">Next: '+nx.name+' &#8594;</a>'+
             '<a class="board-link" href="'+CONFIG.board+'">or go to your board</a>';
    } else if (nx && nx.isGoal){ // finished the LAST checkpoint → the finale
      lead = 'That was the last one. Your AI Employee is built — it runs the work and gets sharper every time you use it.';
      cta  = '<a class="btn primary big-cta" href="'+CONFIG.board+'">&#127881; See it on your board &#8594;</a>';
    } else {
      lead = '<strong>'+CONFIG.name+'</strong> is done.';
      cta  = '<a class="btn primary big-cta" href="'+CONFIG.board+'">← Back to your board</a>';
    }
    stage.innerHTML = '<div class="done-screen"><div class="big">🎉</div>'+
      '<h2>Checkpoint complete</h2>'+
      '<p>'+lead+'</p>'+
      '<div class="done-cta">'+cta+'</div></div>';
    return;
  }

  var s = steps[pos];
  count.innerHTML='Step <b>'+(pos+1)+'</b> of '+n;
  eta.textContent = s.type==='gate' ? 'the gate' : (s.optional ? 'optional — skip anytime' : '');
  fill.style.width = Math.round(100*(pos+1)/n)+'%';

  var h = '<div class="step">';
  h += '<span class="step-type">'+(TYPE[s.type]||'')+(s.optional?' · optional':'')+'</span>';
  h += '<h2>'+s.title+'</h2>';
  if (s.video){ h += '<div class="video"><iframe src="'+s.video+'" title="'+s.title+'" allowfullscreen allow="fullscreen" loading="lazy"></iframe></div>'; }
  else if (s.type==='video' || s.videoSlot){ h += '<div class="video-slot"><span>'+(s.slotLabel||'🎬 Video coming soon')+'</span></div>'; }
  if (s.demo){ h += '<div class="video"><iframe src="'+s.demo+'" title="'+s.title+' — demo" allowfullscreen allow="fullscreen" loading="lazy"></iframe></div>'; }
  else if (s.demoSlot){ h += '<div class="video-slot"><span>'+(s.demoLabel||'🎬 Demo coming soon')+'</span></div>'; }
  if (s.body){ h += '<p>'+s.body+'</p>'; }
  if (s.command){ h += '<div class="cmd"><span class="txt">'+s.command+'</span><button class="copy" onclick="copyCmd(this)">Copy</button></div>'; }
  if (s.gate){ h += '<div class="gate"><div class="gl">🔓 Unlocks the next checkpoint when</div><div class="gb">'+s.gate+'</div></div>'; }

  // nav
  h += '<div class="nav">';
  h += '<button class="btn" onclick="back()">← Back</button>';
  h += pos===n-1
      ? '<button class="btn primary" onclick="next()">Finish checkpoint →</button>'
      : '<button class="btn primary" onclick="next()">Next →</button>';
  h += '</div>';
  h += '</div>';
  stage.innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function next(){ pos = Math.min(pos+1, activeSteps().length); save(); render(); }
function back(){ if (pos<=0){ window.location.href = CONFIG.board; return; } pos--; save(); render(); }

paintSurface();
render();
</script>
</body>
</html>
