<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your AI Employee — Build Board</title>
<meta name="description" content="Your whole build journey on one board. Each checkpoint is a column; finish its cards in Claude and the next checkpoint unlocks — no skipping ahead.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0c;
  --surface:#131413;
  --surface-2:#191a19;
  --surface-3:#202220;
  --border:#1e201e;
  --border-2:#2a2c2a;
  --text:#e7e9e4;
  --text-muted:#9ea3a0;
  --text-dim:#5c605c;
  --accent:#79EA20;
  --accent-dim:rgba(121,234,32,.08);
  --accent-border:rgba(121,234,32,.35);
  --radius:9px;
  --radius-lg:14px;
  --font-display:'Bricolage Grotesque',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-body:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Monaco','Consolas',monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;background:radial-gradient(1200px 640px at 50% -260px,rgba(121,234,32,.06),transparent 70%),var(--bg)}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
strong{font-weight:700;color:var(--text)}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.rise{animation:rise .5s cubic-bezier(.2,.7,.2,1) both}

/* ── HEADER ── */
.head{max-width:1180px;margin:0 auto;padding:26px 24px 4px;text-align:center}
.brand-badge{display:inline-block;font-size:11px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border);padding:5px 12px;border-radius:30px;margin-bottom:14px}
.head h1{font-family:var(--font-display);font-size:34px;font-weight:800;letter-spacing:-.8px;line-height:1.1;margin-bottom:11px}
.head p{font-size:15.5px;color:var(--text-muted);max-width:640px;margin:0 auto;line-height:1.6}
@media(max-width:640px){.head h1{font-size:26px}}

/* progress line */
.prog{max-width:560px;margin:18px auto 0}
.prog .bar{height:7px;border-radius:6px;background:var(--surface-3);overflow:hidden;margin-bottom:8px}
.prog .fill{height:100%;width:0;background:linear-gradient(90deg,#4ade80,#5b9bff,#a78bfa,#f5a623,#f472b6,#fbbf24);border-radius:6px;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.prog .t{font-size:12.5px;font-weight:600;color:var(--text-muted);text-align:center}
.prog .t b{color:var(--accent)}

.note{max-width:820px;margin:20px auto 0;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text-muted);line-height:1.55}
.note strong{color:#bff58a}

/* ── BOARD ── */
.board-wrap{overflow-x:auto;padding:22px 24px 60px}
.board{display:flex;gap:13px;width:max-content;margin:0 auto}
.col{flex:0 0 250px;width:250px;display:flex;flex-direction:column;gap:9px}
.col-head{display:flex;align-items:center;gap:8px;padding:2px 4px 6px;position:sticky;top:0}
.col-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-display);font-size:13px;font-weight:800;letter-spacing:.2px;padding:4px 11px;border-radius:7px;background:color-mix(in srgb,var(--cp) 16%,transparent);color:var(--cp);border:1px solid color-mix(in srgb,var(--cp) 32%,transparent)}
.col-pill .cdot{width:8px;height:8px;border-radius:50%;background:var(--cp)}
.col-count{font-size:12px;font-weight:700;color:var(--text-dim)}
.col-state{margin-left:auto;font-size:11px;font-weight:700}
.col-state.done{color:#4ade80}
.col-state.active{color:var(--cp)}
.col-state.locked{color:var(--text-dim)}

.col-body{background:color-mix(in srgb,var(--cp) 5%,var(--surface));border:1px solid var(--border);border-top:3px solid var(--cp);border-radius:var(--radius-lg);padding:11px;display:flex;flex-direction:column;gap:11px;min-height:100px}
.col.active .col-body{border-color:color-mix(in srgb,var(--cp) 40%,transparent);box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px color-mix(in srgb,var(--cp) 22%,transparent)}
.col.locked .col-body{opacity:.72}

/* ── CARDS ── */
.kcard{background:var(--surface-2);border:1px solid var(--border-2);border-radius:10px;padding:13px 14px;transition:transform .13s,box-shadow .13s,border-color .13s;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.kcard:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--cp) 34%,var(--border-2));box-shadow:0 8px 22px rgba(0,0,0,.42)}
.kcard .ktitle{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;display:flex;gap:8px;align-items:flex-start}
.kcard .kic{flex-shrink:0;font-size:15px;line-height:1.34}
.kcard.is-done .ktitle{color:var(--text-muted)}
.ktags{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.tag{font-size:10.5px;font-weight:700;letter-spacing:.2px;padding:3px 9px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
/* type tag (muted) */
.tag.type{background:var(--surface-3);color:var(--text-muted);border:1px solid var(--border-2)}
/* status tags — Notion-style colours */
.tag.st-todo{background:rgba(158,163,160,.14);color:#b9beba}
.tag.st-doing{background:rgba(91,155,255,.16);color:#8db4ff}
.tag.st-done{background:rgba(74,222,128,.15);color:#6fe39a}
.tag.st-todo::before{content:'○';font-size:9px}
.tag.st-doing::before{content:'◐';font-size:9px}
.tag.st-done::before{content:'●';font-size:9px}

.footer{text-align:center;padding:8px 24px 50px;font-size:13px;color:var(--text-dim)}
.footer a{font-weight:600}
</style>
</head>
<body>

<div class="head rise">
  <span class="brand-badge">🤖 AI Employee Builder</span>
  <h1>Your AI Employee — Build Board</h1>
</div>

<div class="board-wrap rise">
  <div class="board" id="board"></div>
</div>

<div class="footer">
  New here? <a href="get-access-aieb.html">Start with Get Access →</a> &nbsp;·&nbsp; Questions? <a href="https://www.polynet.ai/c/ai-employee-builders" target="_blank" rel="noopener">Polynet community</a>
</div>

<script>
/* ──────────────────────────────────────────────────────────────
   THE BOARD — one column per checkpoint (from the locked drawio
   build-checkpoint map). Each card is a task inside that checkpoint
   with a TYPE and a STATUS property. Order is fixed: finish a
   checkpoint's cards to unlock the next one.
   ────────────────────────────────────────────────────────────── */
var TYPES = {
  action: { label:'Action',      ic:'⚡' },
  video:  { label:'Watch',       ic:'📹' },
  build:  { label:'Build',       ic:'🔨' },
  gate:   { label:'Done-signal', ic:'🎯' },
  outcome:{ label:'Outcome',     ic:'🌟' }
};

var BOARD = [
  { id:'setup', name:'Set up', color:'#4ade80', state:'done', cards:[
    { t:'Join the community',            type:'action', status:'done' },
    { t:'Install the plugin + connect',  type:'action', status:'done' },
    { t:'Onboard — run /setup-aieb',     type:'action', status:'done' },
    { t:'Welcome — what you just built', type:'video',  status:'done' }
  ]},
  { id:'cp1', name:'Map the business', color:'#5b9bff', state:'active', cards:[
    { t:'Why the X-Ray interview works',            type:'video', status:'todo' },
    { t:'Run your Business X-Ray',                  type:'build', status:'doing' },
    { t:'X-Ray map exists + “N hrs/week” baseline', type:'gate',  status:'todo' }
  ]},
  { id:'cp2', name:'Your first skill', color:'#a78bfa', state:'locked', cards:[
    { t:'What is a skill',                 type:'video', status:'todo' },
    { t:'The 3 levels of skills',          type:'video', status:'todo' },
    { t:'How to create a skill',           type:'video', status:'todo' },
    { t:'Turn 1 real process into a skill',type:'build', status:'todo' },
    { t:'Skill ran once on real data',     type:'gate',  status:'todo' }
  ]},
  { id:'cp3', name:'A skill system', color:'#f5a623', state:'locked', cards:[
    { t:'Build a skill system',        type:'video', status:'todo' },
    { t:'Wire skills into one system', type:'build', status:'todo' },
    { t:'System runs a whole function',type:'gate',  status:'todo' }
  ]},
  { id:'cp4', name:'Make it run itself', color:'#f472b6', state:'locked', cards:[
    { t:'Review + harden',                 type:'video', status:'todo' },
    { t:'Build a harness',                 type:'video', status:'todo' },
    { t:'Schedule it / autonomy',          type:'video', status:'todo' },
    { t:'Run autonomously or self-improve',type:'build', status:'todo' },
    { t:'It runs on its own',              type:'gate',  status:'todo' }
  ]},
  { id:'goal', name:'Your AI Employee', color:'#fbbf24', state:'locked', cards:[
    { t:'Runs (or self-improves)',            type:'outcome', status:'todo' },
    { t:'Gets better every time you use it',  type:'outcome', status:'todo' }
  ]}
];

/* ──────────────────────────────────────────────────────────────
   Progress + states are STUBBED here (just-onboarded). Later, swap
   this for a live fetch of the buyer's real state:
     GET https://aieb-gated-mcp.vercel.app/api/progress?key=<license>
   → sets each column's `state` and each card's `status`, driven by
   Claude's report_outcome done-signals.
   ────────────────────────────────────────────────────────────── */

// Being ON the board already means "to do" — so only In progress / Completed get a tag.
var STATUS = { doing:'In progress', done:'Completed' };

function esc(s){ return (s||'').replace(/&(?![a-z#0-9]+;)/gi,'&amp;'); }

function cardHTML(card){
  var ty = TYPES[card.type] || TYPES.action;
  var h = '<div class="kcard is-'+card.status+'">';
  h += '<div class="ktitle"><span class="kic">'+ty.ic+'</span><span>'+card.t+'</span></div>';
  h += '<div class="ktags">';
  h += '<span class="tag type">'+ty.label+'</span>';
  if (STATUS[card.status]) h += '<span class="tag st-'+card.status+'">'+STATUS[card.status]+'</span>';
  h += '</div></div>';
  return h;
}

function colHTML(col){
  var stateLabel = col.state==='done' ? '✓ Done' : col.state==='active' ? '● Now' : '🔒 Locked';
  var h = '<div class="col '+col.state+'" style="--cp:'+col.color+'">';
  h += '<div class="col-head">';
  h += '<span class="col-pill"><span class="cdot"></span>'+col.name+'</span>';
  h += '<span class="col-count">'+col.cards.length+'</span>';
  h += '<span class="col-state '+col.state+'">'+stateLabel+'</span>';
  h += '</div>';
  h += '<div class="col-body">'+col.cards.map(cardHTML).join('')+'</div>';
  h += '</div>';
  return h;
}

function render(){
  document.getElementById('board').innerHTML = BOARD.map(colHTML).join('');
}

render();
</script>
</body>
</html>
