<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your AI Employee — Build Board</title>
<meta name="description" content="Your whole build journey on one board — what to do next up top, every checkpoint below. Finish one and the next unlocks.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="journey.css?v=3">
<style>
body{min-height:100vh;background:radial-gradient(1100px 600px at 50% -260px,rgba(121,234,32,.05),transparent 70%),var(--bg)}

/* ── TOP BAR (brand + swappable surface toggle; no sidebar) ── */
.topbar{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 24px 2px;flex-wrap:wrap}
.brand{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--accent);display:inline-flex;align-items:center;gap:7px;text-transform:uppercase}
.surf{display:inline-flex;align-items:center;gap:9px}
.surf .surface-label{font-size:11.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px}
.surface-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border-2);border-radius:20px;padding:3px;gap:3px}
.sbtn{font-family:var(--font-body);font-size:12px;font-weight:700;padding:5px 13px;border-radius:16px;border:0;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.sbtn:hover{color:var(--text)}
.sbtn.active{background:var(--accent-dim);color:var(--accent)}

/* ── OVERALL PROGRESS (toward a finished AI Employee) ── */
.head{max-width:640px;margin:0 auto;padding:0 22px}
.oprog{margin:16px auto 2px}
.oprog-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;gap:12px}
.oprog-label{font-family:var(--font-display);font-size:14px;font-weight:800;color:var(--text)}
.oprog-pct{font-size:14px;font-weight:800;color:var(--accent)}
.oprog-bar{height:9px;border-radius:6px;background:var(--surface-3);overflow:hidden}
.oprog-fill{height:100%;width:0;border-radius:6px;background:var(--accent);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.oprog-next{margin-top:9px;font-size:13px;color:var(--text-muted);text-align:center}
.oprog-next b{color:var(--text)}

/* ── "WHAT TO WORK ON NEXT" banner ── */
.nextbar{max-width:640px;margin:18px auto 4px;background:linear-gradient(120deg,color-mix(in srgb,var(--nc) 17%,var(--surface)),var(--surface) 72%);border:1px solid color-mix(in srgb,var(--nc) 44%,transparent);border-radius:var(--radius-lg);padding:18px 22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;box-shadow:4px 5px 0 rgba(33,33,30,.1)}
.nb-main{flex:1;min-width:210px}
.nb-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--nc);margin-bottom:5px}
.nb-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.4px;line-height:1.12}
.nb-lead{font-size:13.5px;color:var(--text-muted);margin-top:6px;line-height:1.5}
.nb-go{flex-shrink:0;display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:12px;background:var(--nc);color:#0a0a0a;font-weight:800;font-size:15px;text-decoration:none;box-shadow:0 12px 30px color-mix(in srgb,var(--nc) 30%,transparent);transition:filter .14s,transform .14s}
.nb-go:hover{filter:brightness(1.07);transform:translateY(-1px);text-decoration:none;color:#0a0a0a}

.map-label{max-width:1300px;margin:26px auto 0;padding:0 24px;font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim);text-align:center}

/* ── FULL BOARD — fits the width, no horizontal scrollbar ── */
.board-wrap{padding:12px 24px 46px}
.board{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:11px;max-width:1300px;margin:0 auto;align-items:start}
@media(max-width:1120px){.board{grid-template-columns:repeat(3,minmax(0,1fr))}}
@media(max-width:700px){.board{grid-template-columns:repeat(2,minmax(0,1fr))}}
.col{display:flex;flex-direction:column;gap:8px;min-width:0}
.col-head{display:flex;align-items:center;gap:6px;padding:2px 2px 4px;flex-wrap:wrap}
.col-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-display);font-size:12px;font-weight:800;padding:4px 9px;border-radius:7px;background:color-mix(in srgb,var(--cp) 16%,transparent);color:var(--cp);border:1px solid color-mix(in srgb,var(--cp) 32%,transparent);min-width:0}
.col-pill span.nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
a.col-pill{cursor:pointer;text-decoration:none;transition:background .13s,border-color .13s}
a.col-pill:hover{background:color-mix(in srgb,var(--cp) 28%,transparent);border-color:color-mix(in srgb,var(--cp) 55%,transparent);text-decoration:none}
.col-pill .open{font-weight:800;opacity:.6}
a.col-pill:hover .open{opacity:1}
.col-pill .cdot{width:7px;height:7px;border-radius:50%;background:var(--cp);flex-shrink:0}
.col-state{margin-left:auto;font-size:10.5px;font-weight:700;white-space:nowrap}
.col-state.done{color:#4ade80}
.col-state.active{color:var(--cp)}
.col-state.locked{color:var(--text-dim)}
.col-body{background:color-mix(in srgb,var(--cp) 5%,var(--surface));border:1px solid var(--border);border-top:3px solid var(--cp);border-radius:var(--radius-lg);padding:10px;display:flex;flex-direction:column;gap:9px;min-height:80px}
.col.active .col-body{border-color:color-mix(in srgb,var(--cp) 40%,transparent);box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 0 1px color-mix(in srgb,var(--cp) 22%,transparent)}
.col.locked .col-body{opacity:.7}
.kcard{background:var(--surface-2);border:1px solid var(--border-2);border-radius:9px;padding:10px 11px;box-shadow:0 1px 3px rgba(0,0,0,.35)}
.kcard .ktitle{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;display:flex;gap:7px;align-items:flex-start}
.kcard .kic{flex-shrink:0;font-size:14px;line-height:1.3}
.kcard.is-done .ktitle{color:var(--text-muted)}
.ktags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.tag.type{background:var(--surface-3);color:var(--text-muted);border:1px solid var(--border-2)}
.tag.st-doing{background:rgba(91,155,255,.16);color:#8db4ff}
.tag.st-done{background:rgba(74,222,128,.15);color:#6fe39a}
.tag.st-doing::before{content:'◐';font-size:9px}
.tag.st-done::before{content:'●';font-size:9px}

.footer{text-align:center;padding:6px 24px 54px;font-size:13px;color:var(--text-dim)}
.footer a{font-weight:600}

/* ── SURFACE GATE (first-time only) ── */
.surface-gate{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(6,8,6,.86);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.surface-gate[hidden]{display:none}
.sg-card{max-width:440px;width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius-lg);padding:30px 26px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.6)}
.sg-card .eyebrow{font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
.sg-card h2{font-family:var(--font-display);font-size:23px;font-weight:800;margin:8px 0 6px}
.sg-card p{color:var(--text-muted);font-size:14px;margin-bottom:20px}
.sg-opts{display:flex;flex-direction:column;gap:11px}
.sg-opts button{display:flex;flex-direction:column;gap:3px;text-align:left;padding:15px 18px;border-radius:12px;border:1px solid var(--border-2);background:var(--surface-2);color:var(--text);cursor:pointer;transition:all .14s;font-family:var(--font-body)}
.sg-opts button:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--surface-2));transform:translateY(-1px)}
.sg-opts b{font-size:15.5px;font-weight:800}
.sg-opts span{font-size:13px;color:var(--text-muted);line-height:1.45}
</style>
<link rel="stylesheet" href="excalifont.css">
</head>
<body>

<div class="topbar rise">
  <span class="brand">🤖 AI Employee Builder</span>
  <div class="surf" id="surfBar"></div>
</div>

<div class="head rise">
  <div class="oprog" id="oprog"></div>
</div>
<div class="rise" id="nextbar"></div>

<div class="map-label rise">Your whole journey</div>
<div class="board-wrap rise"><div class="board" id="board"></div></div>

<div class="footer">Questions? <a href="https://www.polynet.ai/c/ai-employee-builders" target="_blank" rel="noopener">Ask in the community ↗</a></div>

<div class="surface-gate" id="gate" hidden></div>

<script src="progress.js?v=2"></script>
<script>
/* ──────────────────────────────────────────────────────────────
   BOARD PAGE. Top: what to work on NEXT (from progress.js). Below:
   the whole journey rendered to fit — no horizontal scrollbar. The
   wizards stay full-focus (they never render this board).
   ────────────────────────────────────────────────────────────── */

var FOCUS_LEAD = {
  cp1:'Map how your business runs today and find the one job worth handing off first. You just answer its questions.',
  cp2:'Take that one job and turn it into a reusable skill — the AI does it your way, every time.',
  cp3:'Chain a few skills into a system that runs a whole function from start to finish.',
  cp4:'Add the guardrails and a schedule so it runs on its own and gets sharper when you correct it.'
};

var TYPES = {
  action:{ label:'Action', ic:'⚡' }, video:{ label:'Watch', ic:'📹' },
  build:{ label:'Build', ic:'🔨' }, gate:{ label:'Done-signal', ic:'🎯' }, outcome:{ label:'Outcome', ic:'🌟' }
};
var BOARD = [
  { id:'setup', name:'Get set up', color:'#4ade80', cards:[
    { t:'Join the community', type:'action' },
    { t:'Install the plugin + connect', type:'action' },
    { t:'Onboard — run /setup-aieb', type:'action' },
    { t:'Welcome — what you just built', type:'video' }
  ]},
  { id:'cp1', name:'Map the business', color:'#5b9bff', cards:[
    { t:'Set up Draw.io — connector + app', type:'build' },
    { t:'Why the X-Ray interview works', type:'video' },
    { t:'See a full X-Ray in action (optional)', type:'video' },
    { t:'Run your Business X-Ray', type:'build' },
    { t:'X-Ray map exists + “N hrs/week” baseline', type:'gate' }
  ]},
  { id:'cp2', name:'Your first skill', color:'#a78bfa', cards:[
    { t:'What is a skill', type:'video' },
    { t:'The 3 levels of skills', type:'video' },
    { t:'How to create a skill', type:'video' },
    { t:'Turn 1 real process into a skill', type:'build' },
    { t:'Skill ran once on real data', type:'gate' }
  ]},
  { id:'cp3', name:'A skill system', color:'#f5a623', cards:[
    { t:'Build a skill system', type:'video' },
    { t:'Wire skills into one system', type:'build' },
    { t:'System runs a whole function', type:'gate' }
  ]},
  { id:'cp4', name:'Make it run itself', color:'#f472b6', cards:[
    { t:'Review + harden', type:'video' },
    { t:'Build a harness', type:'video' },
    { t:'Schedule it / autonomy', type:'video' },
    { t:'Run autonomously or self-improve', type:'build' },
    { t:'It runs on its own', type:'gate' }
  ]},
  { id:'goal', name:'Your AI Employee', color:'#fbbf24', cards:[
    { t:'Runs (or self-improves)', type:'outcome' },
    { t:'Gets better every time you use it', type:'outcome' }
  ]}
];
var STATUS = { doing:'In progress', done:'Completed' };
var WIZARDS = { setup:'get-access-aieb.html', cp1:'checkpoint-map.html?v=7', cp2:'checkpoint-first-skill.html', cp3:'checkpoint-system.html', cp4:'checkpoint-autonomy.html' };

/* ---- SURFACE: swappable toggle + first-time gate ---- */
function surfBarHTML(){
  var cur = AIEB.getSurface();
  function btn(k){ return '<button class="sbtn'+(cur===k?' active':'')+'" onclick="swapSurface(\''+k+'\')">'+AIEB.SURFACES[k].label+'</button>'; }
  return '<span class="surface-label">Building in</span><div class="surface-toggle">'+btn('cowork')+btn('claude-code')+'</div>';
}
function paintSurf(){ document.getElementById('surfBar').innerHTML = surfBarHTML(); }
function swapSurface(s){ AIEB.setSurface(s); paintSurf(); renderNext(); }

function gateHTML(){
  return '<div class="sg-card">'+
    '<div class="eyebrow">One quick thing</div>'+
    '<h2>Where are you building?</h2>'+
    '<p>Pick where you run Claude. You can switch anytime.</p>'+
    '<div class="sg-opts">'+
      '<button onclick="pickSurface(\'cowork\')"><b>Cowork</b><span>'+AIEB.SURFACES.cowork.blurb+'</span></button>'+
      '<button onclick="pickSurface(\'claude-code\')"><b>Claude Code</b><span>'+AIEB.SURFACES['claude-code'].blurb+'</span></button>'+
    '</div></div>';
}
function pickSurface(s){ AIEB.setSurface(s); document.getElementById('gate').hidden = true; renderAll(); }
function maybeGate(){
  var g = document.getElementById('gate');
  if (!AIEB.getSurface()){ g.innerHTML = gateHTML(); g.hidden = false; }
  else { g.hidden = true; }
}

/* ---- OVERALL PROGRESS ---- */
function overallHTML(){
  var o = AIEB.overall();
  var label = o.complete ? 'Your AI Employee is built 🎉' : 'Progress to your AI Employee';
  var nextLine = o.complete
    ? 'All '+o.total+' steps complete.'
    : 'Step '+(o.done+1)+' of '+o.total+' on the way to a finished AI Employee';
  return '<div class="oprog-top"><span class="oprog-label">'+label+'</span><span class="oprog-pct">'+o.pct+'%</span></div>'+
    '<div class="oprog-bar"><div class="oprog-fill" style="width:'+o.pct+'%"></div></div>'+
    '<div class="oprog-next">'+nextLine+'</div>';
}

/* ---- WHAT TO WORK ON NEXT ---- */
function nextbarHTML(){
  var id = AIEB.activeId(), m = AIEB.META[id];
  if (id==='goal'){
    return '<div class="nextbar" style="--nc:#fbbf24">'+
      '<div class="nb-main"><div class="nb-badge">🎉 You made it</div>'+
      '<div class="nb-title">Your AI Employee is built</div>'+
      '<div class="nb-lead">Every step is complete — reopen any checkpoint below to refine it.</div></div></div>';
  }
  var isSetup = id==='setup';
  var lead = isSetup ? 'Install Claude + the plugin and connect — one guided flow, about 30 minutes.' : (FOCUS_LEAD[id]||'');
  var badge = isSetup ? 'Start here · step 1' : ('Next up · checkpoint '+AIEB.buildIndex(id)+' of 4');
  var verb = isSetup ? 'Start setup' : (AIEB.stepInfo(id).pos>0 ? 'Continue' : 'Start this checkpoint');
  return '<div class="nextbar" style="--nc:'+m.color+'">'+
    '<div class="nb-main"><div class="nb-badge">'+badge+'</div>'+
    '<div class="nb-title">'+m.name+'</div>'+
    '<div class="nb-lead">'+lead+'</div></div>'+
    '<a class="nb-go" href="'+(WIZARDS[id]||m.wizard)+'">'+verb+' →</a></div>';
}
function renderNext(){ document.getElementById('nextbar').innerHTML = nextbarHTML(); }

/* ---- THE FULL BOARD ---- */
function cardHTML(card, status){
  var ty = TYPES[card.type] || TYPES.action;
  var h = '<div class="kcard is-'+status+'">';
  h += '<div class="ktitle"><span class="kic">'+ty.ic+'</span><span>'+card.t+'</span></div>';
  h += '<div class="ktags"><span class="tag type">'+ty.label+'</span>';
  if (STATUS[status]) h += '<span class="tag st-'+status+'">'+STATUS[status]+'</span>';
  h += '</div></div>';
  return h;
}
function colStatuses(col, state){
  var n = col.cards.length;
  if (state==='locked') return col.cards.map(function(){ return 'todo'; });
  if (state==='done')   return col.cards.map(function(){ return 'done'; });
  var info = AIEB.stepInfo(col.id), total = info.total || n;
  var doneCount = total>0 ? Math.round(info.pos/total*n) : 0;
  doneCount = Math.max(0, Math.min(n, doneCount));
  if (doneCount>=n) doneCount = n-1;
  return col.cards.map(function(c,i){ return i<doneCount ? 'done' : (i===doneCount ? 'doing' : 'todo'); });
}
function colHTML(col){
  var state = AIEB.stateOf(col.id), statuses = colStatuses(col, state);
  var stateLabel = state==='done' ? '✓ Done' : state==='active' ? '● Now' : '🔒 Locked';
  var wiz = WIZARDS[col.id], clickable = (state==='active' || state==='done') && wiz;
  var pillInner = '<span class="cdot"></span><span class="nm">'+col.name+'</span>';
  var h = '<div class="col '+state+'" style="--cp:'+col.color+'"><div class="col-head">';
  h += clickable ? '<a class="col-pill" href="'+wiz+'">'+pillInner+'<span class="open">→</span></a>' : '<span class="col-pill">'+pillInner+'</span>';
  h += '<span class="col-state '+state+'">'+stateLabel+'</span></div>';
  h += '<div class="col-body">'+col.cards.map(function(c,i){ return cardHTML(c, statuses[i]); }).join('')+'</div></div>';
  return h;
}
function renderMap(){ document.getElementById('board').innerHTML = BOARD.map(colHTML).join(''); }

function renderAll(){
  maybeGate();
  paintSurf();
  document.getElementById('oprog').innerHTML = overallHTML();
  renderNext();
  renderMap();
}
renderAll();
</script>
</body>
</html>
