<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Employee Builder — Home</title>
<meta name="description" content="Build your AI Employee — one journey, one step at a time. We always show you the single next thing to do.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="journey.css">
<!-- AIEB launcher home (standalone — no portal shell/sidebar/widget). The dark journey theme
     matches the board + wizards so the whole journey feels like one place. -->
<style>
body{min-height:100vh;background:radial-gradient(1100px 620px at 50% -220px,rgba(121,234,32,.06),transparent 70%),var(--bg);display:flex;flex-direction:column}

/* top bar (brand + swappable surface toggle) */
.topbar{max-width:760px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:18px 20px 2px;flex-wrap:wrap}
.brand{font-size:12px;font-weight:800;letter-spacing:.5px;color:var(--accent);display:inline-flex;align-items:center;gap:7px;text-transform:uppercase}
.surf{display:inline-flex;align-items:center;gap:9px}
.surf .surface-label{font-size:11.5px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.3px}
.surface-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--border-2);border-radius:20px;padding:3px;gap:3px}
.sbtn{font-family:var(--font-body);font-size:12px;font-weight:700;padding:5px 13px;border-radius:16px;border:0;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s}
.sbtn:hover{color:var(--text)}
.sbtn.active{background:var(--accent-dim);color:var(--accent)}

/* hero */
.home{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;max-width:560px;margin:0 auto;padding:30px 22px 70px;width:100%}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.home h1{font-family:var(--font-display);font-size:40px;font-weight:800;letter-spacing:-1px;line-height:1.05;margin-bottom:14px}
.home .lead{font-size:16px;color:var(--text-muted);line-height:1.6;margin-bottom:26px;max-width:480px}
@media(max-width:560px){.home h1{font-size:31px}}

/* overall progress bar — clickable → board */
.oprog{display:block;width:100%;max-width:460px;margin:0 auto 26px;padding:12px 16px;border-radius:13px;border:1px solid transparent;text-decoration:none;color:inherit;cursor:pointer;transition:background .14s,border-color .14s}
.oprog:hover{background:var(--surface);border-color:var(--border-2);text-decoration:none}
.oprog .ob{color:var(--accent);font-weight:700}
.oprog-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;gap:12px}
.oprog-label{font-family:var(--font-display);font-size:13.5px;font-weight:800;color:var(--text)}
.oprog-pct{font-size:13.5px;font-weight:800;color:var(--accent)}
.oprog-bar{height:9px;border-radius:6px;background:var(--surface-3);overflow:hidden}
.oprog-fill{height:100%;width:0;border-radius:6px;background:linear-gradient(90deg,#4ade80,#5b9bff,#a78bfa,#f5a623,#f472b6,#fbbf24);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.oprog-next{margin-top:9px;font-size:12.5px;color:var(--text-muted)}
.oprog-next b{color:var(--text)}

/* primary CTA */
.cta{display:inline-flex;align-items:center;gap:9px;padding:16px 40px;border-radius:13px;background:var(--cta,#79EA20);color:#0a0a0a;font-family:var(--font-display);font-weight:800;font-size:16.5px;text-decoration:none;box-shadow:0 14px 36px color-mix(in srgb,var(--cta,#79EA20) 32%,transparent);transition:filter .14s,transform .14s}
.cta:hover{filter:brightness(1.07);transform:translateY(-2px);text-decoration:none;color:#0a0a0a}

/* docs & help (collapsed) */
.docs{margin-top:26px;width:100%;max-width:380px}
.docs-btn{background:none;border:0;color:var(--text-dim);font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;padding:8px 12px;border-radius:8px;transition:color .14s,background .14s}
.docs-btn:hover{color:var(--text-muted);background:var(--surface)}
.docs-panel{overflow:hidden;max-height:0;transition:max-height .28s ease;display:flex;flex-direction:column;gap:2px;margin-top:4px}
.docs.open .docs-panel{max-height:260px}
.docitem{display:block;text-align:left;padding:11px 14px;border-radius:9px;color:var(--text-muted);font-size:14px;font-weight:600;text-decoration:none;border:1px solid transparent;transition:all .13s}
.docitem:hover{color:var(--text);background:var(--surface);border-color:var(--border-2);text-decoration:none}

/* surface gate (first-time only) */
.surface-gate{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(6,8,6,.86);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.surface-gate[hidden]{display:none}
.sg-card{max-width:440px;width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:var(--radius-lg);padding:30px 26px;text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.6)}
.sg-card .eyebrow{margin-bottom:0}
.sg-card h2{font-family:var(--font-display);font-size:23px;font-weight:800;margin:8px 0 6px}
.sg-card p{color:var(--text-muted);font-size:14px;margin-bottom:20px}
.sg-opts{display:flex;flex-direction:column;gap:11px}
.sg-opts button{display:flex;flex-direction:column;gap:3px;text-align:left;padding:15px 18px;border-radius:12px;border:1px solid var(--border-2);background:var(--surface-2);color:var(--text);cursor:pointer;transition:all .14s;font-family:var(--font-body)}
.sg-opts button:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--surface-2));transform:translateY(-1px)}
.sg-opts b{font-size:15.5px;font-weight:800}
.sg-opts span{font-size:13px;color:var(--text-muted);line-height:1.45}
</style>
</head>
<body>

<div class="topbar rise">
  <span class="brand">🤖 AI Employee Builder</span>
  <div class="surf" id="surfBar"></div>
</div>

<div class="home rise">
  <div class="eyebrow">Your build portal</div>
  <h1>Build your AI Employee.</h1>
  <p class="lead">One journey, one step at a time. We always show you the single next thing to do — nothing else to figure out.</p>

  <a class="oprog" id="oprog" href="ai-employee-board.html"></a>

  <a class="cta" id="cta" href="ai-employee-board.html">Start building →</a>

  <div class="docs" id="docs">
    <button class="docs-btn" onclick="toggleDocs()">Docs &amp; help ▾</button>
    <div class="docs-panel" id="docsList"></div>
  </div>
</div>

<div class="surface-gate" id="gate" hidden></div>

<script src="progress.js?v=2"></script>
<script>
/* Standalone AIEB launcher. Reads the shared progress store (window.AIEB) to show
   overall progress + the one next action, and carries the swappable surface. */

function surfBarHTML(){
  var cur = AIEB.getSurface();
  function btn(k){ return '<button class="sbtn'+(cur===k?' active':'')+'" onclick="swapSurface(\''+k+'\')">'+AIEB.SURFACES[k].label+'</button>'; }
  return '<span class="surface-label">Building in</span><div class="surface-toggle">'+btn('cowork')+btn('claude-code')+'</div>';
}
function paintSurf(){ document.getElementById('surfBar').innerHTML = surfBarHTML(); }
function swapSurface(s){ AIEB.setSurface(s); paintSurf(); renderHome(); }

function gateHTML(){
  return '<div class="sg-card">'+
    '<div class="eyebrow">One quick thing</div>'+
    '<h2>Where are you building?</h2>'+
    '<p>Pick where you run Claude. You can switch anytime.</p>'+
    '<div class="sg-opts">'+
      '<button onclick="pickSurface(\'cowork\')"><b>Cowork</b><span>'+AIEB.SURFACES.cowork.blurb+'</span></button>'+
      '<button onclick="pickSurface(\'claude-code\')"><b>Claude Code</b><span>'+AIEB.SURFACES['claude-code'].blurb+'</span></button>'+
    '</div></div>';
}
function pickSurface(s){ AIEB.setSurface(s); document.getElementById('gate').hidden = true; renderHome(); }
function maybeGate(){
  var g = document.getElementById('gate');
  if (!AIEB.getSurface()){ g.innerHTML = gateHTML(); g.hidden = false; }
  else { g.hidden = true; }
}

function overallHTML(){
  var o = AIEB.overall();
  var label = o.complete ? 'Your AI Employee is built 🎉' : 'Progress to your AI Employee';
  var nextLine = o.complete
    ? 'All '+o.total+' steps complete &nbsp;·&nbsp; <span class="ob">open your board →</span>'
    : 'Next up: <b>'+o.nextName+'</b> &nbsp;·&nbsp; <span class="ob">open your board →</span>';
  return '<div class="oprog-top"><span class="oprog-label">'+label+'</span><span class="oprog-pct">'+o.pct+'%</span></div>'+
    '<div class="oprog-bar"><div class="oprog-fill" style="width:'+o.pct+'%"></div></div>'+
    '<div class="oprog-next">'+nextLine+'</div>';
}

function docsHTML(){
  var cc = AIEB.getSurface()==='claude-code';
  var items = [
    { t:'Business X-Ray (deep wiki)', h:'business-x-ray.html?product=aieb' },
    { t:'Skill Systems (course)',     h:'../meta-create-skill/index.html?product=aieb' }
  ];
  if (cc) items.push({ t:'Claude Code 101', h:'claude-code-101.html?product=aieb' }); // Claude-Code-only reference
  items.push({ t:'Ask in the community ↗', h:'https://www.polynet.ai/c/ai-employee-builders', ext:true });
  return items.map(function(it){
    return '<a class="docitem" href="'+it.h+'"'+(it.ext?' target="_blank" rel="noopener"':'')+'>'+it.t+'</a>';
  }).join('');
}
function toggleDocs(){ document.getElementById('docs').classList.toggle('open'); }

function renderHome(){
  document.getElementById('oprog').innerHTML = overallHTML();
  var a = AIEB.activeId(), m = AIEB.META[a], cta = document.getElementById('cta');
  // CTA jumps straight into the next task's wizard; the progress bar (above) opens the board overview.
  if (a==='setup')      { cta.textContent = 'Start building →';      cta.href = AIEB.META.setup.wizard; }
  else if (a==='goal')  { cta.textContent = 'Open your board →';     cta.href = 'ai-employee-board.html'; }
  else                  { cta.textContent = 'Continue → ' + m.name;  cta.href = m.wizard; }
  cta.style.setProperty('--cta', m.color);
  document.getElementById('docsList').innerHTML = docsHTML();
}

maybeGate();
paintSurf();
renderHome();
</script>
</body>
</html>
