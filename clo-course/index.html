<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Employee Builder — Home</title>
<meta name="description" content="Build your AI Employee — one journey, one step at a time. We always show you the single next thing to do.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='28' width='80' height='55' rx='16' fill='white' stroke='%2321211E' stroke-width='6'/%3E%3Crect x='22' y='41' width='56' height='28' rx='12' fill='%2321211E'/%3E%3Ccircle cx='40' cy='55' r='6' fill='%232D8C3C'/%3E%3Ccircle cx='60' cy='55' r='6' fill='%232D8C3C'/%3E%3Cline x1='50' y1='28' x2='47' y2='10' stroke='%2321211E' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='46' cy='8' r='7' fill='%232D8C3C'/%3E%3C/svg%3E">
<link rel="stylesheet" href="excalifont.css">
<!-- AIEB launcher home — white-excali skin (paper/ink/green + Excalifont accents + sketch
     shapes + white robot). Standalone (no portal shell/sidebar). Same JS as the board/wizards. -->
<style>
:root{
  --paper:#FAFAFA; --ink:#21211E; --body:#3D3D38; --soft:#6B6B63;
  --green:#2D8C3C; --green-soft:#EAF4EC; --card:#FFFFFF;
  --sketch:255px 15px 225px 15px/15px 225px 15px 255px;
  --excali:'Excalifont',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--paper);color:var(--body);font:18px/1.6 "Segoe UI",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* top bar (brand + swappable surface toggle) */
.topbar{max-width:820px;width:100%;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:20px 22px 4px;flex-wrap:wrap}
.brand{font-family:var(--excali);font-size:16px;color:var(--ink);display:inline-flex;align-items:center;gap:8px}
.surf{display:inline-flex;align-items:center;gap:10px}
.surf .surface-label{font-family:var(--excali);font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.08em}
.surface-toggle{display:inline-flex;background:var(--card);border:2px solid var(--ink);border-radius:22px;padding:3px;gap:3px}
.sbtn{font-family:var(--excali);font-size:13.5px;padding:5px 15px;border-radius:18px;border:0;background:transparent;color:var(--soft);cursor:pointer;transition:all .15s}
.sbtn:hover{color:var(--ink)}
.sbtn.active{background:var(--green);color:#fff}

/* hero */
.home{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;max-width:640px;margin:0 auto;padding:40px 22px 72px;width:100%}
.hero-bot{position:absolute;right:6px;top:0;width:66px;transform:rotate(6deg);z-index:2}
@media(max-width:600px){.hero-bot{width:50px;right:0;top:6px}}
.eyebrow{font-family:var(--excali);color:var(--green);font-size:14px;letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px}
.home h1{font-size:clamp(32px,5vw,46px);line-height:1.1;font-weight:700;color:var(--ink);margin-bottom:14px;text-wrap:balance}
.home .lead{font-size:17px;color:var(--body);line-height:1.6;margin-bottom:28px;max-width:500px}

/* overall progress bar — clickable → board (house card) */
.oprog{display:block;width:100%;max-width:500px;margin:0 auto 28px;padding:18px 20px;border-radius:15px 4px 15px 4px;border:2px solid var(--ink);background:var(--card);box-shadow:3px 4px 0 rgba(33,33,30,.08);text-decoration:none;color:inherit;cursor:pointer;transition:transform .14s,box-shadow .14s}
.oprog:hover{transform:translate(-1px,-1px);box-shadow:4px 5px 0 rgba(33,33,30,.14);text-decoration:none}
.oprog .ob{color:var(--green);font-family:var(--excali)}
.oprog-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;gap:12px}
.oprog-label{font-size:15px;font-weight:700;color:var(--ink)}
.oprog-pct{font-family:var(--excali);font-size:21px;color:var(--green)}
.oprog-bar{height:12px;border-radius:8px;background:var(--green-soft);border:1.5px solid var(--ink);overflow:hidden}
.oprog-fill{height:100%;width:0;background:var(--green);transition:width .6s cubic-bezier(.2,.8,.2,1)}
.oprog-next{margin-top:11px;font-size:14px;color:var(--soft)}
.oprog-next b{color:var(--ink)}

/* primary CTA (sketch button — green only) */
.cta{display:inline-flex;align-items:center;gap:9px;background:var(--green);color:#fff;text-decoration:none;border:2px solid var(--ink);border-radius:var(--sketch);padding:16px 44px;font-family:var(--excali);font-size:21px;box-shadow:3px 4px 0 rgba(33,33,30,.55);transition:transform .15s,box-shadow .15s}
.cta:hover{transform:translate(-1px,-1px);box-shadow:4px 5px 0 rgba(33,33,30,.55);color:#fff;text-decoration:none}
.cta:active{transform:translateY(1px);box-shadow:2px 2px 0 rgba(33,33,30,.55)}

/* docs & help (collapsed) */
.docs{margin-top:30px;width:100%;max-width:420px}
.docs-btn{background:none;border:0;color:var(--soft);font-family:var(--excali);font-size:14.5px;cursor:pointer;padding:8px 12px;border-radius:8px;transition:color .14s}
.docs-btn:hover{color:var(--ink)}
.docs-panel{overflow:hidden;max-height:0;transition:max-height .28s ease;display:flex;flex-direction:column;gap:5px;margin-top:6px}
.docs.open .docs-panel{max-height:320px}
.docitem{display:block;text-align:left;padding:12px 15px;border-radius:12px 4px 12px 4px;color:var(--body);font-size:15px;font-weight:600;text-decoration:none;border:1.5px dashed #E2E2DC;transition:all .13s}
.docitem:hover{color:var(--ink);background:var(--green-soft);border-color:var(--green);border-style:solid;text-decoration:none}

/* surface gate (first-time only) — white-excali cards */
.surface-gate{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(33,33,30,.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.surface-gate[hidden]{display:none}
.sg-card{max-width:520px;width:100%;background:var(--card);border:2px solid var(--ink);border-radius:15px 4px 15px 4px;padding:28px 26px;text-align:center;box-shadow:5px 6px 0 rgba(33,33,30,.12);max-height:94vh;overflow-y:auto}
.sg-card .eyebrow{margin-bottom:0}
.sg-card h2{font-size:26px;font-weight:700;color:var(--ink);margin:10px 0 8px;line-height:1.15}
.sg-card>p{color:var(--body);font-size:15px;margin-bottom:20px;line-height:1.55;max-width:430px;margin-left:auto;margin-right:auto}
.sg-opts{display:flex;flex-direction:column;gap:14px;text-align:left}
.sg-opt{display:flex;flex-direction:column;gap:8px;padding:18px;border-radius:15px 4px 15px 4px;border:2px solid var(--ink);background:var(--card);color:var(--body);cursor:pointer;transition:transform .15s,box-shadow .15s;font-family:inherit;text-align:left;box-shadow:3px 4px 0 rgba(33,33,30,.08)}
.sg-opt:hover{transform:translate(-1px,-1px);box-shadow:4px 5px 0 rgba(33,33,30,.14)}
.sg-opt.reco{background:var(--green-soft);border-color:var(--green);box-shadow:4px 5px 0 rgba(45,140,60,.18)}
.sg-badge{align-self:flex-start;font-family:var(--excali);font-size:12px;letter-spacing:.05em;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:var(--green);color:#fff}
.sg-badge.alt{background:var(--card);color:var(--soft);border:1.5px solid var(--ink)}
.sg-head{display:flex;align-items:center;gap:11px}
.sg-ic{width:38px;height:38px;border-radius:9px;flex-shrink:0;object-fit:contain;background:#fff;border:2px solid var(--ink);padding:5px}
.sg-opt b{font-size:18px;font-weight:700;color:var(--ink);font-family:inherit}
.sg-what{font-size:15px;color:var(--body);line-height:1.5}
.sg-if{font-size:14px;color:var(--soft);line-height:1.5}
.sg-if em{color:var(--green);font-style:normal;font-family:var(--excali)}
.sg-go{font-family:var(--excali);font-size:16px;color:var(--green)}
.sg-opt:not(.reco) .sg-go{color:var(--ink)}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">🤖 AI Employee Builder</span>
  <div class="surf" id="surfBar"></div>
</div>

<div class="home">
  <svg class="hero-bot" viewBox="0 0 140 152" fill="none" aria-hidden="true"><line x1="70" y1="18" x2="67" y2="5" stroke="#21211E" stroke-width="2.6" stroke-linecap="round"/><circle cx="66.5" cy="4" r="4.2" fill="#2D8C3C"/><rect x="40" y="18" width="60" height="40" rx="12" fill="#fff" stroke="#21211E" stroke-width="2.8"/><rect x="49" y="27" width="42" height="20" rx="9" fill="#21211E"/><circle cx="62" cy="37" r="4" fill="#2D8C3C"/><circle cx="78" cy="37" r="4" fill="#2D8C3C"/><rect x="45" y="64" width="50" height="56" rx="13" fill="#fff" stroke="#21211E" stroke-width="2.8"/><rect x="58" y="74" width="24" height="15" rx="3" fill="#c2410c"/><path d="M46 76 Q28 68 22 48" stroke="#21211E" stroke-width="2.8" fill="none" stroke-linecap="round"/><circle cx="21" cy="44" r="6" fill="#fff" stroke="#21211E" stroke-width="2.6"/><path d="M14 38 L11 33 M20 35 L19 29 M27 37 L30 32" stroke="#21211E" stroke-width="2" stroke-linecap="round"/><path d="M94 78 Q112 74 119 88" stroke="#21211E" stroke-width="2.8" fill="none" stroke-linecap="round"/><circle cx="120" cy="92" r="6" fill="#fff" stroke="#21211E" stroke-width="2.6"/></svg>

  <div class="eyebrow">Your build portal</div>
  <h1>Build your AI Employee.</h1>
  <p class="lead">One journey, one step at a time. We always show you the single next thing to do — nothing else to figure out.</p>

  <a class="oprog" id="oprog" href="ai-employee-board.html"></a>

  <a class="cta" id="cta" href="ai-employee-board.html">Start building →</a>

  <div class="docs" id="docs">
    <button class="docs-btn" onclick="toggleDocs()">Docs &amp; help ▾</button>
    <div class="docs-panel" id="docsList"></div>
  </div>
</div>

<div class="surface-gate" id="gate" hidden></div>

<script src="progress.js?v=2"></script>
<script>
/* Standalone AIEB launcher. Reads the shared progress store (window.AIEB) to show
   overall progress + the one next action, and carries the swappable surface. */

function surfBarHTML(){
  var cur = AIEB.getSurface();
  function btn(k){ return '<button class="sbtn'+(cur===k?' active':'')+'" onclick="swapSurface(\''+k+'\')">'+AIEB.SURFACES[k].label+'</button>'; }
  return '<span class="surface-label">Building in</span><div class="surface-toggle">'+btn('cowork')+btn('claude-code')+'</div>';
}
function paintSurf(){ document.getElementById('surfBar').innerHTML = surfBarHTML(); }
function swapSurface(s){ AIEB.setSurface(s); paintSurf(); renderHome(); }

function gateHTML(){
  // The single surface picker (asked once, up front). Get Access reads this choice and
  // skips its own "pick your app" step, so nobody chooses twice. Cowork is the recommended
  // default for non-technical builders; the top-bar toggle swaps it anytime.
  return '<div class="sg-card">'+
    '<div class="eyebrow">One quick thing · switch anytime</div>'+
    '<h2>Where do you want to build?</h2>'+
    '<p>This just sets which setup steps we show you. Not sure? Go with Cowork — it’s the easy, nothing-to-install path.</p>'+
    '<div class="sg-opts">'+
      '<button class="sg-opt reco" onclick="pickSurface(\'cowork\')">'+
        '<span class="sg-badge">Easiest · start here</span>'+
        '<span class="sg-head"><img class="sg-ic" src="assets/get-access/cowork-logo.png" alt="" onerror="this.style.display=\'none\'"><b>Claude Cowork</b></span>'+
        '<span class="sg-what">Claude runs in your browser. Nothing to install — add one plugin, click a link, and you’re building. All point-and-click.</span>'+
        '<span class="sg-if"><em>Pick this if</em> you’re not technical and words like “terminal” or “VS Code” make you nervous. You still build a real AI Employee — just the easy way.</span>'+
        '<span class="sg-go">Build in Cowork →</span>'+
      '</button>'+
      '<button class="sg-opt" onclick="pickSurface(\'claude-code\')">'+
        '<span class="sg-badge alt">Full control</span>'+
        '<span class="sg-head"><img class="sg-ic" src="assets/get-access/claude-code-mascot.png" alt="" onerror="this.style.display=\'none\'"><b>Claude Code</b></span>'+
        '<span class="sg-what">Claude runs in your code editor (VS Code) or terminal, right on your own computer.</span>'+
        '<span class="sg-if"><em>Pick this if</em> you want full control and customization, you’re comfortable in VS Code, and you want to go deep on AI engineering.</span>'+
        '<span class="sg-go">Build in Claude Code →</span>'+
      '</button>'+
    '</div></div>';
}
function pickSurface(s){ AIEB.setSurface(s); document.getElementById('gate').hidden = true; renderHome(); }
function maybeGate(){
  var g = document.getElementById('gate');
  if (!AIEB.getSurface()){ g.innerHTML = gateHTML(); g.hidden = false; }
  else { g.hidden = true; }
}

function overallHTML(){
  var o = AIEB.overall();
  var label = o.complete ? 'Your AI Employee is built 🎉' : 'Progress to your AI Employee';
  var nextLine = o.complete
    ? 'All '+o.total+' steps complete &nbsp;·&nbsp; <span class="ob">open your board →</span>'
    : 'Next up: <b>'+o.nextName+'</b> &nbsp;·&nbsp; <span class="ob">open your board →</span>';
  return '<div class="oprog-top"><span class="oprog-label">'+label+'</span><span class="oprog-pct">'+o.pct+'%</span></div>'+
    '<div class="oprog-bar"><div class="oprog-fill" style="width:'+o.pct+'%"></div></div>'+
    '<div class="oprog-next">'+nextLine+'</div>';
}

function docsHTML(){
  var cc = AIEB.getSurface()==='claude-code';
  var items = [
    { t:'Business X-Ray (deep wiki)', h:'business-x-ray.html?product=aieb' },
    { t:'Skill Systems (course)',     h:'../meta-create-skill/index.html?product=aieb' }
  ];
  if (cc) items.push({ t:'Claude Code 101', h:'claude-code-101.html?product=aieb' }); // Claude-Code-only reference
  items.push({ t:'Ask in the community ↗', h:'https://www.polynet.ai/c/ai-employee-builders', ext:true });
  return items.map(function(it){
    return '<a class="docitem" href="'+it.h+'"'+(it.ext?' target="_blank" rel="noopener"':'')+'>'+it.t+'</a>';
  }).join('');
}
function toggleDocs(){ document.getElementById('docs').classList.toggle('open'); }

function renderHome(){
  document.getElementById('oprog').innerHTML = overallHTML();
  var a = AIEB.activeId(), m = AIEB.META[a], cta = document.getElementById('cta');
  // CTA jumps straight into the next task's wizard; the progress bar (above) opens the board overview.
  if (a==='setup')      { cta.textContent = 'Start building →';      cta.href = AIEB.META.setup.wizard; }
  else if (a==='goal')  { cta.textContent = 'Open your board →';     cta.href = 'ai-employee-board.html'; }
  else                  { cta.textContent = 'Continue → ' + m.name;  cta.href = m.wizard; }
  document.getElementById('docsList').innerHTML = docsHTML();
}

maybeGate();
paintSurf();
renderHome();
// Repaint if the server reports checkpoints this browser didn't know about
// (built in Claude, or on another device). Silent no-op when nothing changed.
window.addEventListener('aieb:progress-synced', renderHome);
</script>
</body>
</html>
