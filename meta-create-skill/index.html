<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Create Skill — The Production Skill-Authoring Toolkit</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0d0d0d;--surface:#131313;--surface-2:#181818;--surface-3:#1f1f1f;
--border:#1e1e1e;--border-2:#2a2a2a;--border-3:#333;
--text:#e4e5ef;--text-muted:#9ea3ba;--text-dim:#4a4d60;
--accent:#79EA20;--accent-dim:rgba(121,234,32,.12);--accent-border:rgba(121,234,32,.35);
--blue:#5b9cf6;--purple:#c084fc;--orange:#FFA500;--red:#FF6B6B;--green:#4ade80;--cyan:#06b6d4;--yellow:#fde68a;
--sidebar-w:280px;--radius:8px;--radius-lg:12px;
}
html{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:28px;height:28px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--bg);font-family:'SF Mono',Consolas,monospace}
.header-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-sub{color:var(--text-muted);font-size:12px;margin-left:6px}
.progress-wrap{display:flex;align-items:center;gap:12px}
.progress-text{font-size:12px;color:var(--text-muted);white-space:nowrap}
.progress-bar{width:160px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease}
.menu-btn{display:none;width:36px;height:36px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:18px}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}
.sidebar{width:var(--sidebar-w);border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;flex-shrink:0;padding:16px 0}
.sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);padding:0 16px;margin-bottom:8px;margin-top:20px}
.sidebar-label:first-child{margin-top:0}
.lesson-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;transition:all .15s;border-left:2px solid transparent;font-size:13px;color:var(--text-muted)}
.lesson-item:hover{background:var(--surface-2)}
.lesson-item.active{background:var(--accent-dim);border-left-color:var(--accent);color:var(--text)}
.lesson-item.completed .lesson-check{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
.lesson-check{width:20px;height:20px;border:2px solid var(--border-2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .2s}
.lesson-item.active .lesson-check{border-color:var(--accent)}
.lesson-name{flex:1}
.main{flex:1;overflow-y:auto;padding:40px;max-width:920px;margin:0 auto;width:100%;transition:max-width .3s ease}
.main.lesson-wide{max-width:1400px}
.lesson{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* LESSON COMMON */
.lesson-header{margin-bottom:32px}
.lesson-num{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:4px}
.lesson h2{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px;line-height:1.2}
.lesson .subtitle{color:var(--text-muted);font-size:15px;max-width:680px}
h3{font-size:20px;font-weight:600;letter-spacing:-.3px;margin:28px 0 8px}
h4{font-size:15px;font-weight:600;margin:18px 0 8px}
p{margin-bottom:12px;color:var(--text-muted)}
p strong,li strong{color:var(--text);font-weight:600}
ul,ol{margin:0 0 16px 20px;color:var(--text-muted)}
li{margin-bottom:6px}
code{background:var(--surface-3);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono',Consolas,monospace;color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin:20px 0}
.card-title{font-size:15px;font-weight:600;margin-bottom:8px;color:var(--text)}
.callout{background:var(--surface-2);border-left:3px solid var(--accent);padding:14px 18px;border-radius:0 var(--radius) var(--radius) 0;margin:20px 0;font-size:14px;color:var(--text-muted)}
.callout strong{color:var(--text)}
.callout.warn{border-left-color:var(--orange)}
.callout.note{border-left-color:var(--blue)}
.spacer{height:24px}

/* LESSON FOOTER */
.lesson-footer{display:flex;align-items:center;justify-content:space-between;margin-top:48px;padding-top:24px;border-top:1px solid var(--border);gap:12px}
.nav-btn{padding:10px 20px;border-radius:var(--radius);cursor:pointer;font-size:14px;font-weight:500;transition:all .2s;border:1px solid var(--border);background:var(--surface);color:var(--text-muted)}
.nav-btn:hover{border-color:var(--border-2);color:var(--text)}
.nav-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600}
.nav-btn.primary:hover{opacity:.9}
.nav-btn.disabled{opacity:.3;pointer-events:none}
.mark-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:600;letter-spacing:.3px;border:1.5px solid var(--border-2);background:transparent;color:var(--text-muted);transition:all .25s}
.mark-btn:hover{border-color:var(--accent-border);color:var(--text);background:var(--accent-dim)}
.mark-btn.done{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.mark-icon{width:16px;height:16px;border:1.5px solid currentColor;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px}
.mark-btn.done .mark-icon{background:var(--accent);border-color:var(--accent);color:var(--bg)}

/* WORKFLOW BADGE STRIP (L1, L15) */
.workflow-pills{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0}
.wf-pill{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;font-family:'SF Mono',Consolas,monospace;color:var(--accent);background:var(--accent-dim);border:1px solid var(--accent-border)}

/* EXPLODED VIEW (L1) — folder + documents, Apple-style product diagram */
.exploded-view-wrap{margin:24px 0 8px;padding:24px 16px 20px;background:linear-gradient(180deg,var(--surface) 0%,var(--bg) 100%);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.exploded-view{width:100%;height:auto;display:block;max-width:900px;margin:0 auto}
.exploded-caption{text-align:center;color:var(--text-muted);font-size:13px;margin:14px auto 0;max-width:640px}
.exploded-caption code{background:var(--surface-3);color:var(--accent)}

/* COMPARISON MATRIX (L3) */
.matrix-wrap{overflow-x:auto;margin:24px 0;border:1px solid var(--border);border-radius:var(--radius-lg)}
.matrix-table{width:100%;border-collapse:collapse;font-size:13px;min-width:680px}
.matrix-table th,.matrix-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}
.matrix-table th{background:var(--surface-2);font-weight:600;color:var(--text);font-size:12px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.matrix-table th.capability{width:34%}
.matrix-table td.capability{font-weight:500;color:var(--text)}
.matrix-table td.hl{background:var(--accent-dim)}
.matrix-table tr:hover td{background:var(--surface-2)}
.matrix-table tr:hover td.hl{background:rgba(121,234,32,.18)}
.matrix-cell{font-weight:600;text-align:center;font-size:13px}
.matrix-yes{color:var(--accent)}
.matrix-no{color:var(--text-dim)}
.matrix-partial{color:var(--orange)}
.matrix-table .philosophy-row td{font-style:italic;color:var(--text-muted);border-top:2px solid var(--border-2)}

/* PROGRESSIVE DISCLOSURE PYRAMID (L8) */
.pyramid-wrap{display:flex;justify-content:center;margin:24px 0}

/* DECISION TREE (L9) */
.tree-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;overflow-x:auto;margin:24px 0}
.tree-wrap svg{display:block;margin:0 auto}

/* SKILL TYPE CARDS (L10) */
.type-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.type-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;transition:all .2s}
.type-card:hover{border-color:var(--accent-border);transform:translateY(-2px)}
.type-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:10px}
.type-badge.simple{color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3)}
.type-badge.domain{color:var(--blue);background:rgba(91,156,246,.1);border:1px solid rgba(91,156,246,.3)}
.type-badge.orch{color:var(--purple);background:rgba(192,132,252,.1);border:1px solid rgba(192,132,252,.3)}
.type-card h4{font-size:16px;margin:0 0 10px}
.type-card .tree{font-family:'SF Mono',Consolas,monospace;font-size:11px;line-height:1.5;background:var(--bg);border-radius:var(--radius);padding:10px;margin:12px 0;color:var(--text-muted);overflow-x:auto}
.type-card .tree .fold{color:var(--yellow)}
.type-card .tree .file{color:var(--text-muted)}
.type-card .use-when{font-size:12px;color:var(--text-dim);margin-top:10px}
.type-card .use-when strong{color:var(--accent)}

/* ORCHESTRATOR CHAIN (L11) */
.chain-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin:24px 0;overflow-x:auto}

/* SELF-IMPROVEMENT LOOP (L13) */
.loop-wrap{display:flex;justify-content:center;margin:24px 0}

/* FOLDER TREE (L7, L14) */
.folder-tree{font-family:'SF Mono',Consolas,monospace;font-size:12px;line-height:1.7;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:14px 0;color:var(--text-muted);overflow-x:auto;white-space:pre}
.folder-tree .fold{color:#ffd700}
.folder-tree .file{color:var(--text-muted)}
.folder-tree .ann{color:var(--text-dim);font-style:italic;font-family:-apple-system,BlinkMacSystemFont,sans-serif}

/* INSTALL SCREENSHOTS (L4-L5) — copied from business-x-ray */
.install-screenshot{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:12px 0 16px;max-width:720px}
.install-screenshot img{width:100%;display:block;cursor:zoom-in}

/* INSTALL STEP PLACEHOLDER (L4-L6) */
.install-step{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--border)}
.install-step:last-child{border-bottom:none}
.step-num{width:30px;height:30px;border-radius:50%;background:var(--accent-dim);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1.5px solid var(--accent-border)}
.step-body{flex:1}
.step-body h4{margin:2px 0 4px;font-size:15px;color:var(--text)}
.step-body p{font-size:13px;line-height:1.55;margin-bottom:8px}
.screenshot-placeholder{background:var(--surface-2);border:2px dashed var(--border-2);border-radius:var(--radius);padding:36px;text-align:center;color:var(--text-dim);font-size:12px;font-style:italic;margin:8px 0 0}

/* CODE BLOCK */
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin:14px 0;font-family:'SF Mono',Consolas,monospace;font-size:12.5px;line-height:1.65;color:var(--text-muted);overflow-x:auto;white-space:pre}
.code-block .comment{color:var(--text-dim);font-style:italic}
.code-block .kw{color:var(--cyan)}
.code-block .str{color:var(--green)}
.code-block .hl{color:var(--accent);font-weight:600}

/* TWO-COL COMPARISON */
.compare-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.compare-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.compare-col h4{margin-top:0}
.compare-col.good{border-left:3px solid var(--accent)}
.compare-col.bad{border-left:3px solid var(--red)}

/* EXAMPLE TABS (L10) */
.ex-tabs{display:flex;gap:4px;margin:24px 0 0;border-bottom:2px solid var(--border);flex-wrap:wrap}
.ex-tab{padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:8px}
.ex-tab:hover{color:var(--text)}
.ex-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.ex-tab .type-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.ex-tab.simple .type-dot{background:var(--green)}
.ex-tab.domain .type-dot{background:var(--blue)}
.ex-tab.orch .type-dot{background:var(--purple)}
.ex-tab-panel{display:none;padding-top:24px;animation:fadeIn .25s ease}
.ex-tab-panel.active{display:block}
.ex-panel-title{font-size:17px;font-weight:600;margin-bottom:6px}
.ex-why{background:var(--surface-2);border-left:3px solid var(--accent);padding:12px 16px;margin:16px 0;border-radius:0 var(--radius) var(--radius) 0;font-size:13px;color:var(--text-muted)}
.ex-why strong{color:var(--text)}

/* FRAMEWORK CARDS (L13) */
.fw-nav{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0 24px;padding:12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.fw-nav-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:700;align-self:center;margin-right:4px}
.fw-nav-pill{padding:6px 12px;font-size:12px;font-weight:600;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .15s}
.fw-nav-pill:hover{color:var(--accent);border-color:var(--accent-border);background:var(--accent-dim)}
.fw-group{margin:20px 0 28px;scroll-margin-top:20px}
.fw-group h3{margin-bottom:10px;font-size:17px}
.fw-group-desc{font-size:13px;color:var(--text-muted);margin:0 0 14px;font-style:italic}
.fw-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0}
.fw-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;transition:all .2s}
.fw-card:hover{border-color:var(--accent-border);transform:translateY(-1px)}
.fw-name{font-size:14px;font-weight:700;color:var(--text);font-family:'SF Mono',Consolas,monospace;margin-bottom:2px;letter-spacing:.2px}
.fw-expand{font-size:10.5px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;font-weight:600}
.fw-use{font-size:12.5px;color:var(--text-muted);line-height:1.5;margin:0}
@media(max-width:700px){.fw-grid{grid-template-columns:1fr}}

/* STAGE TRIGGER (L12 progression) */
.stage-trigger{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;margin:0 0 10px 24px;font-size:13px;color:var(--text-muted);border-left:2px dashed var(--orange);background:rgba(255,165,0,.04);border-radius:0 var(--radius) var(--radius) 0}
.stage-trigger strong{color:var(--orange)}
.stage-trigger .trigger-icon{color:var(--orange);font-weight:700;font-size:14px;line-height:1.4;flex-shrink:0}
.stage-note{font-size:12px;color:var(--text-dim);font-style:italic;margin-top:10px !important;margin-bottom:0 !important}

/* YAML FRONTMATTER BUILDER (L7) — interactive skill config builder */
.yaml-builder{margin:20px 0;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);overflow:hidden}
.yb-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface-2);border-bottom:1px solid var(--border);font-size:12px;color:var(--text-muted);font-weight:700;letter-spacing:.3px}
.yb-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.yb-split{display:grid;grid-template-columns:minmax(340px,1fr) minmax(380px,1fr);gap:0}
.lesson-wide .yb-split{grid-template-columns:minmax(400px,1fr) minmax(420px,1.1fr)}
.yb-controls{padding:20px 22px;border-right:1px solid var(--border)}
.yb-field{margin-bottom:14px}
.yb-field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.yb-field-label .yb-new{font-size:9px;color:var(--accent);background:var(--accent-dim);padding:1px 6px;border-radius:8px;letter-spacing:.5px}
.yb-field select{width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border-2);border-radius:var(--radius);color:var(--text);font-size:12px;font-family:'SF Mono',Consolas,monospace;cursor:pointer;transition:border-color .15s}
.yb-field select:focus{outline:none;border-color:var(--accent)}
.yb-field-hint{font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.5}
.yb-toggle{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;border:1px solid var(--border-2);border-radius:var(--radius);margin-bottom:6px;cursor:pointer;transition:all .15s;background:var(--bg)}
.yb-toggle:hover{border-color:var(--accent-border);background:var(--accent-dim)}
.yb-toggle input{margin-top:3px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
.yb-toggle-label{font-size:12px;color:var(--text);font-family:'SF Mono',Consolas,monospace;font-weight:700}
.yb-toggle-desc{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400;line-height:1.45}
.yb-preview{padding:18px 20px;background:var(--bg);min-height:280px}
.yb-preview-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:10px}
.yb-preview pre{margin:0;font-family:'SF Mono',Consolas,monospace;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.yb-preview pre .yb-kw{color:#5b9cf6}
.yb-preview pre .yb-str{color:var(--accent)}
.yb-preview pre .yb-cmt{color:var(--text-dim);font-style:italic}
.yb-behavior{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
.yb-behavior-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.yb-tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;font-family:'SF Mono',Consolas,monospace;border:1px solid;letter-spacing:.2px}
.yb-tag.green{background:rgba(121,234,32,.1);color:var(--accent);border-color:rgba(121,234,32,.3)}
.yb-tag.blue{background:rgba(91,156,246,.1);color:var(--blue);border-color:rgba(91,156,246,.3)}
.yb-tag.purple{background:rgba(192,132,252,.1);color:var(--purple);border-color:rgba(192,132,252,.3)}
.yb-tag.orange{background:rgba(255,165,0,.1);color:var(--orange);border-color:rgba(255,165,0,.3)}
.yb-tag.red{background:rgba(255,107,107,.1);color:var(--red);border-color:rgba(255,107,107,.3)}
.yb-tag.gray{background:var(--surface-3);color:var(--text-muted);border-color:var(--border-2)}
.yb-explanation{font-size:12.5px;color:var(--text-muted);line-height:1.6}
.yb-explanation code{background:var(--surface-3);padding:1px 6px;border-radius:3px;color:var(--accent)}

/* PIN-OUTPUT LESSON VISUALS (L16) */
.pin-hero{margin:20px 0;padding:20px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.pin-hero svg{width:100%;height:auto;display:block;max-width:860px;margin:0 auto}
.pin-flow{margin:20px 0;padding:20px 16px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.pin-flow svg{width:100%;height:auto;display:block;max-width:900px;margin:0 auto}
.pin-example{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin:14px 0}
.pin-example-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.pin-example-head svg{flex-shrink:0;width:42px;height:42px}
.pin-example-head h4{margin:0;font-size:15px;color:var(--text)}
.pin-example-head .reach-type{font-size:11px;color:var(--text-dim);font-family:'SF Mono',Consolas,monospace}
.pin-fields{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;font-size:13px}
.pin-fields dt{color:var(--text-dim);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding-top:3px;white-space:nowrap}
.pin-fields dd{margin:0;color:var(--text-muted)}
.pin-fields dd strong{color:var(--text)}
.pin-fields dd code{background:var(--surface-3);padding:1px 6px;border-radius:3px;font-size:12px}

/* VISUAL CANVAS (L18 frontmatter lab) — live glyphs that react to frontmatter choices */
.yb-preset-bar{display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface-2);flex-wrap:wrap}
.yb-preset-bar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-dim);flex-shrink:0}
.yb-preset-bar select{flex:1;min-width:220px;max-width:340px;padding:8px 12px;background:var(--bg);border:1px solid var(--border-2);border-radius:var(--radius);color:var(--text);font-size:13px;font-family:'SF Mono',Consolas,monospace;cursor:pointer;font-weight:600}
.yb-preset-bar select:focus{outline:none;border-color:var(--accent)}
.yb-preset-bar-hint{font-size:11.5px;color:var(--text-dim);flex:1;min-width:200px;line-height:1.45}
.yb-visual-section{padding:16px 18px;border-bottom:1px solid var(--border);background:var(--surface)}
.yb-visual-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.yb-visual-label::after{content:"";flex:1;height:1px;background:var(--border)}
.glyph-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.glyph-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;display:flex;flex-direction:column;min-height:115px;transition:border-color .2s}
.glyph-card:hover{border-color:var(--border-3)}
.glyph-card.wide{grid-column:span 3}
.glyph-card.span-2{grid-column:span 2}
.glyph-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;gap:4px;flex-wrap:wrap}
.glyph-label .glyph-field{font-family:'SF Mono',Consolas,monospace;color:var(--text-muted);font-weight:500;text-transform:none;letter-spacing:0;font-size:9px}
.glyph-body{flex:1;display:flex;align-items:center;justify-content:center;min-height:52px;padding:2px 0}
.glyph-body svg{max-width:100%;height:auto;display:block;max-height:64px}
.glyph-card.wide .glyph-body svg{max-height:80px}
.glyph-value{font-size:10px;color:var(--text-muted);margin-top:3px;text-align:center;font-family:'SF Mono',Consolas,monospace;min-height:12px}
.glyph-value.lit{color:var(--accent);font-weight:700}

/* Tooltip: hover a glyph card to see the WHY for the current preset */
.glyph-card[data-tip]{position:relative;cursor:help}
.glyph-card[data-tip]:hover{border-color:var(--accent-border)}
.glyph-card[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--accent-border);
  padding:10px 14px;border-radius:6px;
  font-size:11.5px;color:var(--text);line-height:1.55;
  width:max-content;max-width:300px;white-space:normal;text-align:left;
  z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.55);
  pointer-events:none;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-weight:400
}
.glyph-card[data-tip]:hover::before{
  content:"";position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--accent-border);
  z-index:101;pointer-events:none
}
@media (max-width:1100px){
  .glyph-grid{grid-template-columns:repeat(4,1fr)}
  .glyph-card.wide{grid-column:span 4}
  .glyph-card.span-2{grid-column:span 2}
}
@media (max-width:720px){
  .yb-split{grid-template-columns:1fr}
  .yb-controls{border-right:none;border-bottom:1px solid var(--border)}
  .glyph-grid{grid-template-columns:repeat(2,1fr)}
  .glyph-card.wide,.glyph-card.span-2{grid-column:span 2}
}

/* COLLAPSIBLE DETAILS (L7 full YAML table) */
details.ref-details{margin:16px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
details.ref-details[open]{background:var(--surface)}
details.ref-details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);list-style:none;display:flex;align-items:center;gap:10px;transition:background .15s}
details.ref-details summary:hover{background:var(--surface-2)}
details.ref-details summary::-webkit-details-marker{display:none}
details.ref-details summary::before{content:'\25B6';font-size:10px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
details.ref-details[open] summary::before{transform:rotate(90deg)}
details.ref-details summary .ref-hint{font-size:12px;color:var(--text-dim);font-weight:400;margin-left:auto}
details.ref-details .ref-body{padding:0 16px 16px;border-top:1px solid var(--border)}

/* CHECKLIST */
.checklist{list-style:none;margin:16px 0;padding:0}
.checklist li{padding:8px 0 8px 28px;font-size:14px;color:var(--text-muted);position:relative;line-height:1.55}
.checklist li::before{content:'';position:absolute;left:0;top:11px;width:16px;height:16px;border:1.5px solid var(--accent);border-radius:3px;background:var(--accent-dim)}
.checklist li::after{content:'\2713';position:absolute;left:3px;top:8px;color:var(--accent);font-weight:700;font-size:12px}
.checklist li strong{color:var(--text)}

/* MINI RULE BOX */
.rule{display:flex;gap:12px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);margin:10px 0;font-size:13.5px}
.rule-num{font-weight:700;color:var(--accent);flex-shrink:0;width:24px}
.rule-body{color:var(--text-muted)}
.rule-body strong{color:var(--text)}

/* SCOPE MAP (L7) — 4-card horizontal install-scope visual */
.scope-map{margin:18px 0 10px;padding:16px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.scope-map svg{width:100%;height:auto;display:block;max-width:900px;margin:0 auto}

/* EVOLUTION CANVAS (L12) — interactive 5-stage skill library evolution */
.evo-canvas{margin:26px 0;padding:22px 18px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-lg)}
.evo-nav{display:flex;gap:6px;margin-bottom:22px;justify-content:center;flex-wrap:wrap}
.evo-tab{padding:8px 18px;font-size:12px;font-weight:700;font-family:'SF Mono',Consolas,monospace;letter-spacing:.5px;cursor:pointer;background:var(--surface-3);border:1px solid var(--border-2);color:var(--text-muted);border-radius:20px;transition:all .2s}
.evo-tab:hover{border-color:var(--accent);color:var(--text)}
.evo-tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.evo-panel{display:none;animation:fadeIn .35s ease}
.evo-panel.active{display:block}
.evo-panel svg{width:100%;height:auto;max-width:760px;display:block;margin:0 auto}
.evo-caption{text-align:center;color:var(--text-muted);font-size:13px;margin:18px auto 0;max-width:620px;line-height:1.55}
.evo-caption strong{color:var(--text)}
.evo-caption .pill{display:inline-block;padding:1px 8px;border-radius:10px;background:var(--accent-dim);color:var(--accent);font-family:'SF Mono',Consolas,monospace;font-size:11px;font-weight:700;margin-right:6px}

/* FEATURE CARD (L3) — visual + rule body side by side */
.feature-card{display:flex;gap:20px;padding:18px 20px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);margin:14px 0;font-size:13.5px;align-items:center}
.feature-visual{flex-shrink:0;width:170px}
.feature-visual svg{width:100%;height:auto;display:block}
.feature-text{flex:1;display:flex;gap:12px}
.feature-text .fnum{font-weight:700;color:var(--accent);flex-shrink:0;width:22px;font-size:15px}
.feature-text .fbody{color:var(--text-muted)}
.feature-text .fbody strong{color:var(--text)}
.feature-card.dq .feature-visual{width:200px}
.feature-card.dq .feature-text .fbody em{color:var(--text-muted);font-style:italic;display:block;margin-top:6px;font-size:12.5px}
@media (max-width:680px){
  .feature-card{flex-direction:column;align-items:stretch}
  .feature-visual{width:100%;max-width:280px;margin:0 auto}
}

svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* RESPONSIVE */
@media(max-width:900px){
  .sidebar{display:none;position:fixed;top:53px;left:0;bottom:0;z-index:150;width:280px}
  .sidebar.open{display:flex;flex-direction:column}
  .menu-btn{display:flex;align-items:center;justify-content:center}
  .main{padding:24px}
  .type-cards{grid-template-columns:1fr}
  .compare-2{grid-template-columns:1fr}
  .matrix-table{font-size:12px}
}
</style>

<script>
const LESSONS = [
  {id:'welcome',      group:'Orientation',       name:'Welcome & What You\'ll Build'},
  {id:'what-is-skill',group:'Orientation',       name:'What Is a Skill?'},
  {id:'comparison',   group:'Orientation',       name:'Foundational vs Production'},
  {id:'prereq',       group:'Install the Skill', name:'Prerequisites & Two Paths'},
  {id:'install-cc',   group:'Install the Skill', name:'Install on Claude Code'},
  {id:'install-web',  group:'Install the Skill', name:'Install on Claude.ai'},
  {id:'anatomy',      group:'Core Teaching',     name:'Skill Anatomy'},
  {id:'disclosure',   group:'Core Teaching',     name:'Progressive Disclosure'},
  {id:'types',        group:'Core Teaching',     name:'The Three Skill Types'},
  {id:'decision',     group:'Core Teaching',     name:'Workflow vs Standalone'},
  {id:'chain',        group:'Core Teaching',     name:'How Skills Chain'},
  {id:'progression',  group:'Core Teaching',     name:'From Skill to Library'},
  {id:'desc',         group:'Core Teaching',     name:'Descriptions That Trigger'},
  {id:'improve',      group:'Core Teaching',     name:'Iterative Improvement'},
  {id:'pin-output',   group:'Ship It',           name:'Pin the Output First'},
  {id:'frameworks',   group:'Ship It',           name:'Frameworks & Thinking Methods'},
  {id:'first-skill',  group:'Ship It',           name:'Your First Skill'},
  {id:'ship',         group:'Ship It',           name:'Validate, Test, Ship'},
  {id:'frontmatter-lab', group:'Reference',      name:'YAML Builder Lab'},
];

const state = {
  currentLesson: window.location.hash.slice(1) || 'welcome',
  completed: new Set(JSON.parse(localStorage.getItem('mcs-completed') || '[]')),
};

function saveState(){ localStorage.setItem('mcs-completed', JSON.stringify([...state.completed])); }

function renderSidebar(){
  let html=''; let lastGroup='';
  LESSONS.forEach(l=>{
    if(l.group!==lastGroup){ html+=`<div class="sidebar-label">${l.group}</div>`; lastGroup=l.group; }
    const active = l.id===state.currentLesson ? 'active':'';
    const done = state.completed.has(l.id) ? 'completed':'';
    const check = state.completed.has(l.id) ? '\u2713':'';
    html += `<div class="lesson-item ${active} ${done}" onclick="goToLesson('${l.id}')">
      <div class="lesson-check">${check}</div>
      <span class="lesson-name">${l.name}</span>
    </div>`;
  });
  document.getElementById('sidebar').innerHTML = html;
}

function renderProgress(){
  const total = LESSONS.length;
  const done = state.completed.size;
  const pct = Math.round((done/total)*100);
  document.getElementById('progressText').textContent = `${done} / ${total}`;
  document.getElementById('progressFill').style.width = pct + '%';
}

function goToLesson(id){
  state.currentLesson = id;
  window.location.hash = id;
  renderSidebar();
  renderLesson(id);
  document.querySelector('.sidebar').classList.remove('open');
  window.scrollTo(0,0);
  document.querySelector('.main').scrollTo(0,0);
}
function nextLesson(){ const i = LESSONS.findIndex(l=>l.id===state.currentLesson); if(i<LESSONS.length-1) goToLesson(LESSONS[i+1].id); }
function prevLesson(){ const i = LESSONS.findIndex(l=>l.id===state.currentLesson); if(i>0) goToLesson(LESSONS[i-1].id); }
function markComplete(id){
  if(state.completed.has(id)) state.completed.delete(id); else state.completed.add(id);
  saveState(); renderSidebar(); renderProgress();
  document.querySelectorAll('.mark-btn').forEach(btn=>{
    const d = state.completed.has(id);
    btn.classList.toggle('done', d);
    const ic = btn.querySelector('.mark-icon'); if(ic) ic.textContent = d?'\u2713':'';
    const lbl = btn.querySelector('.mark-label'); if(lbl) lbl.textContent = d?'Completed':'Mark Complete';
  });
}
function markAndNext(id){
  if(!state.completed.has(id)) state.completed.add(id);
  saveState(); renderProgress();
  nextLesson();
}
function switchExTab(group, tabId){
  document.querySelectorAll(`[data-extab-group="${group}"]`).forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[data-extab-panel="${group}-${tabId}"]`).forEach(el => el.classList.add('active'));
  document.querySelector(`[data-extab="${group}-${tabId}"]`)?.classList.add('active');
}
function scrollFw(cat){
  const el = document.querySelector(`[data-fw-cat="${cat}"]`);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
function renderMarkBtn(id){
  const d = state.completed.has(id);
  return `<button class="mark-btn ${d?'done':''}" onclick="markComplete('${id}')"><span class="mark-icon">${d?'\u2713':''}</span><span class="mark-label">${d?'Completed':'Mark Complete'}</span></button>`;
}
function renderFooter(id){
  const i = LESSONS.findIndex(l=>l.id===id);
  const last = i === LESSONS.length - 1;
  return `<div class="lesson-footer">
    <button class="nav-btn ${i===0?'disabled':''}" onclick="prevLesson()">&larr; Previous</button>
    ${renderMarkBtn(id)}
    ${last
      ? `<button class="nav-btn primary" onclick="markComplete('${id}')">Finish Course &#10003;</button>`
      : `<button class="nav-btn primary" onclick="markAndNext('${id}')">Complete &amp; Continue &rarr;</button>`}
  </div>`;
}

function renderLesson(id){
  const i = LESSONS.findIndex(l=>l.id===id);
  const lesson = LESSONS[i];
  let html = `<div class="lesson">`;
  html += `<div style="display:flex;justify-content:flex-end;margin-bottom:16px">${renderMarkBtn(id)}</div>`;
  html += `<div class="lesson-header"><div class="lesson-num">Lesson ${i+1} of ${LESSONS.length} &middot; ${lesson.group}</div>`;
  html += LESSON_CONTENT[id] || '<p>Coming soon.</p>';
  html += `</div>` + renderFooter(id) + `</div>`;
  document.getElementById('main').innerHTML = html;
  document.getElementById('main').classList.toggle('lesson-wide', id === 'frontmatter-lab');
  if (typeof updateYamlBuilder === 'function' && document.getElementById('yb-output')) updateYamlBuilder(true);
}

    defaults: {hooks:false, fork:true, disable:false, userinv:false, wtu:true, arg:false, tools:'all', paths:'', shell:'bash', agent:'', model:'', effort:''},

let ybCurrentPreset = null;
function ybLoadPreset(name){
  const p = ybPresets[name]; if(!p) return;
  const d = p.defaults;
  document.getElementById('yb-hooks').checked = d.hooks;
  document.getElementById('yb-userinv').checked = d.userinv;
  document.getElementById('yb-disable').checked = d.disable;
  document.getElementById('yb-fork').checked = d.fork;
  document.getElementById('yb-wtu').checked = d.wtu;
  document.getElementById('yb-arg').checked = d.arg;
  document.getElementById('yb-tools').value = d.tools;
  document.getElementById('yb-paths').value = d.paths;
  document.getElementById('yb-shell').value = d.shell;
  document.getElementById('yb-agent').value = d.agent;
  document.getElementById('yb-model').value = d.model;
  document.getElementById('yb-effort').value = d.effort;
}
function updateYamlBuilder(initial){
  const presetName = document.getElementById('yb-preset').value;
  if (initial || presetName !== ybCurrentPreset){
    ybLoadPreset(presetName);
    ybCurrentPreset = presetName;
  }
  const preset = ybPresets[presetName];
  const hooks = document.getElementById('yb-hooks').checked;
  const userinv = document.getElementById('yb-userinv').checked;
  const disable = document.getElementById('yb-disable').checked;
  const wtu = document.getElementById('yb-wtu').checked;
  const argOn = document.getElementById('yb-arg').checked;
  const tools = document.getElementById('yb-tools').value;
  const paths = document.getElementById('yb-paths').value;
  const shell = document.getElementById('yb-shell').value;
  const agent = document.getElementById('yb-agent').value;
  const model = document.getElementById('yb-model').value;
  const effort = document.getElementById('yb-effort').value;

  // Smart default: agent requires context:fork per Anthropic docs. Auto-enforce.
  let fork = document.getElementById('yb-fork').checked;
  if (agent && !fork){
    fork = true;
    document.getElementById('yb-fork').checked = true;
  }

  const pathsMap = {
    'skills': '".claude/skills/**/SKILL.md"',
    'ts': '"src/**/*.{ts,tsx}"',
    'py': '"**/*.py"',
    'md': '"**/*.md"'
  };

  let y = '';
  y += '<span class="yb-kw">---</span>\n';
  y += '<span class="yb-kw">name:</span> ' + presetName + '\n';
  y += '<span class="yb-kw">description:</span> <span class="yb-str">' + preset.desc + '</span>\n';
  if (wtu && preset.whenToUse) y += '<span class="yb-kw">when_to_use:</span> <span class="yb-str">' + preset.whenToUse + '</span>\n';
  if (argOn && preset.argHint) y += '<span class="yb-kw">argument-hint:</span> <span class="yb-str">' + preset.argHint + '</span>\n';
  if (hooks){
    y += '<span class="yb-kw">hooks:</span>\n';
    y += '  <span class="yb-kw">Stop:</span>\n';
    y += '    - <span class="yb-kw">type:</span> prompt\n';
    y += '      <span class="yb-kw">prompt:</span> |\n';
    y += '        <span class="yb-cmt">Check if this session contained skill friction...</span>\n';
  }
  if (userinv) y += '<span class="yb-kw">user-invocable:</span> true\n';
  if (disable) y += '<span class="yb-kw">disable-model-invocation:</span> true\n';
  if (tools === 'readonly') y += '<span class="yb-kw">allowed-tools:</span> Read, Grep, Glob\n';
  else if (tools === 'noshell') y += '<span class="yb-kw">allowed-tools:</span> Read, Write, Edit, Grep, Glob\n';
  if (paths && pathsMap[paths]) y += '<span class="yb-kw">paths:</span> ' + pathsMap[paths] + '\n';
  if (shell === 'powershell') y += '<span class="yb-kw">shell:</span> powershell\n';
  if (fork) y += '<span class="yb-kw">context:</span> fork\n';
  if (agent) y += '<span class="yb-kw">agent:</span> ' + agent + '\n';
  if (model) y += '<span class="yb-kw">model:</span> ' + model + '\n';
  if (effort) y += '<span class="yb-kw">effort:</span> ' + effort + '\n';
  y += '<span class="yb-kw">---</span>';
  document.getElementById('yb-output').innerHTML = y;

  const tags = [];
  tags.push(disable ? {cls:'red', label:'user-only'} : {cls:'green', label:'auto-triggers'});
  if (userinv && !disable) tags.push({cls:'blue', label:'in /menu'});
  if (wtu && preset.whenToUse) tags.push({cls:'green', label:'when_to_use set'});
  if (argOn && preset.argHint) tags.push({cls:'gray', label:'arg hint: ' + preset.argHint});
  if (hooks) tags.push({cls:'purple', label:'Stop hook'});
  tags.push(fork ? {cls:'orange', label:'forked context'} : {cls:'gray', label:'inline context'});
  if (tools === 'readonly') tags.push({cls:'blue', label:'read-only'});
  else if (tools === 'noshell') tags.push({cls:'orange', label:'no shell'});
  if (paths) tags.push({cls:'blue', label:'path-scoped'});
  if (shell === 'powershell') tags.push({cls:'orange', label:'powershell'});
  if (agent) tags.push({cls:'purple', label:'subagent: ' + agent});
  if (model) tags.push({cls:'blue', label:'model: ' + model.replace('claude-','')});
  if (effort) tags.push({cls:'orange', label:'effort: ' + effort});
  document.getElementById('yb-tags').innerHTML = tags.map(t => `<span class="yb-tag ${t.cls}">${t.label}</span>`).join('');

  let exp = '';
  exp += disable
    ? 'Users invoke this by slash command only. Claude will not auto-load it from prompts. '
    : 'Claude auto-loads this skill when a prompt matches the description. ';
  if (userinv && !disable) exp += 'It also shows up in the slash-command menu for manual invocation. ';
  if (wtu && preset.whenToUse) exp += 'The <code>when_to_use</code> field adds explicit trigger phrases on top of the description &mdash; Claude treats them as additional match signals. ';
  if (argOn && preset.argHint) exp += 'The autocomplete hint <code>' + preset.argHint + '</code> shows inline when users type the slash command. ';
  if (fork) exp += 'Each call runs in a forked context so the skill gets a clean read of the input. ';
  if (tools === 'readonly') exp += 'Tool access is locked to <code>Read</code>, <code>Grep</code>, <code>Glob</code> &mdash; safe for audit or research work. ';
  else if (tools === 'noshell') exp += 'Claude can read and write files but cannot run shell commands. ';
  if (paths) exp += 'The <code>paths</code> glob restricts auto-activation to files matching the pattern &mdash; the skill only fires when you\'re working with those files. ';
  if (shell === 'powershell') exp += 'Inline shell blocks run through PowerShell instead of bash (Windows). ';
  if (hooks) exp += 'The Stop hook fires at session end to auto-detect friction. ';
  if (agent) exp += 'Spawns as the <code>' + agent + '</code> subagent with its own context window. ';
  if (effort === 'low') exp += 'Low effort keeps responses fast and cheap. ';
  else if (effort === 'medium') exp += 'Medium effort is the balanced default. ';
  else if (effort === 'high') exp += 'High effort unlocks deep reasoning for complex analysis. ';
  else if (effort === 'xhigh') exp += 'xhigh effort extends reasoning further for heavy analysis jobs. ';
  else if (effort === 'max') exp += 'Max effort gives the skill the maximum thinking budget the model supports. ';
  if (model) exp += 'Pinned to <code>' + model + '</code> regardless of the session default. ';
  document.getElementById('yb-explain').innerHTML = exp;

  updateGlyphs({preset, presetName, hooks, userinv, disable, fork, wtu, argOn, tools, paths, shell, agent, model, effort});
}

function updateGlyphs(s){
  const g = document.getElementById('glyph-model');
  if (!g) return;
  document.getElementById('glyph-model').innerHTML = glyphModel(s.model);
  document.getElementById('glyph-effort').innerHTML = glyphEffort(s.effort);
  document.getElementById('glyph-fork').innerHTML = glyphFork(s.fork);
  document.getElementById('glyph-agent').innerHTML = glyphAgent(s.agent, s.fork);
  document.getElementById('glyph-tools').innerHTML = glyphTools(s.tools);
  document.getElementById('glyph-hooks').innerHTML = glyphHooks(s.hooks);
  document.getElementById('glyph-routing').innerHTML = glyphRouting(s.disable, s.userinv);
  document.getElementById('glyph-paths').innerHTML = glyphPaths(s.paths);
  document.getElementById('glyph-shell').innerHTML = glyphShell(s.shell);
  document.getElementById('glyph-triggers').innerHTML = glyphTriggers(s.wtu, s.argOn, s.preset, s.presetName);

  setVal('glyph-model-val', s.model ? s.model.replace('claude-','') : 'default', !!s.model);
  setVal('glyph-effort-val', s.effort || 'default (inherit)', !!s.effort);
  setVal('glyph-fork-val', s.fork ? 'forked context' : 'inline context', !!s.fork);
  setVal('glyph-agent-val', s.agent || 'no subagent', !!s.agent);
  setVal('glyph-tools-val', s.tools === 'all' ? 'all tools' : (s.tools === 'readonly' ? 'read-only' : 'no shell'), s.tools !== 'all');
  setVal('glyph-hooks-val', s.hooks ? 'Stop hook enabled' : 'off', !!s.hooks);
  setVal('glyph-routing-val', s.disable ? 'slash-only' : (s.userinv ? 'auto + /menu' : 'auto-load'), s.disable || s.userinv);
  setVal('glyph-paths-val', s.paths ? 'scoped by glob' : 'all files', !!s.paths);
  setVal('glyph-shell-val', s.shell === 'powershell' ? 'PowerShell' : 'bash (default)', s.shell === 'powershell');
  const triggersLabel = [s.wtu ? 'when_to_use' : null, s.argOn ? 'argument-hint' : null].filter(Boolean).join(' + ');
  setVal('glyph-triggers-val', triggersLabel || 'description only', !!(s.wtu || s.argOn));

  const r = s.preset.reasons || {};
  setTip('card-model',    r.model);
  setTip('card-effort',   r.effort);
  setTip('card-fork',     r.fork);
  setTip('card-agent',    r.agent);
  setTip('card-tools',    r.tools);
  setTip('card-hooks',    r.hooks);
  setTip('card-routing',  r.routing);
  setTip('card-paths',    r.paths);
  setTip('card-shell',    r.shell);
  setTip('card-triggers', r.triggers);
}
function setTip(id, text){
  const el = document.getElementById(id);
  if (!el) return;
  if (text) el.setAttribute('data-tip', text);
  else el.removeAttribute('data-tip');
}
function setVal(id, text, lit){
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('lit', !!lit);
}

function glyphModel(model){
  const states = {
    '':                   {fill:'none',    stroke:'#555',    opacity:0.55, scale:0.72, label:''},
    'claude-haiku-4-5':   {fill:'rgba(91,156,246,0.35)',  stroke:'#5b9cf6', opacity:0.8,  scale:0.78},
    'claude-sonnet-4-6':  {fill:'rgba(192,132,252,0.55)', stroke:'#c084fc', opacity:0.95, scale:0.9},
    'claude-opus-4-7':    {fill:'url(#brainGradOpus)',    stroke:'#79EA20', opacity:1,    scale:1.05}
  };
  const s = states[model] || states[''];
  return '<svg viewBox="0 0 120 90" width="140" height="95">'
    + '<defs><linearGradient id="brainGradOpus" x1="0" y1="0" x2="1" y2="1">'
    + '<stop offset="0%" stop-color="#79EA20"/>'
    + '<stop offset="60%" stop-color="#c084fc"/>'
    + '<stop offset="100%" stop-color="#5b9cf6"/>'
    + '</linearGradient></defs>'
    + '<g transform="translate(60,45) scale(' + s.scale + ')" opacity="' + s.opacity + '">'
    + '<ellipse cx="-14" cy="0" rx="24" ry="28" fill="' + s.fill + '" stroke="' + s.stroke + '" stroke-width="1.8"/>'
    + '<ellipse cx="14" cy="0" rx="24" ry="28" fill="' + s.fill + '" stroke="' + s.stroke + '" stroke-width="1.8"/>'
    + '<line x1="0" y1="-26" x2="0" y2="26" stroke="' + s.stroke + '" stroke-width="1.2" opacity="0.6"/>'
    + '<path d="M -28,-6 Q -20,0 -28,6" fill="none" stroke="' + s.stroke + '" stroke-width="1" opacity="0.55"/>'
    + '<path d="M 28,-6 Q 20,0 28,6" fill="none" stroke="' + s.stroke + '" stroke-width="1" opacity="0.55"/>'
    + '<path d="M -18,-22 Q 0,-16 18,-22" fill="none" stroke="' + s.stroke + '" stroke-width="1" opacity="0.45"/>'
    + '<path d="M -18,22 Q 0,16 18,22" fill="none" stroke="' + s.stroke + '" stroke-width="1" opacity="0.45"/>'
    + '</g></svg>';
}

function glyphEffort(effort){
  const levels = {'':0,'low':1,'medium':2,'high':4,'xhigh':5,'max':6};
  const colors = ['#5b9cf6','#06b6d4','#22d3ee','#79EA20','#fbbf24','#FF6B6B'];
  const lit = levels[effort] || 0;
  let bars = '';
  for (let i = 0; i < 6; i++){
    const on = i < lit;
    const color = on ? colors[i] : '#2a2a2a';
    const opacity = on ? '1' : '0.5';
    bars += '<rect x="' + (8 + i*18) + '" y="14" width="14" height="26" rx="2" fill="' + color + '" opacity="' + opacity + '"/>';
  }
  return '<svg viewBox="0 0 130 56" width="150" height="60">' + bars
    + '<text x="65" y="52" text-anchor="middle" font-family="SF Mono,Consolas,monospace" font-size="8" fill="#9ea3ba" letter-spacing="1.5">POWER</text>'
    + '</svg>';
}

function glyphTools(tools){
  const labels = ['Rd','Wr','Ed','Gp','Gl','Bash'];
  let allowed;
  if (tools === 'readonly')      allowed = [true,false,false,true,true,false];
  else if (tools === 'noshell')  allowed = [true,true,true,true,true,false];
  else                           allowed = [true,true,true,true,true,true];
  let g = '';
  for (let i = 0; i < 6; i++){
    const on = allowed[i];
    const border = on ? '#79EA20' : '#444';
    const bg = on ? 'rgba(121,234,32,0.12)' : '#181818';
    const txt = on ? '#79EA20' : '#555';
    g += '<g>'
      + '<rect x="' + (6 + i*24) + '" y="14" width="20" height="24" rx="3" fill="' + bg + '" stroke="' + border + '" stroke-width="1.2"/>'
      + '<text x="' + (16 + i*24) + '" y="30" text-anchor="middle" font-family="SF Mono,Consolas,monospace" font-size="8" font-weight="700" fill="' + txt + '">' + labels[i] + '</text>';
    if (!on){
      g += '<line x1="' + (6 + i*24) + '" y1="14" x2="' + (26 + i*24) + '" y2="38" stroke="#FF6B6B" stroke-width="1.5" opacity="0.9"/>';
    }
    g += '</g>';
  }

LESSON_CONTENT['install-web'] = `
<h2>Install on Claude.ai</h2>
<p class="subtitle">Claude.ai has a native Skills install at <code>claude.ai/customize/skills</code>. Upload the skill as a ZIP, toggle it on, done. Auto-invokes like Claude Code.</p>

<div class="callout note">
  <strong>Two paths exist. Pick the right one.</strong> The native path (Customize &rarr; Skills) gives you a real skill that auto-invokes based on its description, just like Claude Code. The Project Knowledge path (bottom of this lesson) uploads files as reference documents you have to point to manually. Use the native path unless you specifically want the skill scoped to one Project chat.
</div>

<h3>Native path: Customize &rarr; Skills (recommended)</h3>

<div class="install-step">
  <div class="step-num">1</div>
  <div class="step-body">
    <h4>Enable Code Execution (prerequisite)</h4>
    <p>Skills on Claude.ai run inside the code execution sandbox, so turn it on once at <code>claude.ai/settings/capabilities</code> &rarr; toggle <strong>Code execution and file creation</strong> ON.</p>
    <p><em>On Enterprise plans:</em> the workspace owner also has to enable Skills + Code Execution at <code>claude.ai/admin-settings/skills</code> before individual users can install skills.</p>
    <div class="screenshot-placeholder" data-label="Screenshot: Settings &rarr; Capabilities toggle">Screenshot pending &mdash; Settings page, Code execution toggle</div>
  </div>
</div>

<div class="install-step">
  <div class="step-num">2</div>
  <div class="step-body">
    <h4>Package the skill as a ZIP</h4>
    <p>Zip the entire <code>meta-create-skill-standalone/</code> folder. The ZIP has to contain the folder itself (not loose files), and the folder must include <code>SKILL.md</code> at its root.</p>
    <div class="folder-tree"><span class="fold">&#128230; meta-create-skill-standalone.zip</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; meta-create-skill-standalone/</span>   <span class="ann"># folder name = skill name</span>
    &#9500;&#9472;&#9472; <span class="file">SKILL.md</span>                    <span class="ann"># required at root</span>
    &#9500;&#9472;&#9472; <span class="fold">&#128193; workflows/</span>
    &#9500;&#9472;&#9472; <span class="fold">&#128193; assets/</span>
    &#9492;&#9472;&#9472; <span class="fold">&#128193; references/</span></div>
  </div>
</div>

<div class="install-step">
  <div class="step-num">3</div>
  <div class="step-body">
    <h4>Upload at claude.ai/customize/skills</h4>
    <p>Go to <code>claude.ai/customize/skills</code> &rarr; click the <strong>+</strong> button &rarr; <strong>Create skill</strong> &rarr; <strong>Upload a skill</strong>. Select your ZIP. The skill shows up in the list with a toggle.</p>
    <div class="screenshot-placeholder" data-label="Screenshot: Customize &rarr; Skills upload dialog">Screenshot pending &mdash; Customize/Skills page with upload dialog open</div>
  </div>
</div>

<div class="install-step">
  <div class="step-num">4</div>
  <div class="step-body">
    <h4>Enable and invoke</h4>
    <p>Toggle the skill ON. Open any conversation and say something that matches the skill's description:</p>
    <div class="code-block">"Create a skill for writing daily standup summaries."
"Validate the carousel skill."
"Audit my skill library for overlap."</div>
    <p>Claude's router reads the description and auto-invokes the skill, so you don't need to reference it manually. Plan availability: <strong>Free, Pro, Max, Team, Enterprise</strong>.</p>
    <div class="screenshot-placeholder" data-label="Screenshot: skill enabled + first invocation">Screenshot pending &mdash; Skills list with toggle on, followed by chat</div>
  </div>
</div>

<h3>Alternative: Project Knowledge (for project-scoped use)</h3>
<p>If you want the skill files available only inside one specific Project chat (not auto-invoking globally):</p>
<ol>
  <li>Go to <code>claude.ai/projects</code> &rarr; <strong>New Project</strong>.</li>
  <li>In the project, use the <strong>project knowledge</strong> panel on the right &rarr; <strong>+</strong> &rarr; drag-drop your <code>SKILL.md</code> and workflow files. Max 30MB per file.</li>
  <li>Click <strong>Set project instructions</strong> and paste: <em>"When the user asks to create, validate, test, or audit a skill, follow the SKILL.md and workflow files in project knowledge."</em></li>
  <li>Start a chat in that project. You may still need to reference the files explicitly on the first turn, because they do <em>not</em> auto-invoke the way a properly installed skill does.</li>
</ol>

<div class="callout warn">
  <strong>What you lose on Claude.ai (vs Claude Code):</strong> No <strong>hooks</strong> (the Stop hook that auto-detects skill friction is ignored, so you run retrospective manually). No <strong>custom subagents</strong> (parallel test runs fall back to sequential in-chat). No user <strong>Python scripts</strong> running outside the code-execution sandbox. No <strong>plugins</strong>, <strong>slash commands</strong>, <strong>settings.json</strong>, or local MCP config. Everything conceptual &mdash; architecture, routing, self-improvement &mdash; works identically.
</div>
`;

<h2>Skill Anatomy</h2>
<p class="subtitle">Five folders. One required file. Everything else is optional and loaded on demand.</p>

<div class="card">
  <div class="card-title">The canonical layout</div>
  <div class="folder-tree"><span class="fold">&#128193; skill-name/</span>
&#9500;&#9472;&#9472; <span class="file">SKILL.md</span>           <span class="ann"># required &mdash; router + core instructions (&lt;500 lines ideal)</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; workflows/</span>         <span class="ann"># optional &mdash; separate file per distinct flow</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; scripts/</span>           <span class="ann"># optional &mdash; executable code for deterministic work</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; references/</span>        <span class="ann"># optional &mdash; docs loaded only when needed</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; assets/</span>            <span class="ann"># optional &mdash; templates, examples, files used in output</span></div>
</div>

<h3>SKILL.md: the only required file</h3>
<p>SKILL.md is what Claude loads every time your skill triggers. Keep it under about 500 lines. If you need more, split the content into <code>workflows/</code> and <code>references/</code> and tell the model when to load each.</p>

<h4>YAML frontmatter</h4>
<p>Every SKILL.md starts with YAML between <code>---</code> fences:</p>
<div class="code-block"><span class="kw">---</span>
<span class="kw">name:</span> meta-create-skill-standalone
<span class="kw">description:</span> Create, validate, test, upgrade, and self-improve Claude skills.
  Use this when someone says 'create a skill', 'build a skill for X',
  'validate skill', 'test skill', 'audit my skill library', 'the skill got
  it wrong', 'retrospective', or any skill-authoring request.
<span class="kw">hooks:</span>
  <span class="kw">Stop:</span>
    - <span class="kw">type:</span> prompt
      <span class="kw">prompt:</span> |
        Check if this session contained skill friction...
<span class="kw">---</span></div>

<p>Three fields do most of the work:</p>
<ul>
  <li><strong>name</strong> &mdash; kebab-case, matches the folder name.</li>
  <li><strong>description</strong> &mdash; the single most important line in the entire skill. Claude's router reads it to decide whether to load you. Lesson 13 is dedicated to writing these well.</li>
  <li><strong>hooks</strong> (optional) &mdash; event handlers for self-improvement, validation, etc. Claude Code only; ignored on Claude.ai.</li>
</ul>

<div class="callout">

<h2>Progressive Disclosure</h2>
<p class="subtitle">Three tiers of loading. Most content shouldn't load until the moment it actually matters.</p>

<p>Progressive disclosure is how skills stay fast even as they grow. Each tier loads later, and only when needed.</p>

<div class="pyramid-wrap">
<svg viewBox="0 0 620 360" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:620px" aria-label="Progressive disclosure three-tier pyramid">
  <!-- Tier 1: Metadata -->
  <polygon points="260,20 360,20 410,80 210,80" fill="rgba(121,234,32,.18)" stroke="#79EA20" stroke-width="1.5"/>
  <text x="310" y="46" text-anchor="middle" fill="#e4e5ef" font-size="13" font-weight="700">Tier 1 &middot; Metadata</text>
  <text x="310" y="64" text-anchor="middle" fill="#9ea3ba" font-size="11">YAML name + description (~100 words)</text>

  <!-- Tier 2: SKILL.md body -->
  <polygon points="210,88 410,88 470,180 150,180" fill="rgba(91,156,246,.15)" stroke="#5b9cf6" stroke-width="1.5"/>
  <text x="310" y="120" text-anchor="middle" fill="#e4e5ef" font-size="13" font-weight="700">Tier 2 &middot; SKILL.md body</text>
  <text x="310" y="140" text-anchor="middle" fill="#9ea3ba" font-size="11">Router + core instructions</text>
  <text x="310" y="158" text-anchor="middle" fill="#9ea3ba" font-size="11">Ideally &lt; 500 lines</text>

  <!-- Tier 3: Bundled resources -->
  <polygon points="150,188 470,188 560,320 60,320" fill="rgba(192,132,252,.12)" stroke="#c084fc" stroke-width="1.5"/>
  <text x="310" y="224" text-anchor="middle" fill="#e4e5ef" font-size="13" font-weight="700">Tier 3 &middot; Bundled resources</text>
  <text x="310" y="246" text-anchor="middle" fill="#9ea3ba" font-size="11">workflows/ &nbsp;&middot;&nbsp; references/</text>
  <text x="310" y="262" text-anchor="middle" fill="#9ea3ba" font-size="11">assets/ &nbsp;&middot;&nbsp; scripts/</text>
  <text x="310" y="282" text-anchor="middle" fill="#9ea3ba" font-size="11">Loaded on demand &mdash; no hard size limit</text>

  <!-- Load-timing captions on the right -->
  <line x1="420" y1="50" x2="490" y2="50" stroke="#4a4d60" stroke-dasharray="3,3"/>
  <text x="500" y="54" fill="#79EA20" font-size="11" font-weight="600">always loaded</text>

  <line x1="480" y1="134" x2="530" y2="134" stroke="#4a4d60" stroke-dasharray="3,3"/>
  <text x="540" y="138" fill="#5b9cf6" font-size="11" font-weight="600">on trigger</text>

  <line x1="570" y1="250" x2="580" y2="250" stroke="#4a4d60" stroke-dasharray="3,3"/>
  <text x="490" y="340" fill="#c084fc" font-size="11" font-weight="600" text-anchor="middle">on demand &mdash; per workflow step</text>
</svg>
</div>

<h3>Why this matters</h3>
<p>Every token in Claude's context is a token it has to read. A skill with 2,000 lines of workflow content jammed into SKILL.md makes every invocation slower and more expensive, even when the user only needs one of its ten workflows.</p>

<p>So progressive disclosure means:</p>
<ul>
  <li>The <strong>description</strong> (Tier 1) is always in context because Claude uses it to decide whether to load your skill at all.</li>
  <li>The <strong>SKILL.md body</strong> (Tier 2) only loads when the skill actually triggers.</li>
  <li><strong>Workflow files, references, scripts</strong> (Tier 3) load only when SKILL.md specifically points to them.</li>
</ul>

<h3>The pointer pattern (reminder)</h3>
<p>When SKILL.md references something deeper, give the model a conditional load instruction:</p>
<div class="code-block"><span class="comment"># In SKILL.md:</span>
<span class="hl">Before starting an eval run, read <code>references/eval-schemas.md</code>
for the JSON shape the viewer expects.</span></div>

<p>Claude reads that instruction, decides "we're about to run an eval," and loads the reference. If the user asked about something else, the reference never loads.</p>

<div class="callout">
  <strong>Rule of thumb:</strong> if less than 30% of invocations need a piece of content, it belongs in Tier 3 (a separate file), not in the SKILL.md body.
</div>

<p style="margin-top:18px">Now you know how the folders load. The next question: what shapes do skills actually take once you start building them? Three archetypes cover almost everything.</p>

- "major release" / breaking changes &rarr; workflows/major-release.md

<h3>The five stages, and what triggers the next one</h3>

<div class="install-step">
  <div class="step-num">1</div>
  <div class="step-body">
    <h4>Single skill</h4>
    <p>One SKILL.md. One job. Maybe 100&ndash;200 lines. Fast to build, easy to understand, easy to change.</p>
    <div class="folder-tree"><span class="fold">&#128193; write-newsletter/</span>
&#9492;&#9472;&#9472; <span class="file">SKILL.md</span>               <span class="ann"># everything lives here</span></div>
    <p class="stage-note">Works when: one job, one output shape, no branching.</p>
  </div>
</div>

<div class="stage-trigger">
  <span class="trigger-icon">&darr;</span>
  <div><strong>Trigger to Stage 2:</strong> You want variants. Newsletter, email, thread, carousel. You catch yourself adding if-then-else branches to SKILL.md, or copying SKILL.md into a new folder per variant.</div>
</div>

<div class="install-step">
  <div class="step-num">2</div>
  <div class="step-body">
    <h4>Workflows emerge</h4>
    <p>The skill becomes a <strong>domain skill</strong> (see Lesson 9). Rename the folder so the name matches the broader scope. <code>write-newsletter/</code> becomes <code>write-content/</code> now that it also handles email, thread, and carousel. SKILL.md stays short and handles routing. Each variant is its own workflow file under <code>workflows/</code>.</p>
    <div class="folder-tree"><span class="fold">&#128193; write-content/</span>
&#9500;&#9472;&#9472; <span class="file">SKILL.md</span>               <span class="ann"># intent detection + shared voice</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; workflows/</span>
    &#9500;&#9472;&#9472; <span class="file">newsletter.md</span>
    &#9500;&#9472;&#9472; <span class="file">email.md</span>
    &#9500;&#9472;&#9472; <span class="file">thread.md</span>
    &#9492;&#9472;&#9472; <span class="file">carousel.md</span></div>
    <p class="stage-note">Works when: variants share domain knowledge but differ in shape, and only this parent skill uses them.</p>
  </div>
</div>

<div class="stage-trigger">
  <span class="trigger-icon">&darr;</span>
  <div><strong>Trigger to Stage 3:</strong> Two or more workflows share 40%+ of the same instructions. You catch yourself copy-pasting the same "sharpen the hook" or "apply my voice" prep into every workflow. Drift is about to start unless you move that piece out.</div>
</div>

<div class="install-step">
  <div class="step-num">3</div>
  <div class="step-body">
    <h4>Shared logic extracts into siblings</h4>
    <p>The repeated prep steps move out to their own skills at the same level. The parent&rsquo;s workflows delegate to them with <code>fork context</code> where needed.</p>

    <h5 style="font-size:13px;color:var(--text);margin:18px 0 8px">Why move them outside instead of keeping them nested?</h5>
    <div class="rule">
      <div class="rule-num">A</div>
      <div class="rule-body"><strong>One source of truth.</strong> When voice cleanup lives inside every workflow, you fix it in four places or the versions drift. One sibling folder means one file to edit. Every caller gets the fix automatically.</div>
    </div>
    <div class="rule">
      <div class="rule-num">B</div>
      <div class="rule-body"><strong>Other domains can reach for it.</strong> Nested inside <code>write-content/</code>, voice cleanup is locked to that parent. Pulled out as a sibling, your YouTube skill and your carousel skill can delegate to the same file. This is how libraries start compounding.</div>
    </div>
    <div class="rule">
      <div class="rule-num">C</div>
      <div class="rule-body"><strong>Fresh context per call.</strong> A standalone gets a clean read of the draft. No baggage from the writing session that produced the AI-isms it&rsquo;s supposed to catch. Fork context works only when the callee lives in its own folder.</div>
    </div>
    <div class="rule">
      <div class="rule-num">D</div>
      <div class="rule-body"><strong>Users can invoke it directly.</strong> Someone who just wants &ldquo;humanize this paragraph&rdquo; shouldn&rsquo;t have to run the whole content orchestrator. Siblings become directly callable by name. The skill now serves one-off invocations AND the orchestrator equally.</div>
    </div>

    <p style="margin-top:18px">Here&rsquo;s what the folder looks like after the move. The workflows inside <code>write-content/</code> stay put &mdash; they just delegate now instead of doing the work themselves:</p>
    <div class="folder-tree"><span class="fold">&#128193; .claude/skills/</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-content/</span>         <span class="ann"># still the parent</span>
&#9474;   &#9500;&#9472;&#9472; <span class="file">SKILL.md</span>
&#9474;   &#9492;&#9472;&#9472; <span class="fold">&#128193; workflows/</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">newsletter.md</span>  <span class="ann"># delegates to siblings below</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">email.md</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">thread.md</span>
&#9474;       &#9492;&#9472;&#9472; <span class="file">carousel.md</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-hook/</span>            <span class="ann"># extracted standalone</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; voice-cleanup/</span>         <span class="ann"># extracted standalone</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; format-platform/</span>       <span class="ann"># extracted standalone</span></div>
    <p class="stage-note">Works when: the extracted pieces are universal enough that other skills could reuse them. Each new standalone is now invocable by name.</p>
  </div>
</div>

<div class="stage-trigger">
  <span class="trigger-icon">&darr;</span>
  <div><strong>Trigger to Stage 4:</strong> <code>write-content/SKILL.md</code> is now mostly <em>"if newsletter go there, if email go there"</em> routing. The actual work happens in workflows and standalones. The parent has become a coordinator.</div>
</div>

<div class="install-step">
  <div class="step-num">4</div>
  <div class="step-body">
    <h4>Orchestrator formalizes</h4>
    <p>The folder structure barely changes here. What changes is the <em>role</em> you assign to the parent. It&rsquo;s no longer a domain skill &mdash; it&rsquo;s an <strong>orchestrator</strong>. Its SKILL.md does intent detection and delegation, nothing else. The workflows become pure stitchers that route work out to the standalones. Going forward you stop adding content logic to the parent. Every new capability goes into a standalone instead.</p>
    <p>Same tree as Stage 3, new labels:</p>
    <div class="folder-tree"><span class="fold">&#128193; .claude/skills/</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-content/</span>         <span class="ann"># ORCHESTRATOR now</span>
&#9474;   &#9500;&#9472;&#9472; <span class="file">SKILL.md</span>               <span class="ann"># routes intent only, no writing logic</span>
&#9474;   &#9492;&#9472;&#9472; <span class="fold">&#128193; workflows/</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">newsletter.md</span>       <span class="ann"># stitches calls, no content work</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">email.md</span>
&#9474;       &#9500;&#9472;&#9472; <span class="file">thread.md</span>
&#9474;       &#9492;&#9472;&#9472; <span class="file">carousel.md</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-hook/</span>            <span class="ann"># primitive</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; voice-cleanup/</span>         <span class="ann"># primitive</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; format-platform/</span>       <span class="ann"># primitive</span></div>
    <p class="stage-note">Works when: routing is the parent's main value and the standalone library handles actual work.</p>
  </div>
</div>

<div class="stage-trigger">
  <span class="trigger-icon">&darr;</span>
  <div><strong>Trigger to Stage 5:</strong> A completely different domain reaches for one of your standalones. Your <code>write-hook</code> turns out to also help structure video openings, ad copy, pitch decks. It&rsquo;s no longer a layer skill for content &mdash; it&rsquo;s a library primitive.</div>
</div>

<div class="install-step">
  <div class="step-num">5</div>
  <div class="step-body">
    <h4>Cross-domain reuse &mdash; the library shape matures</h4>
    <p>Multiple orchestrators across different domains all delegate to the same shared standalones. The standalones are now primitives, not layer skills. You don&rsquo;t refactor your way into Stage 5. You land here over time as you build new skills in new domains that reach for the primitives you already have. This is the mature chained library from Lesson 11.</p>
    <div class="folder-tree"><span class="fold">&#128193; .claude/skills/</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-content/</span>         <span class="ann"># orchestrator</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; youtube-strategy/</span>      <span class="ann"># orchestrator</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; ad-campaigns/</span>          <span class="ann"># orchestrator</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; write-hook/</span>            <span class="ann"># shared standalone &mdash; all 3 delegate here</span>
&#9500;&#9472;&#9472; <span class="fold">&#128193; voice-cleanup/</span>         <span class="ann"># shared standalone</span>
&#9492;&#9472;&#9472; <span class="fold">&#128193; format-platform/</span>       <span class="ann"># shared standalone</span></div>
    <p class="stage-note">Works when: you recognize the primitives and keep them clean. Now every new domain is just <em>one more orchestrator</em> that composes the existing primitives.</p>
  </div>
</div>

<h3>Can Claude pick the right architecture for you?</h3>
<p>Mostly, yes. When you run the <code>create-skill</code> workflow, it asks the Q1&ndash;Q5 questions from Lesson 10 and proposes an architecture from your honest answers.</p>

<p><strong>Where Claude does well:</strong> picking between Simple / With Workflows / Orchestrator for a <em>new</em> skill, given a clear problem statement, realistic trigger phrases, and one or two concrete input/output examples.</p>

<p><strong>Where Claude struggles:</strong></p>
<ul>
  <li><strong>Predicting future reuse.</strong> Stage 5 triggers (a different domain wants your standalone) are almost impossible to see upfront. You only notice when it happens.</li>
  <li><strong>Feeling the SKILL.md getting too long.</strong> That reading-fatigue pressure is yours to notice. Claude doesn&rsquo;t care how long the file is; you do.</li>
  <li><strong>Knowing your priorities.</strong> Shipping speed vs library hygiene is a judgment call. Tell Claude which one matters more for this skill. It&rsquo;ll optimize for whatever you name.</li>
</ul>

<div class="callout">
  When Claude gets the architecture wrong, that&rsquo;s what the <code>upgrade-skill</code> workflow is for. Don&rsquo;t try to get v1 perfect. Ship at 70% confidence. Use the skill. Upgrade when the friction tells you where the architecture is off.
</div>

<h3>Upgrade signals &mdash; what tells you it&rsquo;s time</h3>
<p>Read these like error codes. When you see the signal, the response is usually already decided.</p>

<div class="rule">
  <div class="rule-num">1</div>
  <div class="rule-body"><strong>SKILL.md passes ~500 lines.</strong> Split variants into their own workflow files. Move to Stage 2.</div>
</div>
<div class="rule">
  <div class="rule-num">2</div>
  <div class="rule-body"><strong>Two workflows share 40%+ of the same instructions.</strong> Extract the shared logic to its own skill. Move to Stage 3.</div>
</div>
<div class="rule">
  <div class="rule-num">3</div>
  <div class="rule-body"><strong>You&rsquo;re copy-pasting the same reference into new skills.</strong> That reference deserves to be a skill. Move to Stage 3.</div>
</div>
<div class="rule">
  <div class="rule-num">4</div>
  <div class="rule-body"><strong>Users or other skills invoke a sub-piece by name.</strong> Promote it to standalone so it's properly invocable. Move to Stage 3.</div>
</div>
<div class="rule">
  <div class="rule-num">5</div>
  <div class="rule-body"><strong>The description covers too many intents.</strong> You&rsquo;re already behaving as an orchestrator; formalize it. Move to Stage 4.</div>
</div>
<div class="rule">
  <div class="rule-num">6</div>
  <div class="rule-body"><strong>A different domain wants one of your standalones.</strong> It&rsquo;s a library primitive now, not a layer skill. Move to Stage 5.</div>
</div>

<div class="callout warn">
  <strong>The default when uncertain: go standalone.</strong> Extracting a nested workflow into a standalone later is cheap &mdash; you lift the file, wire up delegation, done. Merging a standalone back into its parent is expensive &mdash; you have to re-integrate state, re-test, and update every other skill that was delegating to it. Bias toward extractable from day one.
</div>

<p style="margin-top:18px">Every skill in that growing library depends on one field to even get loaded. If the router can't find your skill, none of the structure matters. That one field is next.</p>

<h3>How to use frameworks inside a skill</h3>
<ol>
  <li><strong>Inline it.</strong> Paste the framework definition straight into the skill body for small frameworks (PAS, ABT). Fast, zero dependencies.</li>
  <li><strong>Reference a standalone skill.</strong> If the framework is big enough to reuse across many parents (SEED, Agreement Analogy), make it its own skill and write <em>"Delegate to [framework-skill]"</em> from the parent.</li>
  <li><strong>Teach the acronym + apply step by step.</strong> Expand the letters once, then run through each letter as a numbered step in your workflow. The model follows the structure you named.</li>
</ol>

<p>Not exhaustive. Just starting points. When your problem matches one of these shapes, reach for it first. Don't invent.</p>
