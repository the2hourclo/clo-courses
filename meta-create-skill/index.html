<div class="fw-group" data-fw-cat="narrative">
  <h3 style="color:var(--blue)">1. Narrative &amp; Argument Structure</h3>
  <p class="fw-group-desc">For shaping a piece of writing, a talk, or any argument that needs a spine.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">ABT</div>
      <div class="fw-expand">And &middot; But &middot; Therefore</div>
      <p class="fw-use">3-beat narrative spine. Set context with AND, introduce tension with BUT, deliver resolution with THEREFORE. Randy Olson's core story structure.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Five Phases</div>
      <div class="fw-expand">Ground &middot; Tension &middot; Pivot &middot; Proof &middot; Land</div>
      <p class="fw-use">Essay / long-form structure. Ground the shared reality, raise a tension, pivot to a new frame, prove with evidence, land the takeaway.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">5-Beat Hook</div>
      <div class="fw-expand">Claim &middot; Problem &middot; Cost &middot; Mechanism &middot; CTA</div>
      <p class="fw-use">Opening structure for threads, videos, carousels. State a claim, name the problem, show the cost of getting it wrong, reveal the mechanism, invite the reader deeper.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">STAR</div>
      <div class="fw-expand">Situation &middot; Task &middot; Action &middot; Result</div>
      <p class="fw-use">Story-telling structure for behavioral examples, case studies, interview answers. Gives a case a repeatable shape.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="persuasion">
  <h3 style="color:var(--purple)">2. Persuasion &amp; Sales</h3>
  <p class="fw-group-desc">For shifting belief, handling objections, or moving a prospect to act.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">PAS</div>
      <div class="fw-expand">Problem &middot; Agitate &middot; Solve</div>
      <p class="fw-use">Copywriting workhorse. Name the pain, agitate the consequences, then present the solution. Short and hard to resist when the problem is real.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">AIDA</div>
      <div class="fw-expand">Attention &middot; Interest &middot; Desire &middot; Action</div>
      <p class="fw-use">Classic advertising sequence. Grab attention, build interest, create desire, drive action. Works for ads, emails, landing pages.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Agreement Analogy</div>
      <div class="fw-expand">Dan Henry's framework</div>
      <p class="fw-use">Persuade without selling. Find an analogy the prospect already agrees with, transfer the agreement to your offer. They sell themselves.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Contextual CTA</div>
      <div class="fw-expand">Concept &middot; Curiosity &middot; Soft Close</div>
      <p class="fw-use">3-element CTA. Link the concept, open a curiosity gap, offer the next step. Continues the conversation instead of interrupting it.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">FAB</div>
      <div class="fw-expand">Features &middot; Advantages &middot; Benefits</div>
      <p class="fw-use">Product positioning. Feature = what it is. Advantage = what it does. Benefit = why the buyer cares. Pushes writing past spec-sheet mode.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="teaching">
  <h3 style="color:var(--green)">3. Teaching &amp; Explanation</h3>
  <p class="fw-group-desc">For making an idea land with someone who doesn't yet hold it.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">SEED</div>
      <div class="fw-expand">Show &middot; Extend &middot; Expose &middot; Direct</div>
      <p class="fw-use">4-beat teaching arc. Show a familiar scenario, extend it to your idea, expose the misconception, direct the next action.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Question Chain</div>
      <div class="fw-expand">Sequence of reader questions</div>
      <p class="fw-use">Structure a piece around the questions the reader would naturally ask. Each section answers one, which raises the next.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Feynman Technique</div>
      <div class="fw-expand">Explain-like-I'm-12</div>
      <p class="fw-use">Strip jargon. Teach the concept in plain words a 12-year-old would understand. If you can't, you haven't understood it yet.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Socratic Method</div>
      <div class="fw-expand">Teach via questions</div>
      <p class="fw-use">Instead of stating the answer, ask questions that force the learner to derive it. Slow, but the insight sticks.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="analysis">
  <h3 style="color:var(--cyan)">4. Analysis &amp; Decision-Making</h3>
  <p class="fw-group-desc">For diagnosing problems, choosing between options, or breaking down a messy situation.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">First Principles</div>
      <div class="fw-expand">Deconstruct to physics</div>
      <p class="fw-use">Strip every assumption, reduce the problem to fundamental truths, rebuild the answer from those. Breaks analogy-bound thinking.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">5 Whys</div>
      <div class="fw-expand">Root-cause drilling</div>
      <p class="fw-use">Ask "why?" five times in a row to get past symptoms and find the underlying cause. Toyota's quality-control classic.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Pareto (80/20)</div>
      <div class="fw-expand">The vital few</div>
      <p class="fw-use">80% of outcomes come from 20% of causes. Find the 20%, ignore the rest. Works for features, clients, bugs, and more.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">MECE</div>
      <div class="fw-expand">Mutually Exclusive, Collectively Exhaustive</div>
      <p class="fw-use">Consulting structure for breakdowns. No overlap between buckets, no gaps between them. Forces clean thinking about options.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">SWOT</div>
      <div class="fw-expand">Strengths &middot; Weaknesses &middot; Opportunities &middot; Threats</div>
      <p class="fw-use">2&times;2 strategic analysis. Internal (strengths/weaknesses) vs external (opportunities/threats). Fast snapshot of a position.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">OODA Loop</div>
      <div class="fw-expand">Observe &middot; Orient &middot; Decide &middot; Act</div>
      <p class="fw-use">Boyd's decision cycle for adversarial environments. Tight loops beat slow ones. Good for any fast-moving domain.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Fishbone (Ishikawa)</div>
      <div class="fw-expand">Cause-categorized diagnosis</div>
      <p class="fw-use">Draw the problem as a fish spine, branch categories (people, process, tools, environment) off it, list causes under each.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Inversion</div>
      <div class="fw-expand">Avoid stupidity, not chase brilliance</div>
      <p class="fw-use">Instead of "how do I succeed?", ask "what would guarantee failure?" and don't do those things. Charlie Munger's go-to.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="planning">
  <h3 style="color:var(--orange)">5. Planning, Goals &amp; Ownership</h3>
  <p class="fw-group-desc">For turning intention into action with accountability.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">OKRs</div>
      <div class="fw-expand">Objectives &middot; Key Results</div>
      <p class="fw-use">Set one qualitative objective + 3-5 measurable key results. Tracks intent <em>and</em> outcomes. Popularized by Intel and Google.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">SMART</div>
      <div class="fw-expand">Specific &middot; Measurable &middot; Achievable &middot; Relevant &middot; Time-bound</div>
      <p class="fw-use">Goal quality checklist. Forces vague aspirations ("grow the business") into commitments that can be passed or failed.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">RACI</div>
      <div class="fw-expand">Responsible &middot; Accountable &middot; Consulted &middot; Informed</div>
      <p class="fw-use">Ownership matrix. Clarifies who does the work, who approves, who's consulted, who's just kept in the loop. Kills "who owns this?"</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">GROW</div>
      <div class="fw-expand">Goals &middot; Reality &middot; Options &middot; Way forward</div>
      <p class="fw-use">Coaching conversation structure. Where do you want to go, where are you now, what could you try, what will you actually do.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Eisenhower Matrix</div>
      <div class="fw-expand">Urgent &times; Important</div>
      <p class="fw-use">2&times;2 for triage. Do important+urgent, schedule important+not-urgent, delegate urgent+not-important, drop the rest.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="process">
  <h3 style="color:var(--yellow)">6. Process &amp; Systems</h3>
  <p class="fw-group-desc">For visualizing how work flows, finding waste, and improving the path.</p>
  <div class="fw-grid">
    <div class="fw-card">
      <div class="fw-name">Swimlanes</div>
      <div class="fw-expand">Role-based process flow</div>
      <p class="fw-use">Process diagram where horizontal lanes are roles or systems and horizontal flow is steps. Makes "who does what" impossible to fudge.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Bow-Tie Funnel</div>
      <div class="fw-expand">Acquisition &middot; Commit &middot; Delivery</div>
      <p class="fw-use">Three-stage business flow: how prospects become leads, become customers, become retained customers. Wider view than a classic funnel.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Value Stream Map</div>
      <div class="fw-expand">End-to-end waste diagnosis</div>
      <p class="fw-use">Lean-manufacturing tool. Map every step from request to delivery and measure value-add vs wait time. Points at the bottleneck.</p>
    </div>
    <div class="fw-card">
      <div class="fw-name">Kanban / WIP Limits</div>
      <div class="fw-expand">Flow-based work management</div>
      <p class="fw-use">Visualize work in columns (Todo, Doing, Done). Cap items in "Doing" with a WIP limit. Surfaces bottlenecks instantly.</p>
    </div>
  </div>
</div>

<div class="fw-group" data-fw-cat="creative">
  <h3 style="color:var(--red)">7. Creative &amp; Generation</h3>
  <p class="fw-group-desc">For unsticking ideation, finding fresh angles, or generating variants.</p>

    <div class="fw-card">

<h3>When to invent vs reuse</h3>
<p>99% of problems fit an existing framework. Reach for one before you invent. Invent only when:</p>
<ul>
  <li>The existing framework has a hole you keep falling into.</li>
  <li>Your domain has a language that doesn&rsquo;t map to general frameworks (medical triage, legal review, a specific creative craft).</li>
  <li>You&rsquo;ve used existing frameworks enough to know where they break.</li>
</ul>
<p>When you do invent, <strong>give it a name</strong> and spell out the steps. An unnamed method can&rsquo;t be invoked, audited, or iterated. A named one can be taught to any future skill that needs it.</p>

<p style="margin-top:18px">Pinned output (<em>what</em> good looks like) + named method (<em>how</em> you reliably produce it) = everything a skill needs to be specific instead of generic. Time to encode both.</p>

<h2>Iterative Improvement &mdash; your skill is never v1</h2>
<p class="subtitle">The skill you ship today is wrong in ways you haven&rsquo;t seen yet. The skill actually working in production six months from now is version N, where N is much bigger than 1. The shift from "write it right" to "ship and evolve" is what separates libraries that compound from libraries that rot.</p>

<h3>The v1 myth</h3>
<p>When you draft a new skill, you can picture maybe ten cases it will handle. In production, it gets invoked across hundreds of prompts you never imagined. The failures happen in the cases you didn&rsquo;t picture, and you can&rsquo;t picture them until you see them.</p>
<p>Three reasons v1 always misses:</p>
<ol>
  <li><strong>Novelty bias.</strong> You built it to solve <em>your</em> specific frustration. That narrow frame leaks into the instructions. Other users hit edges you never felt.</li>
  <li><strong>Unseen edges.</strong> Users phrase things you didn&rsquo;t anticipate, attach inputs that don&rsquo;t match your examples, and ask for variants you didn&rsquo;t consider.</li>
  <li><strong>Your own assumptions.</strong> You read your own skill and see what you <em>meant</em>. Future Claude reads it and sees what you <em>wrote</em>. Those two often differ.</li>
</ol>

<div class="callout warn">
  <strong>Stop trying to pre-emptively fix every case.</strong> That&rsquo;s how 800-line SKILL.md files full of contradicting rules get written. Ship v1 at 70% confidence. Use it on real work. Patch what you observe, not what you imagine.
</div>

<h3>What breaks, and how you&rsquo;ll spot it</h3>
<p>Not every part of a skill breaks at the same rate. Roughly the order you&rsquo;ll touch them, with the signal that tells you it&rsquo;s time.</p>
<ol>
  <li><strong>Triggers (the description).</strong> Most misfires start here. Fix under-triggers by adding phrases users actually say. Fix over-triggers by adding exclusions that point at siblings.<br><em style="color:var(--text-dim)">Signal:</em> the skill didn&rsquo;t fire when you expected it to, or fired on a request that wasn&rsquo;t yours.</li>
  <li><strong>Examples.</strong> A single concrete input+output pair often teaches what 10 lines of rules never could. Add an example before you add another rule.<br><em style="color:var(--text-dim)">Signal:</em> the skill triggers correctly but the output shape is consistently off.</li>
  <li><strong>Instructions.</strong> Sharpen vague verbs, remove redundant rules, add <em>why</em> reasoning where you had bald commands.<br><em style="color:var(--text-dim)">Signal:</em> you keep manually correcting the same aspect of the output.</li>
  <li><strong>Delegation.</strong> Jobs you initially inlined might belong in a sibling standalone once you notice you&rsquo;re repeating them. Promote them.<br><em style="color:var(--text-dim)">Signal:</em> you find yourself pasting the same extra instruction every time you invoke it.</li>
  <li><strong>Exclusions.</strong> As your library grows and new skills fill the neighborhood, add "Do NOT activate when" lines that point at the right sibling.<br><em style="color:var(--text-dim)">Signal:</em> a different skill keeps grabbing requests that were meant for this one (or vice versa).</li>
</ol>

<div class="callout warn">
  <strong>The loudest signal of all:</strong> you stopped using the skill because writing the output yourself felt easier. If that&rsquo;s happening, don&rsquo;t patch small &mdash; rethink whether the skill still matches how you work.
</div>

<h3>Two modes of retrospective</h3>

<div class="rule">
  <div class="rule-num">A</div>
  <div class="rule-body"><strong>Immediate (surgical).</strong> The user just saw a skill produce wrong output and wants it fixed now.<br>Phrases: "fix this skill", "heal this skill", "the skill got X wrong".<br>Goes to <code>workflows/retrospective.md</code> Mode 1. Targeted patch, single fix, approved diff, applied.</div>
</div>

<div class="rule">
  <div class="rule-num">B</div>
  <div class="rule-body"><strong>Session retrospective (broad).</strong> End of session, scan the whole conversation for skill friction. Batch-propose fixes.<br>Phrases: "retrospective", "review the session", or the <strong>Stop hook</strong> prompts automatically at session boundary.<br>Goes to <code>workflows/retrospective.md</code> Mode 2.</div>
</div>

<h3>Rules for retrospectives</h3>

<div class="rule">
  <div class="rule-num">1</div>
  <div class="rule-body"><strong>Only patch what the user confirms.</strong> Observable friction is the only valid signal. Never guess from silence or a raised eyebrow.</div>
</div>
<div class="rule">
  <div class="rule-num">2</div>
  <div class="rule-body"><strong>First occurrence is a fluke. Second is a pattern.</strong> Don't propose a fix from n=1. Log the friction and wait for confirmation that it's recurring.</div>
</div>
<div class="rule">
  <div class="rule-num">3</div>
  <div class="rule-body"><strong>Every proposed change needs approval before it applies.</strong> Show before/after diffs. The user decides.</div>
</div>
<div class="rule">
  <div class="rule-num">4</div>
  <div class="rule-body"><strong>Root-cause, don't symptom-patch.</strong> "Add an example" usually beats "add a MUST." Rules ossify. Examples teach.</div>
</div>

<h3>The Stop hook (Claude Code only)</h3>
<p>The Stop hook in <code>meta-create-skill-standalone</code>'s frontmatter auto-detects skill friction at session boundaries. When a session ends and the hook spots patterns like "that skill got it wrong" or a correction the user made, it asks:</p>
<div class="code-block">"I noticed some skill friction this session.
Want to run the retrospective workflow
to patch what broke?"</div>
<p>On Claude.ai (no hooks), you invoke retrospective manually when you notice a pattern.</p>

<h3>The compounding principle</h3>
<p>A skill you patched forty times beats a skill you wrote "perfectly" once, every single time. Each patch generalizes a little further, handles one more edge, and codifies one more piece of wisdom.</p>
<p>Over months and years, your library becomes the written memory of every lesson you&rsquo;ve learned, without you needing to remember any of it personally. <em>That</em> is the real asset. Not the skill. The patched skill.</p>

<div class="callout">
  <strong>Keep using them.</strong> Skills that sit untouched rot with the model. Skills that get invoked daily and patched when they miss get sharper than anything you could write from scratch. Treat your library like software you live with, not a manual you wrote once.
</div>

<p style="margin-top:18px">You now know skills aren't shipped perfect &mdash; you patch them live. That takes the pressure off the draft. One more mental move before you build, and it's the one that separates skills that produce gold from skills that produce mush.</p>

<h3>The six questions, in order</h3>

<div class="rule">

  <div class="rule-body"><strong>Pin the gold output.</strong> Find 1&ndash;3 real examples of what excellent looks like. Not "generally good" &mdash; specific artifacts. URLs, files, screenshots. If you can't point at a real output and say "like this," you don't have a skill yet. You have a wish.</div>

<div class="rule">
  <div class="rule-num">2</div>

</div>

<div class="rule">
  <div class="rule-num">3</div>
  <div class="rule-body"><strong>Reverse the moves.</strong> For each quality above, what did you actually <em>do</em> to produce it? That's your step list. Written backward from the finish, it's concrete. Written forward from a blank page, it's abstract.</div>
</div>

<div class="rule">
  <div class="rule-num">4</div>
  <div class="rule-body"><strong>Map the reach.</strong> Which external systems or data did those moves touch? MCPs, APIs, file access, databases. Without the right reach, a skill is just a prompt. With it, a skill is a specialist.</div>
</div>

<div class="rule">
  <div class="rule-num">5</div>
  <div class="rule-body"><strong>Write the trigger phrasing.</strong> What do you naturally say when you want this thing? Real phrases you'd type. These become the skill's description and <code>when_to_use</code> triggers.</div>
</div>

<div class="rule">
  <div class="rule-num">6</div>
  <div class="rule-body"><strong>Define the quality check.</strong> How do you know the output is gold-standard, not one-shot lucky? Concrete checks, not vibes. These become the <code>test-skill</code> evals.</div>
</div>

<p>You get back a scored report and specific remediation. Fix the reds. Consider the yellows.</p>
