<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(255,255,255); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --amber:rgb(214,140,40);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(224,224,222)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- header hairline -->
  <line x1="60" y1="124" x2="1540" y2="124" stroke="rgb(228,228,226)" stroke-width="2"/>

  <!-- ============ ZONE A — the automated span (green container = the skill system) ============ -->
  <rect x="40" y="202" width="1010" height="476" rx="20" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.045)"/>

  <!-- ============ ZONE B — the labelled human gate (amber container) ============ -->
  <rect x="1104" y="202" width="262" height="476" rx="20" stroke="var(--amber)" stroke-width="3.5" fill="rgba(214,140,40,0.07)"/>

  <!-- ---- the four step cards ---- -->
  <rect x="66"  y="232" width="210" height="242" rx="14" stroke="var(--ink)"   stroke-width="3.5" fill="var(--bg)"/>
  <rect x="315" y="232" width="210" height="242" rx="14" stroke="var(--ink)"   stroke-width="3.5" fill="var(--bg)"/>
  <rect x="564" y="232" width="210" height="242" rx="14" stroke="var(--green)" stroke-width="4"   fill="rgba(45,140,60,0.06)"/>
  <rect x="813" y="232" width="210" height="242" rx="14" stroke="var(--ink)"   stroke-width="3.5" fill="var(--bg)"/>

  <!-- ===== STEP 1 glyph — last week's email stats, a ruled table (cells stay blank) ===== -->
  <rect x="101" y="300" width="140" height="152" rx="4" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="101" y="300" width="140" height="32" rx="4" stroke="none" fill="rgba(33,33,33,0.08)"/>
  <line x1="101" y1="332" x2="241" y2="332" stroke="var(--ink)" stroke-width="2.5"/>
  <line x1="101" y1="362" x2="241" y2="362" stroke="var(--ink)" stroke-width="2"/>
  <line x1="101" y1="392" x2="241" y2="392" stroke="var(--ink)" stroke-width="2"/>
  <line x1="101" y1="422" x2="241" y2="422" stroke="var(--ink)" stroke-width="2"/>
  <line x1="171" y1="300" x2="171" y2="452" stroke="var(--ink)" stroke-width="2"/>
  <line x1="116" y1="347" x2="156" y2="347" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="186" y1="347" x2="226" y2="347" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="116" y1="377" x2="156" y2="377" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="186" y1="377" x2="226" y2="377" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="116" y1="407" x2="156" y2="407" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="186" y1="407" x2="226" y2="407" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="116" y1="437" x2="156" y2="437" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="186" y1="437" x2="226" y2="437" stroke="var(--dim)" stroke-width="2.5"/>

  <!-- ===== STEP 2 glyph — THE SAME table, one winning row ringed ===== -->
  <rect x="350" y="300" width="140" height="152" rx="4" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="350" y="300" width="140" height="32" rx="4" stroke="none" fill="rgba(33,33,33,0.08)"/>
  <line x1="350" y1="332" x2="490" y2="332" stroke="var(--ink)" stroke-width="2.5"/>
  <line x1="350" y1="362" x2="490" y2="362" stroke="var(--ink)" stroke-width="2"/>
  <line x1="350" y1="392" x2="490" y2="392" stroke="var(--ink)" stroke-width="2"/>
  <line x1="350" y1="422" x2="490" y2="422" stroke="var(--ink)" stroke-width="2"/>
  <line x1="420" y1="300" x2="420" y2="452" stroke="var(--ink)" stroke-width="2"/>
  <line x1="365" y1="347" x2="405" y2="347" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="435" y1="347" x2="475" y2="347" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="365" y1="377" x2="405" y2="377" stroke="var(--green)" stroke-width="3"/>
  <line x1="435" y1="377" x2="475" y2="377" stroke="var(--green)" stroke-width="3"/>
  <line x1="365" y1="407" x2="405" y2="407" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="435" y1="407" x2="475" y2="407" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="365" y1="437" x2="405" y2="437" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="435" y1="437" x2="475" y2="437" stroke="var(--dim)" stroke-width="2.5"/>
  <rect x="344" y="356" width="152" height="42" rx="10" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.10)"/>

  <!-- ===== STEP 3 glyph — next week's email, a lined page with a pen ===== -->
  <rect x="609" y="300" width="120" height="152" rx="6" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <line x1="621" y1="330" x2="717" y2="330" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="621" y1="356" x2="717" y2="356" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="621" y1="382" x2="701" y2="382" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="621" y1="408" x2="717" y2="408" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="621" y1="434" x2="687" y2="434" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="745" y1="414" x2="721" y2="438" stroke="var(--ink)" stroke-width="4.5"/>
  <polygon points="720,439 712,448 723,444" stroke="var(--ink)" stroke-width="2" fill="var(--ink)"/>

  <!-- ===== STEP 4 glyph — a checklist held against the draft ===== -->
  <rect x="848" y="316" width="110" height="140" rx="6" stroke="var(--dim)" stroke-width="2.5" fill="var(--bg)"/>
  <line x1="862" y1="344" x2="944" y2="344" stroke="rgb(212,212,210)" stroke-width="2"/>
  <line x1="862" y1="368" x2="944" y2="368" stroke="rgb(212,212,210)" stroke-width="2"/>
  <line x1="862" y1="392" x2="930" y2="392" stroke="rgb(212,212,210)" stroke-width="2"/>
  <rect x="866" y="296" width="118" height="152" rx="6" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="880" y="318" width="18" height="18" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="880" y="350" width="18" height="18" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="880" y="382" width="18" height="18" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="880" y="414" width="18" height="18" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <polyline points="883,327 888,333 896,321" stroke="var(--green)" stroke-width="3"/>
  <polyline points="883,359 888,365 896,353" stroke="var(--green)" stroke-width="3"/>
  <polyline points="883,391 888,397 896,385" stroke="var(--green)" stroke-width="3"/>
  <polyline points="883,423 888,429 896,417" stroke="var(--green)" stroke-width="3"/>
  <line x1="908" y1="327" x2="972" y2="327" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="908" y1="359" x2="972" y2="359" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="908" y1="391" x2="960" y2="391" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="908" y1="423" x2="972" y2="423" stroke="var(--dim)" stroke-width="2.5"/>

  <!-- ---- the run: green arrows, step to step ---- -->
  <line x1="282" y1="353" x2="307" y2="353" stroke="var(--green)" stroke-width="4"/>
  <polyline points="299,346 309,353 299,360" stroke="var(--green)" stroke-width="4"/>
  <line x1="531" y1="353" x2="556" y2="353" stroke="var(--green)" stroke-width="4"/>
  <polyline points="548,346 558,353 548,360" stroke="var(--green)" stroke-width="4"/>
  <line x1="780" y1="353" x2="805" y2="353" stroke="var(--green)" stroke-width="4"/>
  <polyline points="797,346 807,353 797,360" stroke="var(--green)" stroke-width="4"/>

  <!-- the pointer tying the REUSED tag to step 3 -->
  <line x1="669" y1="566" x2="669" y2="556" stroke="var(--green)" stroke-width="3"/>
  <polyline points="662,563 669,553 676,563" stroke="var(--green)" stroke-width="3"/>

  <!-- the system hands the job over to the gate -->
  <line x1="1056" y1="353" x2="1096" y2="353" stroke="var(--green)" stroke-width="4"/>
  <polyline points="1088,346 1098,353 1088,360" stroke="var(--green)" stroke-width="4"/>

  <!-- ---- the owner, standing in the gate ---- -->
  <circle cx="1235" cy="294" r="32" stroke="var(--amber)" stroke-width="4.5" fill="var(--bg)"/>
  <line x1="1235" y1="326" x2="1235" y2="420" stroke="var(--amber)" stroke-width="4.5"/>
  <line x1="1235" y1="346" x2="1188" y2="386" stroke="var(--amber)" stroke-width="4.5"/>
  <line x1="1235" y1="346" x2="1286" y2="370" stroke="var(--amber)" stroke-width="4.5"/>
  <line x1="1235" y1="420" x2="1195" y2="498" stroke="var(--amber)" stroke-width="4.5"/>
  <line x1="1235" y1="420" x2="1275" y2="498" stroke="var(--amber)" stroke-width="4.5"/>
  <!-- the checked clipboard in their hand -->
  <rect x="1282" y="364" width="52" height="72" rx="5" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="1298" y="358" width="20" height="10" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <line x1="1290" y1="388" x2="1326" y2="388" stroke="var(--dim)" stroke-width="2.5"/>
  <line x1="1290" y1="402" x2="1318" y2="402" stroke="var(--dim)" stroke-width="2.5"/>
  <polyline points="1291,419 1300,428 1324,404" stroke="var(--amber)" stroke-width="3.5"/>

  <!-- gate -> you send it -->
  <line x1="1372" y1="353" x2="1412" y2="353" stroke="var(--amber)" stroke-width="4"/>
  <polyline points="1404,346 1414,353 1404,360" stroke="var(--amber)" stroke-width="4"/>

  <!-- the email that leaves -->
  <rect x="1428" y="315" width="118" height="76" rx="6" stroke="var(--ink)" stroke-width="3.5" fill="var(--bg)"/>
  <polyline points="1428,321 1487,359 1546,321" stroke="var(--ink)" stroke-width="3"/>

  <!-- ============ WHO OWNS WHICH PART — the full-width ownership band ============ -->
  <rect x="40"   y="714" width="1033" height="62" rx="14" stroke="var(--green)" stroke-width="3"   fill="rgba(45,140,60,0.06)"/>
  <rect x="1081" y="714" width="479"  height="62" rx="14" stroke="var(--amber)" stroke-width="3.5" fill="rgba(214,140,40,0.13)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- claim-title + subtitle -->
<text x="800" y="58" font-size="44" font-weight="700" text-anchor="middle" fill="var(--ink)">What It Looks Like on a Real Job</text>
<text x="800" y="100" font-size="25" text-anchor="middle" fill="var(--dim)">the weekly email, start to finish</text>

<!-- zone labels -->
<text x="545"  y="160" font-size="26" font-weight="700" text-anchor="middle" fill="var(--green)">THE SKILL SYSTEM</text>
<text x="545"  y="186" font-size="20" text-anchor="middle" fill="var(--dim)">one skill per step &#183; runs in order, without you</text>
<text x="1235" y="160" font-size="26" font-weight="700" text-anchor="middle" fill="var(--amber)">THE ONE HUMAN STEP</text>
<text x="1235" y="186" font-size="20" text-anchor="middle" fill="var(--dim)">this part stays yours</text>

<!-- step skill names (mono) -->
<text class="mono" x="171" y="272" font-size="24" font-weight="700" text-anchor="middle" fill="var(--ink)">pull-stats/</text>
<text class="mono" x="420" y="272" font-size="24" font-weight="700" text-anchor="middle" fill="var(--ink)">what-worked/</text>
<text class="mono" x="669" y="272" font-size="24" font-weight="700" text-anchor="middle" fill="var(--green)">draft-email/</text>
<text class="mono" x="918" y="272" font-size="24" font-weight="700" text-anchor="middle" fill="var(--ink)">qa-draft/</text>

<!-- the stats table column headers (words, never figures) -->
<text x="136" y="323" font-size="19" text-anchor="middle" fill="var(--dim)">opens</text>
<text x="206" y="323" font-size="19" text-anchor="middle" fill="var(--dim)">clicks</text>
<text x="385" y="323" font-size="19" text-anchor="middle" fill="var(--dim)">opens</text>
<text x="455" y="323" font-size="19" text-anchor="middle" fill="var(--dim)">clicks</text>

<!-- plain-english step labels -->
<text x="171" y="512" font-size="24" text-anchor="middle" fill="var(--ink)">gets last week&#8217;s</text>
<text x="171" y="542" font-size="24" text-anchor="middle" fill="var(--ink)">numbers</text>
<text x="420" y="512" font-size="24" text-anchor="middle" fill="var(--ink)">finds the</text>
<text x="420" y="542" font-size="24" text-anchor="middle" fill="var(--ink)">winners</text>
<text x="669" y="512" font-size="24" text-anchor="middle" fill="var(--ink)">writes next week&#8217;s</text>
<text x="669" y="542" font-size="24" text-anchor="middle" fill="var(--ink)">email</text>
<text x="918" y="512" font-size="24" text-anchor="middle" fill="var(--ink)">checks it against</text>
<text x="918" y="542" font-size="24" text-anchor="middle" fill="var(--ink)">your rules</text>

<!-- THE REUSE TAG — the link back to the skill built in the last checkpoint -->
<text x="669" y="596" font-size="22" font-weight="700" text-anchor="middle" fill="var(--green)">REUSED</text>
<text x="669" y="624" font-size="20" text-anchor="middle" fill="var(--dim)">the skill you already built</text>

<!-- the gate -->
<text x="1235" y="562" font-size="30" font-weight="700" text-anchor="middle" fill="var(--amber)">YOUR REVIEW</text>
<text x="1235" y="596" font-size="24" text-anchor="middle" fill="var(--dim)">the judgment call</text>

<!-- you send it -->
<text x="1487" y="437" font-size="26" text-anchor="middle" fill="var(--ink)">you send it</text>
<text x="1487" y="469" font-size="22" text-anchor="middle" fill="var(--dim)">to your list</text>

<!-- ownership band -->
<text x="556"  y="753" font-size="24" text-anchor="middle" fill="var(--green)">the skill system runs all of this</text>
<text x="1320" y="753" font-size="26" font-weight="700" text-anchor="middle" fill="var(--amber)">YOU &#183; review, then send</text>

<!-- one-line takeaway -->
<text x="800" y="890" font-size="27" text-anchor="middle" fill="var(--ink)">Four skills, one after another &#8212; and the drafting one you already built gets reused.</text>
<text x="800" y="942" font-size="30" font-weight="700" text-anchor="middle" fill="var(--green)">One function, start to finish &#8212; and you only touch the judgment call.</text>
</svg></body></html>
