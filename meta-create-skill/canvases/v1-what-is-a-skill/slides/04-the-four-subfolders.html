<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>

<!-- ============ TEXT (all crisp, OUTSIDE #rough) ============ -->

<!-- title + subtitle -->
<text x="800" y="78" font-size="60" font-weight="700" text-anchor="middle" fill="var(--ink)">Four Optional Folders, Four Different Jobs</text>
<text x="800" y="132" font-size="29" text-anchor="middle" fill="var(--dim)">what goes in each folder of a skill &#183; real files from meta-create-skill</text>

<!-- CARD 1 - workflows/ -->
<text x="230" y="272" font-size="44" font-weight="700" text-anchor="start" fill="var(--green)">workflows/</text>
<text x="132" y="345" font-size="30" font-weight="700" text-anchor="start" fill="var(--green)">which job?</text>
<text x="132" y="389" font-size="26" text-anchor="start" fill="var(--ink)">One file per job; only the match loads.</text>
<text x="156" y="454" font-size="26" text-anchor="start" fill="var(--ink)">workflows/test-skill.md</text>
<text x="132" y="515" font-size="23" text-anchor="start" fill="var(--dim)">the ordered steps for one job &#183; loads on &#8220;test this skill&#8221;</text>

<!-- CARD 2 - scripts/ -->
<text x="950" y="272" font-size="44" font-weight="700" text-anchor="start" fill="var(--amber)">scripts/</text>
<text x="852" y="345" font-size="30" font-weight="700" text-anchor="start" fill="var(--amber)">what deterministic work?</text>
<text x="852" y="389" font-size="26" text-anchor="start" fill="var(--ink)">Deterministic work; source never loads.</text>
<text x="876" y="454" font-size="26" text-anchor="start" fill="var(--ink)">scripts/generate_eval_viewer.py</text>
<text x="852" y="515" font-size="23" text-anchor="start" fill="var(--dim)">builds the HTML eval-results viewer</text>

<!-- CARD 3 - references/ -->
<text x="230" y="637" font-size="44" font-weight="700" text-anchor="start" fill="var(--blue)">references/</text>
<text x="132" y="710" font-size="30" font-weight="700" text-anchor="start" fill="var(--blue)">what deeper doc &#8212; only if needed?</text>
<text x="132" y="754" font-size="26" text-anchor="start" fill="var(--ink)">Deep docs &#8212; loaded only when needed.</text>
<text x="156" y="819" font-size="26" text-anchor="start" fill="var(--ink)">references/frontmatter.md</text>
<text x="132" y="880" font-size="23" text-anchor="start" fill="var(--dim)">holds deeper gotchas + origins &#183; the full YAML reference</text>

<!-- CARD 4 - assets/ -->
<text x="950" y="637" font-size="44" font-weight="700" text-anchor="start" fill="var(--purple)">assets/</text>
<text x="852" y="710" font-size="30" font-weight="700" text-anchor="start" fill="var(--purple)">what do I copy into the output?</text>
<text x="852" y="754" font-size="26" text-anchor="start" fill="var(--ink)">Templates &amp; files used in the output.</text>
<text x="876" y="818" font-size="24" text-anchor="start" fill="var(--ink)">templates/orchestrator-skill-template.md</text>
<text x="852" y="880" font-size="23" text-anchor="start" fill="var(--dim)">holds your gold example + templates &#183; copied into new skills</text>

<!-- takeaway -->
<text x="800" y="972" font-size="33" text-anchor="middle" fill="var(--ink)">Same skill, four folders &#8212; each answers a different question,</text>
<text x="800" y="1018" font-size="33" font-weight="700" text-anchor="middle" fill="var(--green)">so every job loads only the file it needs.</text>
