<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}

  <!-- process -> output arrow (good path, green) -->
  <line x1="1102" y1="772" x2="1268" y2="760" stroke="var(--green)" stroke-width="4"/>
  <polyline points="1254,751 1270,760 1254,769" stroke="var(--green)" stroke-width="4"/>

  <!-- strong output doc with a check -->
  <rect x="1278" y="690" width="185" height="135" rx="10" stroke="var(--green)" stroke-width="5"/>
  <polyline points="1296,724 1309,738 1334,708" stroke="var(--green)" stroke-width="5"/>
  <line x1="1348" y1="724" x2="1444" y2="724" stroke="var(--ink)" stroke-width="3"/>
  <line x1="1298" y1="758" x2="1444" y2="758" stroke="var(--ink)" stroke-width="3"/>

  <line x1="1298" y1="814" x2="1400" y2="814" stroke="var(--ink)" stroke-width="3"/>

</g>

<!-- ===== TEXT (crisp) — all labels OUTSIDE the filter ===== -->
<!-- title -->
<text x="800" y="60" font-size="46" font-weight="700" text-anchor="middle" fill="var(--ink)">Same Input, Same AI — the Skill Changes the Process</text>

<text x="770" y="152" font-size="34" font-weight="700" text-anchor="middle" fill="var(--ink)">PROCESS</text>

<text x="770" y="186" font-size="22" text-anchor="middle" fill="var(--dim)">the skill lives here</text>

<!-- shared input -->
<text x="215" y="558" font-size="28" text-anchor="middle" fill="var(--ink)">Write this week's</text>
<text x="215" y="598" font-size="28" text-anchor="middle" fill="var(--ink)">launch email</text>

<!-- TOP lane labels -->
<text x="560" y="231" font-size="26" font-weight="700" text-anchor="middle" fill="var(--red)">WITHOUT A SKILL</text>

<text x="800" y="374" font-size="60" font-weight="700" text-anchor="middle" fill="var(--red)">?</text>

<text x="700" y="936" font-size="26" text-anchor="middle" fill="var(--dim)">predictable + still thinks · knows exactly HOW to do the job</text>
