<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --amber:rgb(214,140,40); --red:rgb(214,69,58);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ THE AI — canonical black-marker robot, running the inspection ============ -->
  <g stroke="var(--ink)" stroke-width="4">
    <line x1="190" y1="388" x2="190" y2="402"/>
    <rect x="150" y="402" width="80" height="54" rx="12"/>
    <line x1="190" y1="456" x2="190" y2="466"/>
    <rect x="154" y="466" width="72" height="64" rx="12"/>
    <line x1="154" y1="486" x2="126" y2="512"/>
    <line x1="226" y1="486" x2="262" y2="470"/>
    <line x1="176" y1="530" x2="176" y2="552"/>
    <line x1="204" y1="530" x2="204" y2="552"/>
  </g>
  <rect x="166" y="418" width="48" height="24" rx="6" stroke="var(--dim)" stroke-width="3"/>
  <rect x="170" y="484" width="40" height="26" rx="5" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="190" cy="382" r="6" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="176" cy="430" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="204" cy="430" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <!-- magnifier in the pointing hand (the audit HUNTS) -->
  <circle cx="288" cy="452" r="17" stroke="var(--ink)" stroke-width="3"/>
  <line x1="300" y1="464" x2="318" y2="482" stroke="var(--ink)" stroke-width="4"/>

  <!-- ============ THE DIAGNOSTIC CLIPBOARD (a mechanic's inspection sheet) ============ -->
  <!-- clamp -->
  <rect x="922" y="150" width="36" height="12" rx="4" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="858" y="158" width="164" height="34" rx="11" stroke="var(--ink)" stroke-width="4" fill="var(--bg)"/>
  <!-- board -->
  <rect x="380" y="175" width="1120" height="715" rx="22" stroke="var(--ink)" stroke-width="4" fill="rgba(0,0,0,0.015)"/>

  <!-- ===== cluster divider rules (dim, thin) ===== -->
  <line x1="660" y1="252" x2="1460" y2="252" stroke="var(--dim)" stroke-width="1.5" opacity="0.5"/>
  <line x1="610" y1="514" x2="1460" y2="514" stroke="var(--dim)" stroke-width="1.5" opacity="0.5"/>
  <line x1="620" y1="626" x2="1460" y2="626" stroke="var(--dim)" stroke-width="1.5" opacity="0.5"/>
  <line x1="580" y1="788" x2="1460" y2="788" stroke="var(--dim)" stroke-width="1.5" opacity="0.5"/>

  <!-- ===== 8 checkbox squares (empty — the checks the audit runs) ===== -->
  <rect x="432" y="288" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="338" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="388" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="438" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="550" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="662" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="712" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="432" y="824" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>

  <!-- ===== severity chips (red=HIGH · amber=MEDIUM · dim=LOW) ===== -->
  <!-- R1 HIGH -->
  <rect x="1322" y="287" width="120" height="34" rx="9" stroke="var(--red)" stroke-width="3" fill="rgba(214,69,58,0.10)"/>
  <!-- R2 HIGH -->
  <rect x="1322" y="337" width="120" height="34" rx="9" stroke="var(--red)" stroke-width="3" fill="rgba(214,69,58,0.10)"/>
  <!-- R3 HIGH -->
  <rect x="1322" y="387" width="120" height="34" rx="9" stroke="var(--red)" stroke-width="3" fill="rgba(214,69,58,0.10)"/>
  <!-- R4 LOW -->
  <rect x="1322" y="437" width="120" height="34" rx="9" stroke="var(--dim)" stroke-width="3" fill="rgba(120,120,125,0.08)"/>
  <!-- R5 HIGH -->
  <rect x="1322" y="549" width="120" height="34" rx="9" stroke="var(--red)" stroke-width="3" fill="rgba(214,69,58,0.10)"/>
  <!-- R6 MEDIUM -->
  <rect x="1322" y="661" width="120" height="34" rx="9" stroke="var(--amber)" stroke-width="3" fill="rgba(214,140,40,0.10)"/>
  <!-- R7 MEDIUM -->
  <rect x="1322" y="711" width="120" height="34" rx="9" stroke="var(--amber)" stroke-width="3" fill="rgba(214,140,40,0.10)"/>
  <!-- R8 MEDIUM -->
  <rect x="1322" y="823" width="120" height="34" rx="9" stroke="var(--amber)" stroke-width="3" fill="rgba(214,140,40,0.10)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- claim-title + subtitle -->
<text x="800" y="74" font-size="52" font-weight="700" text-anchor="middle" fill="var(--ink)">The 8 Signals &#8212; What the Audit Hunts</text>
<text x="800" y="120" font-size="27" text-anchor="middle" fill="var(--dim)">The audit isn&#8217;t a vibe &#183; it checks for eight specific problems, each with a severity</text>

<!-- robot label -->
<text x="190" y="590" font-size="19" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI</text>
<text x="190" y="614" font-size="17" text-anchor="middle" fill="var(--dim)">runs the inspection</text>

<!-- clipboard header -->
<text x="430" y="222" font-size="21" font-weight="700" text-anchor="start" fill="var(--ink)">INSPECTION CHECKLIST</text>
<text x="1460" y="222" font-size="18" text-anchor="end" fill="var(--dim)">severity = how badly it breaks routing</text>

<!-- ===== cluster: ROUTING PROBLEMS ===== -->
<text x="430" y="258" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">ROUTING PROBLEMS &#183; 4</text>
<!-- R1 -->
<text x="478" y="310" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Duplicate standalones</text>
<text x="828" y="310" font-size="20" text-anchor="start" fill="var(--dim)">two skills, one job</text>
<text x="1382" y="311" font-size="19" font-weight="700" text-anchor="middle" fill="var(--red)">HIGH</text>
<!-- R2 -->
<text x="478" y="360" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Trigger collisions</text>
<text x="828" y="360" font-size="20" text-anchor="start" fill="var(--dim)">same phrase fires two skills</text>
<text x="1382" y="361" font-size="19" font-weight="700" text-anchor="middle" fill="var(--red)">HIGH</text>
<!-- R3 -->
<text x="478" y="410" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Missing workflow routing</text>
<text x="828" y="410" font-size="20" text-anchor="start" fill="var(--dim)">routing buried, not read first</text>
<text x="1382" y="411" font-size="19" font-weight="700" text-anchor="middle" fill="var(--red)">HIGH</text>
<!-- R4 -->
<text x="478" y="460" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">No cross-skill callouts</text>
<text x="828" y="460" font-size="20" text-anchor="start" fill="var(--dim)">a skill that ignores its siblings</text>
<text x="1382" y="461" font-size="19" font-weight="700" text-anchor="middle" fill="var(--dim)">LOW</text>

<!-- ===== cluster: DEAD WIRING ===== -->
<text x="430" y="520" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">DEAD WIRING &#183; 1</text>
<!-- R5 -->
<text x="478" y="572" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Orphan workflows</text>
<text x="828" y="572" font-size="20" text-anchor="start" fill="var(--dim)">files the AI can never find</text>
<text x="1382" y="573" font-size="19" font-weight="700" text-anchor="middle" fill="var(--red)">HIGH</text>

<!-- ===== cluster: ARCHITECTURE ===== -->
<text x="430" y="632" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">ARCHITECTURE &#183; 2</text>
<!-- R6 -->
<text x="478" y="684" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Bloated orchestrators</text>
<text x="828" y="684" font-size="20" text-anchor="start" fill="var(--dim)">one skill tries to do everything</text>
<text x="1382" y="685" font-size="19" font-weight="700" text-anchor="middle" fill="var(--amber)">MEDIUM</text>
<!-- R7 -->
<text x="478" y="734" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Missing shared delegation</text>
<text x="828" y="734" font-size="20" text-anchor="start" fill="var(--dim)">same sub-step copied everywhere</text>
<text x="1382" y="735" font-size="19" font-weight="700" text-anchor="middle" fill="var(--amber)">MEDIUM</text>

<!-- ===== cluster: SEDIMENT ===== -->
<text x="430" y="794" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">SEDIMENT &#183; 1</text>
<!-- R8 -->
<text x="478" y="846" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">Stale rules</text>
<text x="828" y="846" font-size="20" text-anchor="start" fill="var(--dim)">rules that stopped earning their place</text>
<text x="1382" y="847" font-size="19" font-weight="700" text-anchor="middle" fill="var(--amber)">MEDIUM</text>

<!-- ===== one-line takeaway ===== -->
<text x="800" y="948" font-size="29" text-anchor="middle" fill="var(--ink)">Eight named problems &#8212; each with real evidence and a severity.</text>
<text x="800" y="992" font-size="31" font-weight="700" text-anchor="middle" fill="var(--ink)">A real answer to &#8220;are my skills a mess?&#8221; &#8212; not a feeling.</text>
</svg></body></html>
