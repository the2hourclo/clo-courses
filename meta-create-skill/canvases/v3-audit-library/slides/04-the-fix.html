<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --blue:rgb(52,120,190);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- report object (from slide 03), small: a document with red findings -->

  <circle cx="262" cy="240" r="5" fill="var(--red)" stroke="none"/>
  <circle cx="262" cy="271" r="5" fill="var(--red)" stroke="none"/>
  <circle cx="262" cy="302" r="5" fill="var(--red)" stroke="none"/>

  <!-- report -> gate arrow -->

  <polyline points="337,348 345,360 353,348" stroke="var(--ink)" stroke-width="3"/>

  <!-- gate pill (owner-gated checkpoint) — ink, not red -->

  <!-- shield + check gate icon -->
  <path d="M100,383 L124,391 L124,415 C124,428 112,434 100,440 C88,434 76,428 76,415 L76,391 Z" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="90,410 98,420 112,398" stroke="var(--green)" stroke-width="4"/>

  <!-- gate -> robot arrow -->
  <line x1="345" y1="456" x2="345" y2="489" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="337,481 345,493 353,481" stroke="var(--ink)" stroke-width="3"/>

    <line x1="345" y1="501" x2="345" y2="511"/>
    <rect x="309" y="511" width="72" height="48" rx="11"/>
    <rect x="323" y="524" width="44" height="22" rx="6" stroke-width="3"/>
    <line x1="345" y1="559" x2="345" y2="567"/>
    <rect x="313" y="567" width="64" height="54" rx="11"/>
    <line x1="313" y1="585" x2="291" y2="605"/>
    <line x1="377" y1="585" x2="397" y2="587"/>
  </g>
  <rect x="327" y="582" width="36" height="20" rx="4" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="345" cy="495" r="5" fill="var(--green)" stroke="var(--green)"/>
  <circle cx="337" cy="535" r="4.2" fill="var(--green)" stroke="var(--green)"/>
  <circle cx="353" cy="535" r="4.2" fill="var(--green)" stroke="var(--green)"/>
  <!-- green repair marker in the robot's hand -->
  <line x1="397" y1="587" x2="432" y2="571" stroke="var(--green)" stroke-width="5"/>
  <polygon points="432,571 440,569 436,577" fill="var(--green)" stroke="var(--green)" stroke-width="2"/>
  <!-- green spark -->

  <line x1="453" y1="551" x2="453" y2="561" stroke="var(--green)" stroke-width="3"/>

  <!-- flow arrow: robot makes the 3 repairs -> ops column -->
  <line x1="452" y1="592" x2="655" y2="592" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="647,584 659,592 647,600" stroke="var(--ink)" stroke-width="3"/>

  <!-- faint column divider -->
  <line x1="665" y1="235" x2="665" y2="892" stroke="var(--dim)" stroke-width="1.5" stroke-dasharray="3 9"/>

  <!-- ============ RIGHT COLUMN — the 3 repairs ============ -->

  <!-- op 1 MERGE : chip -->
  <circle cx="722" cy="322" r="22" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>
  <!-- red collision brace linking the two duplicate rows -->
  <path d="M844,298 C830,298 830,360 844,360" stroke="var(--red)" stroke-width="3"/>
  <!-- folder glyphs -->
  <rect x="855" y="296" width="13" height="6" rx="2" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="855" y="301" width="28" height="19" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="855" y="343" width="13" height="6" rx="2" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="855" y="348" width="28" height="19" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>

  <line x1="1208" y1="309" x2="1252" y2="326" stroke="var(--green)" stroke-width="3.5"/>
  <line x1="1208" y1="351" x2="1252" y2="330" stroke="var(--green)" stroke-width="3.5"/>
  <line x1="1258" y1="328" x2="1300" y2="328" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="1292,320 1304,328 1292,336" stroke="var(--green)" stroke-width="3.5"/>
  <!-- after box (green = one home) -->
  <rect x="1305" y="298" width="252" height="62" rx="12" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>

  <!-- op 2 DELETE : chip -->
  <circle cx="722" cy="524" r="22" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>
  <!-- folder glyph for write-content/ -->
  <rect x="852" y="459" width="13" height="6" rx="2" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="852" y="464" width="28" height="19" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <!-- red strike-through over the orphan row -->
  <line x1="898" y1="561" x2="1078" y2="561" stroke="var(--red)" stroke-width="3"/>
  <!-- arrow to after -->
  <line x1="1210" y1="516" x2="1300" y2="516" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="1292,508 1304,516 1292,524" stroke="var(--green)" stroke-width="3.5"/>
  <!-- after box -->
  <rect x="1305" y="486" width="252" height="66" rx="12" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>

  <!-- op 3 DISAMBIGUATE : chip -->
  <circle cx="722" cy="742" r="22" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>
  <!-- folder glyph -->
  <rect x="852" y="663" width="13" height="6" rx="2" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="852" y="668" width="28" height="19" rx="3" stroke="var(--ink)" stroke-width="2.5" fill="var(--bg)"/>
  <!-- description snippet doc -->
  <rect x="850" y="694" width="432" height="120" rx="9" stroke="var(--ink)" stroke-width="3" fill="rgba(0,0,0,0.02)"/>
  <!-- the ADDED disambiguation line marker (green +) -->
  <line x1="868" y1="772" x2="882" y2="772" stroke="var(--green)" stroke-width="3.5"/>
  <line x1="875" y1="765" x2="875" y2="779" stroke="var(--green)" stroke-width="3.5"/>
  <!-- arrow to after -->
  <line x1="1288" y1="752" x2="1300" y2="752" stroke="var(--green)" stroke-width="3.5"/>
  <polyline points="1292,744 1304,752 1292,760" stroke="var(--green)" stroke-width="3.5"/>
  <!-- after box -->
  <rect x="1305" y="712" width="252" height="82" rx="12" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- claim-title + subtitle -->
<text x="800" y="74" font-size="52" font-weight="700" text-anchor="middle" fill="var(--ink)">The Fix &#8212; From Report to Repair</text>
<text x="800" y="118" font-size="26" text-anchor="middle" fill="var(--dim)">The audit only diagnosed. Now the upgrade step repairs the library &#8212; and it asks YOU before every change.</text>

<!-- report object text -->
<text x="345" y="203" font-size="19" font-weight="700" text-anchor="middle" fill="var(--ink)">AUDIT REPORT</text>
<text x="278" y="246" font-size="18" text-anchor="start" fill="var(--red)">HIGH &#183; duplicate</text>
<text x="278" y="277" font-size="18" text-anchor="start" fill="var(--red)">HIGH &#183; orphan</text>
<text x="278" y="308" font-size="18" text-anchor="start" fill="var(--red)">HIGH &#183; collision</text>

<!-- gate pill text -->
<text x="150" y="401" font-size="24" font-weight="700" text-anchor="start" fill="var(--ink)">OWNER-GATED</text>
<text x="150" y="433" font-size="21" text-anchor="start" fill="var(--dim)">asks YOU before every change</text>

<!-- robot labels -->
<text x="345" y="648" font-size="19" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI &#183; upgrade step</text>
<text x="345" y="674" font-size="19" text-anchor="middle" fill="var(--dim)">repairs the library</text>
<text x="472" y="580" font-size="18" font-weight="700" text-anchor="start" fill="var(--ink)">makes 3 repairs</text>

<!-- ===== OP 1 — MERGE ===== -->
<text x="722" y="330" font-size="24" font-weight="700" text-anchor="middle" fill="var(--green)">1</text>
<text x="722" y="368" font-size="18" font-weight="700" text-anchor="middle" fill="var(--green)">MERGE</text>
<text class="mono" x="895" y="317" font-size="24" text-anchor="start" fill="var(--ink)">write-hook/</text>
<text x="1095" y="317" font-size="18" text-anchor="start" fill="var(--red)">&#183; duplicate A</text>
<text class="mono" x="895" y="363" font-size="24" text-anchor="start" fill="var(--ink)">hook-writer/</text>
<text x="1095" y="363" font-size="18" text-anchor="start" fill="var(--red)">&#183; same trigger</text>
<text class="mono" x="1322" y="322" font-size="22" font-weight="700" text-anchor="start" fill="var(--green)">write-hook/</text>
<text x="1322" y="347" font-size="17" text-anchor="start" fill="var(--dim)">one home &#183; fires first time</text>

<!-- ===== OP 2 — DELETE ===== -->

<text x="722" y="570" font-size="18" font-weight="700" text-anchor="middle" fill="var(--green)">DELETE</text>
<text class="mono" x="892" y="480" font-size="23" text-anchor="start" fill="var(--ink)">write-content/</text>
<text class="mono" x="906" y="513" font-size="22" text-anchor="start" fill="var(--dim)">&#9492;&#9472;</text>
<text class="mono" x="946" y="513" font-size="22" font-weight="700" text-anchor="start" fill="var(--green)">workflows/</text>
<text class="mono" x="928" y="546" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;</text>
<text class="mono" x="968" y="546" font-size="22" text-anchor="start" fill="var(--ink)">newsletter.md</text>
<text class="mono" x="928" y="567" font-size="22" text-anchor="start" fill="var(--dim)">&#9492;&#9472;</text>
<text class="mono" x="968" y="567" font-size="22" text-anchor="start" fill="var(--red)">old-promo.md</text>
<text x="968" y="593" font-size="17" text-anchor="start" fill="var(--red)">orphan &#183; never routed from SKILL.md</text>
<text class="mono" x="1322" y="508" font-size="21" font-weight="700" text-anchor="start" fill="var(--green)">write-content/</text>
<text class="mono" x="1338" y="534" font-size="20" text-anchor="start" fill="var(--dim)">&#9492;&#9472; newsletter.md</text>
<text x="1322" y="576" font-size="17" font-weight="700" text-anchor="start" fill="var(--green)">orphan deleted</text>

<text x="722" y="750" font-size="24" font-weight="700" text-anchor="middle" fill="var(--green)">3</text>
<text x="722" y="788" font-size="16" font-weight="700" text-anchor="middle" fill="var(--green)">DISAMBIGUATE</text>

<!-- ===== one-line takeaway ===== -->
<text x="800" y="948" font-size="29" text-anchor="middle" fill="var(--ink)">The audit finds it. The upgrade step fixes it.</text>
<text x="800" y="990" font-size="31" font-weight="700" text-anchor="middle" fill="var(--green)">And nothing changes without your yes.</text>
</svg></body></html>
