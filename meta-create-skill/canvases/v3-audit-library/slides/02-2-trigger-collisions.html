<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(255,255,255); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(224,224,222)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- severity chip (HIGH = red) -->
  <rect x="1360" y="150" width="170" height="40" rx="20" fill="rgba(214,69,58,0.12)" stroke="var(--red)" stroke-width="2.5"/>
  <circle cx="1388" cy="170" r="6" fill="var(--red)" stroke="none"/>

  <!-- request pill: "humanize this" (ink = the phrase the user types) -->
  <rect x="670" y="205" width="260" height="48" rx="14" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>

  <!-- two DASHED RED arrows fanning to BOTH description cards (the collision) -->
  <line x1="745" y1="255" x2="415" y2="350" stroke="var(--red)" stroke-width="3" stroke-dasharray="9 8"/>
  <polyline points="401,336 415,353 431,345" stroke="var(--red)" stroke-width="3"/>
  <line x1="855" y1="255" x2="1185" y2="350" stroke="var(--red)" stroke-width="3" stroke-dasharray="9 8"/>
  <polyline points="1169,345 1185,353 1199,336" stroke="var(--red)" stroke-width="3"/>

  <!-- ============ LEFT description card: humanize/ ============ -->
  <rect x="180" y="360" width="460" height="260" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <!-- red highlight behind the shared phrase -->
  <rect x="225" y="532" width="240" height="30" rx="7" fill="rgba(214,69,58,0.12)" stroke="none"/>

  <!-- ============ RIGHT description card: writing-humanize/ ============ -->
  <rect x="960" y="360" width="460" height="260" rx="18" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <!-- red highlight behind the shared phrase ONLY (its 2nd phrase is fine) -->
  <rect x="1005" y="532" width="240" height="30" rx="7" fill="rgba(214,69,58,0.12)" stroke="none"/>

  <!-- ============ THE AI — canonical black-marker robot, HESITATING (echo slide 01) ============ -->
  <g stroke="var(--ink)" stroke-width="4">
    <line x1="800" y1="430" x2="800" y2="440"/>
    <rect x="764" y="440" width="72" height="48" rx="11"/>
    <rect x="778" y="453" width="44" height="22" rx="6" stroke-width="3"/>
    <line x1="800" y1="488" x2="800" y2="496"/>
    <rect x="768" y="496" width="64" height="54" rx="11"/>
    <line x1="768" y1="514" x2="746" y2="534"/>
    <line x1="832" y1="514" x2="852" y2="516"/>
  </g>
  <rect x="782" y="511" width="36" height="20" rx="4" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="800" cy="424" r="5" fill="var(--red)" stroke="var(--red)"/>
  <circle cx="792" cy="464" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="810" cy="464" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>

  <!-- ============ the audit's phrase map (a tiny table object) ============ -->
  <rect x="500" y="648" width="600" height="92" rx="12" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <line x1="515" y1="694" x2="1085" y2="694" stroke="var(--dim)" stroke-width="1.6"/>

  <!-- magnifier glyph for the detection strip -->
  <circle cx="660" cy="786" r="9" stroke="var(--dim)" stroke-width="3"/>
  <line x1="667" y1="793" x2="678" y2="804" stroke="var(--dim)" stroke-width="3"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker + claim-title + definition subtitle -->
<text x="80" y="54" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">SIGNAL 2 OF 8 &#183; ROUTING PROBLEMS</text>
<text x="800" y="102" font-size="50" font-weight="700" text-anchor="middle" fill="var(--ink)">Trigger Collisions</text>
<text x="800" y="140" font-size="26" text-anchor="middle" fill="var(--dim)">Two different skills claim the SAME trigger phrase &#8212; the AI can&#8217;t tell which to load.</text>

<!-- severity chip label -->
<text x="1408" y="177" font-size="21" font-weight="700" text-anchor="start" fill="var(--red)">HIGH</text>

<!-- request pill -->
<text x="800" y="192" font-size="18" text-anchor="middle" fill="var(--dim)">the user types:</text>
<text x="800" y="238" font-size="26" font-weight="700" text-anchor="middle" fill="var(--ink)">&#8220;humanize this&#8221;</text>

<!-- LEFT card: humanize/ -->
<text x="205" y="398" font-size="28" font-weight="700" text-anchor="start" fill="var(--ink)">humanize/</text>
<text class="mono" x="205" y="446" font-size="22" text-anchor="start" fill="var(--dim)">description:</text>
<text class="mono" x="205" y="482" font-size="22" text-anchor="start" fill="var(--ink)">&#8220;cleans messy text.</text>
<text class="mono" x="205" y="518" font-size="22" text-anchor="start" fill="var(--dim)">USE WHEN</text>
<text class="mono" x="245" y="554" font-size="22" font-weight="700" text-anchor="start" fill="var(--red)">&#8216;humanize this&#8217;&#8221;</text>

<!-- RIGHT card: writing-humanize/ -->
<text x="985" y="398" font-size="28" font-weight="700" text-anchor="start" fill="var(--ink)">writing-humanize/</text>
<text class="mono" x="985" y="446" font-size="22" text-anchor="start" fill="var(--dim)">description:</text>
<text class="mono" x="985" y="482" font-size="22" text-anchor="start" fill="var(--ink)">&#8220;scrubs AI tells + voice.</text>
<text class="mono" x="985" y="518" font-size="22" text-anchor="start" fill="var(--dim)">USE WHEN</text>
<text class="mono" x="1025" y="554" font-size="22" font-weight="700" text-anchor="start" fill="var(--red)">&#8216;humanize this&#8217;,</text>
<text class="mono" x="1025" y="590" font-size="22" text-anchor="start" fill="var(--ink)">&#8216;clean AI-isms&#8217;&#8221;</text>

<!-- robot label -->
<text x="800" y="470" font-size="44" font-weight="700" text-anchor="start" fill="var(--red)" dx="62">?</text>
<text x="800" y="592" font-size="18" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI &#183; can&#8217;t decide</text>

<!-- phrase-map table -->
<text x="530" y="682" font-size="19" font-weight="700" text-anchor="start" fill="var(--dim)">PHRASE</text>
<text x="1070" y="682" font-size="19" font-weight="700" text-anchor="end" fill="var(--dim)">CLAIMANTS</text>
<text x="530" y="726" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">&#8220;humanize this&#8221;</text>
<text x="1070" y="726" font-size="25" font-weight="700" text-anchor="end" fill="var(--red)">2 &#8594; collision</text>

<!-- HOW THE AUDIT SPOTS IT -->
<text x="690" y="792" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">HOW THE AUDIT SPOTS IT</text>
<text x="800" y="828" font-size="24" text-anchor="middle" fill="var(--dim)">Pull every USE-WHEN phrase, map phrase &#8594; who claims it. Any phrase with 2+ owners is a collision.</text>

<!-- takeaway -->
<text x="800" y="898" font-size="27" text-anchor="middle" fill="var(--ink)">Two owners means the AI picks one somewhat at random &#8212; sometimes the wrong skill fires.</text>
<text x="800" y="950" font-size="30" font-weight="700" text-anchor="middle" fill="var(--green)">The fix: a &#8220;Do NOT use when &#8594; sibling&#8221; line, so every phrase has exactly one owner.</text>
</svg></body></html>
