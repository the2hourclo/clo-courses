<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --amber:rgb(214,140,40); --blue:rgb(52,120,190); --purple:rgb(147,112,219);
  --red:rgb(214,69,58);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- ============ INPUT -> PROCESS spine arrow ============ -->
  <line x1="352" y1="360" x2="436" y2="360" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="426,353 438,360 426,367" stroke="var(--ink)" stroke-width="3"/>

  <!-- ============ THE AI — canonical black-marker robot, scanning the descriptions ============ -->
  <g transform="translate(354,-14)">
    <g stroke="var(--ink)" stroke-width="4">
      <line x1="160" y1="256" x2="160" y2="270"/>
      <rect x="118" y="270" width="84" height="60" rx="12"/>
      <rect x="132" y="286" width="56" height="28" rx="7"/>
      <line x1="160" y1="330" x2="160" y2="340"/>
      <rect x="124" y="340" width="72" height="72" rx="12"/>
      <line x1="124" y1="366" x2="96" y2="392"/>
      <line x1="142" y1="412" x2="136" y2="440"/>
      <line x1="178" y1="412" x2="184" y2="440"/>
      <polyline points="196,366 244,388 262,402" fill="none"/>
      <circle cx="278" cy="414" r="20" stroke-width="5"/>
      <line x1="264" y1="428" x2="253" y2="439" stroke-width="5"/>
    </g>
    <rect x="140" y="356" width="40" height="22" rx="4" stroke="var(--dim)" stroke-width="3"/>
    <circle cx="160" cy="250" r="6" fill="var(--green)" stroke="var(--green)"/>
    <circle cx="146" cy="300" r="6" fill="var(--green)" stroke="var(--green)"/>
    <circle cx="174" cy="300" r="6" fill="var(--green)" stroke="var(--green)"/>
    <!-- green pointer from the magnifier into the row it is reading -->
    <line x1="300" y1="414" x2="322" y2="414" stroke="var(--green)" stroke-width="4"/>
    <polyline points="314,408 324,414 314,420" stroke="var(--green)" stroke-width="4"/>
  </g>

  <!-- ============ DESCRIPTION FEED — the AI reading each skill's description ============ -->
  <rect x="680" y="298" width="332" height="244" rx="16" stroke="var(--ink)" stroke-width="3" fill="rgba(0,0,0,0.02)"/>
  <!-- neutral "currently scanning" band over the row the AI is reading -->
  <rect x="690" y="362" width="312" height="78" rx="9" stroke="var(--dim)" stroke-width="2" stroke-dasharray="5 6" fill="rgba(120,120,125,0.09)"/>

  <!-- ============ THE 8 SIGNALS — a small checklist object in the AI's other hand ============ -->
  <rect x="680" y="576" width="340" height="212" rx="16" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <!-- 8 tiny check ticks (dim) -->
  <polyline points="702,628 708,634 719,622" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="702,664 708,670 719,658" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="702,700 708,706 719,694" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="702,736 708,742 719,724" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="866,628 872,634 883,622" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="866,664 872,670 883,658" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="866,700 872,706 883,694" stroke="var(--dim)" stroke-width="3"/>
  <polyline points="866,736 872,742 883,724" stroke="var(--dim)" stroke-width="3"/>

  <!-- ============ PROCESS -> OUTPUT spine arrow ============ -->
  <line x1="1016" y1="430" x2="1054" y2="430" stroke="var(--ink)" stroke-width="3"/>
  <polyline points="1044,423 1056,430 1044,437" stroke="var(--ink)" stroke-width="3"/>

  <!-- ============ OUTPUT — the audit REPORT document ============ -->
  <rect x="1060" y="210" width="480" height="536" rx="14" stroke="var(--ink)" stroke-width="4" fill="rgba(0,0,0,0.015)"/>
  <!-- dog-ear top-left corner (a real file) -->
  <polyline points="1060,240 1090,210" stroke="var(--ink)" stroke-width="3"/>
  <!-- header divider -->
  <line x1="1082" y1="326" x2="1518" y2="326" stroke="var(--dim)" stroke-width="2.5"/>
  <!-- HIGH severity chips (red = problem) -->
  <rect x="1088" y="348" width="78" height="34" rx="8" stroke="var(--red)" stroke-width="3" fill="var(--red)"/>
  <rect x="1088" y="470" width="78" height="34" rx="8" stroke="var(--red)" stroke-width="3" fill="var(--red)"/>
  <rect x="1088" y="592" width="78" height="34" rx="8" stroke="var(--red)" stroke-width="3" fill="var(--red)"/>
  <!-- evidence chips (a quoted snippet lives in a faint box) -->
  <rect x="1088" y="416" width="430" height="34" rx="7" stroke="rgb(205,203,196)" stroke-width="2" fill="rgba(0,0,0,0.02)"/>
  <rect x="1088" y="538" width="430" height="34" rx="7" stroke="rgb(205,203,196)" stroke-width="2" fill="rgba(0,0,0,0.02)"/>
  <rect x="1088" y="660" width="430" height="34" rx="7" stroke="rgb(205,203,196)" stroke-width="2" fill="rgba(0,0,0,0.02)"/>
  <!-- row dividers -->
  <line x1="1082" y1="466" x2="1518" y2="466" stroke="rgb(220,218,210)" stroke-width="2"/>
  <line x1="1082" y1="588" x2="1518" y2="588" stroke="rgb(220,218,210)" stroke-width="2"/>

  <!-- ============ THE STAMP — diagnoses only, nothing is touched ============ -->
  <g transform="rotate(-5 1300 826)">
    <rect x="1152" y="778" width="296" height="96" rx="14" stroke="var(--ink)" stroke-width="4" fill="var(--bg)"/>
    <rect x="1162" y="788" width="276" height="76" rx="10" stroke="var(--green)" stroke-width="2.5"/>
  </g>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- claim-title + subtitle -->
<text x="800" y="62" font-size="48" font-weight="700" text-anchor="middle" fill="var(--ink)">How the Audit Runs &#8212; Diagnose, Don&#8217;t Fix</text>
<text x="800" y="102" font-size="26" text-anchor="middle" fill="var(--dim)">It reads every skill&#8217;s description, ranks what&#8217;s broken by severity &#8212; and edits nothing</text>

<!-- ===== stage headers (Input -> Process -> Output) ===== -->
<text x="212" y="172" font-size="24" font-weight="700" text-anchor="middle" fill="var(--dim)">INPUT</text>
<text x="212" y="198" font-size="18" text-anchor="middle" fill="var(--dim)">your skill library, handed in as-is</text>

<text x="746" y="172" font-size="24" font-weight="700" text-anchor="middle" fill="var(--ink)">PROCESS</text>
<text x="746" y="198" font-size="18" text-anchor="middle" fill="var(--dim)">the AI scans every description, row by row</text>

<text x="1300" y="172" font-size="24" font-weight="700" text-anchor="middle" fill="var(--ink)">OUTPUT</text>
<text x="1300" y="198" font-size="18" text-anchor="middle" fill="var(--dim)">an evidence report, ranked by severity</text>

<!-- ===== INPUT — the BEFORE tree, small + dim (slide 01 already taught it) ===== -->
<text class="mono" x="88" y="248" font-size="24" font-weight="700" text-anchor="start" fill="var(--dim)">skills/</text>
<text class="mono" x="112" y="282" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;&#9472; write-hook/</text>
<text class="mono" x="112" y="314" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;&#9472; hook-writer/</text>
<text class="mono" x="112" y="346" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;&#9472; write-content/</text>
<text class="mono" x="112" y="378" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;&#9472; humanize/</text>
<text class="mono" x="112" y="410" font-size="22" text-anchor="start" fill="var(--dim)">&#9500;&#9472;&#9472; writing-humanize/</text>
<text class="mono" x="112" y="442" font-size="22" text-anchor="start" fill="var(--dim)">&#9492;&#9472;&#9472; publish-posts/</text>
<text x="88" y="488" font-size="18" text-anchor="start" fill="var(--dim)">6 skills &#183; nothing cleaned up yet</text>
<text x="393" y="346" font-size="18" text-anchor="middle" fill="var(--dim)">reads</text>

<!-- ===== PROCESS — robot label ===== -->
<text x="518" y="452" font-size="22" font-weight="700" text-anchor="middle" fill="var(--ink)">THE AI</text>
<text x="518" y="478" font-size="18" text-anchor="middle" fill="var(--dim)">reads, never writes</text>

<!-- description feed -->
<text x="696" y="330" font-size="20" font-weight="700" text-anchor="start" fill="var(--ink)">each skill&#8217;s description</text>
<text class="mono" x="700" y="398" font-size="19" font-weight="700" text-anchor="start" fill="var(--ink)">write-hook</text>
<text class="mono" x="862" y="398" font-size="18" text-anchor="start" fill="var(--dim)">&#8220;write a hook&#8221;</text>
<text class="mono" x="700" y="430" font-size="19" font-weight="700" text-anchor="start" fill="var(--ink)">hook-writer</text>
<text class="mono" x="862" y="430" font-size="18" text-anchor="start" fill="var(--dim)">&#8220;write a hook&#8221;</text>
<text class="mono" x="700" y="480" font-size="19" font-weight="700" text-anchor="start" fill="var(--ink)">humanize</text>
<text class="mono" x="862" y="480" font-size="18" text-anchor="start" fill="var(--dim)">&#8220;humanize this&#8221;</text>
<text class="mono" x="700" y="518" font-size="19" font-weight="700" text-anchor="start" fill="var(--ink)">writing-humanize</text>
<text class="mono" x="892" y="518" font-size="18" text-anchor="start" fill="var(--dim)">&#8220;humanize this&#8221;</text>

<!-- the 8-signal checklist object -->
<text x="696" y="608" font-size="20" font-weight="700" text-anchor="start" fill="var(--ink)">the 8 signals it checks</text>
<text x="728" y="634" font-size="19" text-anchor="start" fill="var(--dim)">duplicates</text>
<text x="728" y="670" font-size="19" text-anchor="start" fill="var(--dim)">orphans</text>
<text x="728" y="706" font-size="19" text-anchor="start" fill="var(--dim)">collisions</text>
<text x="728" y="742" font-size="19" text-anchor="start" fill="var(--dim)">bloat</text>
<text x="892" y="634" font-size="19" text-anchor="start" fill="var(--dim)">delegation</text>
<text x="892" y="670" font-size="19" text-anchor="start" fill="var(--dim)">routing</text>
<text x="892" y="706" font-size="19" text-anchor="start" fill="var(--dim)">callouts</text>
<text x="892" y="742" font-size="19" text-anchor="start" fill="var(--dim)">sediment</text>

<!-- ===== OUTPUT — the report ===== -->
<text x="1090" y="256" font-size="27" font-weight="700" text-anchor="start" fill="var(--ink)">Skill Library Audit Report</text>
<text x="1090" y="288" font-size="18" text-anchor="start" fill="var(--dim)">6 skills scanned &#183; 2026&#8209;07&#8209;13</text>

<!-- finding 1 -->
<text x="1127" y="372" font-size="19" font-weight="700" text-anchor="middle" fill="var(--bg)">HIGH</text>

<!-- finding 2 -->
<text x="1127" y="494" font-size="19" font-weight="700" text-anchor="middle" fill="var(--bg)">HIGH</text>
<text x="1180" y="495" font-size="21" font-weight="700" text-anchor="start" fill="var(--ink)">humanize + writing-humanize</text>

<!-- finding 3 -->

<!-- ===== the stamp ===== -->

<!-- ===== one-line takeaway ===== -->
<text x="800" y="928" font-size="27" text-anchor="middle" fill="var(--ink)">The audit reads every description, quotes the evidence, and ranks it by severity.</text>
<text x="800" y="974" font-size="29" font-weight="700" text-anchor="middle" fill="var(--green)">It changes nothing &#8212; fixing is the next step, and only with your yes.</text>
</svg></body></html>
