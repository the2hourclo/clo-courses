<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(250,249,245); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --red:rgb(214,69,58); --amber:rgb(214,140,40);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>
<svg viewBox="0 0 1600 1050" width="1600" height="1050" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="rough" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(210,208,200)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

<!-- ===================== SHAPES (all inside #rough) — NO text ===================== -->
<g filter="url(#rough)" fill="none" stroke-linecap="round" stroke-linejoin="round">

  <!-- severity chip (MEDIUM = amber) -->
  <rect x="1360" y="150" width="170" height="40" rx="20" stroke="var(--amber)" stroke-width="3" fill="rgba(214,140,40,0.07)"/>

  <!-- ============ THE SKILL.md FILE VIEW — rules as riverbed STRATA ============ -->
  <!-- file tab + card -->
  <rect x="118" y="176" width="290" height="34" rx="10" stroke="var(--ink)" stroke-width="3" fill="var(--bg)"/>
  <rect x="100" y="210" width="680" height="635" rx="20" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>

  <!-- sediment shading bands (older = denser sediment; muddy tan, texture not accent) -->
  <rect x="112" y="502" width="656" height="70" rx="8" fill="rgba(150,130,95,0.05)" stroke="none"/>
  <rect x="112" y="594" width="656" height="70" rx="8" fill="rgba(150,130,95,0.09)" stroke="none"/>
  <rect x="112" y="686" width="656" height="72" rx="8" fill="rgba(150,130,95,0.14)" stroke="none"/>

  <!-- waterline: where the sediment begins (dim, dashed, gently wavy) -->
  <path d="M118,482 q40,-9 80,0 t80,0 t80,0 t80,0 t80,0 t80,0 t80,0" stroke="var(--dim)" stroke-width="2" stroke-dasharray="2 8"/>

  <!-- red flag bars on the 3 sediment rows (red = flagged problem) -->
  <line x1="126" y1="508" x2="126" y2="566" stroke="var(--red)" stroke-width="3"/>
  <line x1="126" y1="600" x2="126" y2="658" stroke="var(--red)" stroke-width="3"/>
  <line x1="126" y1="692" x2="126" y2="750" stroke="var(--red)" stroke-width="3"/>

  <!-- ============ THE 3 TEST QUESTIONS — checklist card ============ -->
  <rect x="900" y="224" width="580" height="300" rx="16" stroke="var(--ink)" stroke-width="2.5" fill="rgba(0,0,0,0.015)"/>
  <rect x="926" y="302" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="926" y="358" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>
  <rect x="926" y="414" width="26" height="26" rx="5" stroke="var(--ink)" stroke-width="2.5"/>

  <!-- ============ THE AI — canonical black-marker robot, holding the checklist ============ -->
  <g stroke="var(--ink)" stroke-width="4">
    <line x1="1190" y1="568" x2="1190" y2="580"/>
    <rect x="1154" y="580" width="72" height="48" rx="11"/>
    <rect x="1168" y="593" width="44" height="22" rx="6" stroke-width="3"/>
    <line x1="1190" y1="628" x2="1190" y2="636"/>
    <rect x="1158" y="636" width="64" height="54" rx="11"/>
    <line x1="1158" y1="652" x2="1076" y2="536"/>
    <line x1="1222" y1="652" x2="1304" y2="536"/>
  </g>
  <rect x="1172" y="651" width="36" height="20" rx="4" stroke="var(--dim)" stroke-width="3"/>
  <circle cx="1190" cy="562" r="5" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="1182" cy="604" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>
  <circle cx="1198" cy="604" r="4.2" fill="var(--ink)" stroke="var(--ink)"/>

  <!-- ============ OWNER-GATED pill (ink — echoes the fix slide; green check) ============ -->
  <rect x="900" y="756" width="580" height="76" rx="20" stroke="var(--ink)" stroke-width="3" fill="rgba(33,33,33,0.03)"/>
  <circle cx="958" cy="794" r="20" stroke="var(--green)" stroke-width="3.5" fill="rgba(45,140,60,0.06)"/>
  <polyline points="948,794 955,802 970,784" stroke="var(--green)" stroke-width="4"/>

  <!-- ============ magnifier glyph for HOW THE AUDIT SPOTS IT ============ -->
  <circle cx="308" cy="886" r="15" stroke="var(--ink)" stroke-width="3"/>
  <line x1="319" y1="897" x2="332" y2="910" stroke="var(--ink)" stroke-width="3"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- kicker -->
<text x="100" y="44" font-size="21" font-weight="700" text-anchor="start" fill="var(--dim)">SIGNAL 8 OF 8 &#183; SEDIMENT PASS</text>

<!-- severity chip label -->
<text x="1445" y="177" font-size="22" font-weight="700" text-anchor="middle" fill="var(--amber)">MEDIUM</text>

<!-- claim-title + definition subtitle -->
<text x="800" y="90" font-size="50" font-weight="700" text-anchor="middle" fill="var(--ink)">Stale Rules That Stopped Earning Their Place</text>
<text x="800" y="130" font-size="25" text-anchor="middle" fill="var(--dim)">Each rule made sense when it landed &#183; nobody re-checks &#183; every stale line taxes the attention your live rules need.</text>

<!-- file tab label -->
<text class="mono" x="263" y="199" font-size="21" font-weight="700" text-anchor="middle" fill="var(--ink)">write-content/SKILL.md</text>

<!-- file heading -->
<text x="135" y="250" font-size="24" text-anchor="start" fill="var(--dim)">##</text>
<text x="173" y="250" font-size="26" font-weight="700" text-anchor="start" fill="var(--ink)">Conventions</text>
<text x="135" y="282" font-size="18" text-anchor="start" fill="var(--dim)">newest on top &#183; oldest settles to the bottom</text>

<!-- ===== the rules, layered top (crisp/live) to bottom (dim/sediment) ===== -->
<!-- R1 live -->
<text class="mono" x="140" y="340" font-size="23" text-anchor="start" fill="var(--ink)">- lead with the perspective shift</text>
<text class="mono" x="762" y="340" font-size="17" text-anchor="end" fill="var(--dim)">2026-07</text>
<!-- R2 live -->
<text class="mono" x="140" y="392" font-size="23" text-anchor="start" fill="var(--ink)">- cap every list at 3 items</text>
<text class="mono" x="762" y="392" font-size="17" text-anchor="end" fill="var(--dim)">2026-06</text>
<!-- R3 aging -->
<text class="mono" x="140" y="444" font-size="23" text-anchor="start" fill="rgb(90,90,95)">- 2-3 concepts per sentence</text>
<text class="mono" x="762" y="444" font-size="17" text-anchor="end" fill="var(--dim)">2026-03</text>

<!-- waterline label -->
<text x="762" y="472" font-size="17" text-anchor="end" fill="var(--dim)">&#9660; sediment &#183; nobody re-checks below here</text>

<!-- R4 sediment -->
<text class="mono" x="140" y="528" font-size="23" text-anchor="start" fill="rgb(120,120,125)">- never use em-dashes in output</text>
<text class="mono" x="762" y="528" font-size="17" text-anchor="end" fill="var(--dim)">2025-11</text>
<text x="150" y="556" font-size="19" text-anchor="start" fill="var(--red)">superseded by the gate script &#183; now enforced twice</text>
<!-- R5 sediment -->
<text class="mono" x="140" y="620" font-size="23" text-anchor="start" fill="rgb(140,140,145)">- avoid the word &#8216;delve&#8217;</text>
<text class="mono" x="762" y="620" font-size="17" text-anchor="end" fill="var(--dim)">2025-08</text>
<text x="150" y="648" font-size="19" text-anchor="start" fill="var(--red)">origin nobody can reproduce &#183; a preference, not a rule</text>
<!-- R6 sediment -->
<text class="mono" x="140" y="712" font-size="23" text-anchor="start" fill="rgb(155,155,160)">- humanize before publishing</text>
<text class="mono" x="762" y="712" font-size="17" text-anchor="end" fill="var(--dim)">2025-06</text>
<text x="150" y="740" font-size="19" text-anchor="start" fill="var(--red)">duplicated in the humanize skill &#183; two homes, one rots</text>

<!-- ===== the 3 test questions ===== -->
<text x="924" y="270" font-size="20" font-weight="700" text-anchor="start" fill="var(--dim)">FOR EACH LONG-LIVED RULE, ASK 3 THINGS</text>
<text x="968" y="322" font-size="23" text-anchor="start" fill="var(--ink)">Is the origin still reproducible?</text>
<text x="968" y="378" font-size="23" text-anchor="start" fill="var(--ink)">Has a gate or hook taken over?</text>
<text x="968" y="434" font-size="23" text-anchor="start" fill="var(--ink)">Is it duplicated elsewhere?</text>
<text x="924" y="496" font-size="21" font-style="italic" text-anchor="start" fill="var(--dim)">fails all three &#8594; it&#8217;s sediment (stale)</text>

<!-- robot label -->
<text x="1190" y="720" font-size="20" font-weight="700" text-anchor="middle" fill="var(--dim)">THE AI &#183; runs the sediment pass</text>

<!-- owner-gated pill text -->
<text x="1000" y="792" font-size="25" font-weight="700" text-anchor="start" fill="var(--ink)">OWNER-GATED</text>
<text x="1000" y="820" font-size="21" text-anchor="start" fill="var(--dim)">never retired without your yes</text>

<!-- ===== HOW THE AUDIT SPOTS IT ===== -->
<text x="348" y="880" font-size="22" font-weight="700" text-anchor="start" fill="var(--ink)">HOW THE AUDIT SPOTS IT</text>
<text x="348" y="910" font-size="20" text-anchor="start" fill="var(--dim)">for every long-lived rule it asks the three questions &#183; a rule that fails all three is sediment</text>

<!-- ===== takeaway ===== -->
<text x="800" y="968" font-size="28" text-anchor="middle" fill="var(--ink)">Rules pile up like sediment &#183; the fix is never delete-on-sight.</text>
<text x="800" y="1010" font-size="30" font-weight="700" text-anchor="middle" fill="var(--green)">Retire, move, or merge them &#8212; and only ever with your yes.</text>
</svg></body></html>
