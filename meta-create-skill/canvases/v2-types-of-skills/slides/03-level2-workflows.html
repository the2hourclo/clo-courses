<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(255,255,255); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --amber:rgb(214,140,40); --blue:rgb(52,120,190); --purple:rgb(147,112,219);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>

</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

  <rect x="800" y="546" width="430" height="150" rx="18" stroke="var(--purple)" stroke-width="3.5" fill="rgba(147,112,219,0.05)"/>

  <line x1="818" y1="612" x2="1212" y2="612" stroke="var(--purple)" stroke-width="1.6"/>

  <rect x="1156" y="564" width="30" height="38" rx="4" stroke="var(--purple)" stroke-width="3" fill="var(--bg)"/>

  <path d="M1173,602 L1184,602" stroke="var(--purple)" stroke-width="2.2"/>

  <path d="M1232,281 C1256,300 1270,392 1286,414" stroke="var(--green)" stroke-width="3.5"/>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- eyebrow + claim-title + subtitle -->
<text x="800" y="50" font-size="23" font-weight="700" letter-spacing="1.5" text-anchor="middle" fill="var(--dim)">LEVEL 2 &#183; THE SKILL WITH WORKFLOWS</text>
<text x="800" y="98" font-size="44" font-weight="700" text-anchor="middle" fill="var(--ink)">One Job, Flowing Through All Four Folders</text>

<!-- ROW: workflows/ (green) -->

<text class="mono" x="490" y="460" font-size="26" font-weight="700" text-anchor="start" fill="var(--green)">workflows/</text>
