<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><style>
@font-face{font-family:'Excalifont';src:url('Excalifont-Regular.woff2') format('woff2');}
:root{
  --bg:rgb(255,255,255); --ink:rgb(33,33,33); --dim:rgb(120,120,125);
  --green:rgb(45,140,60); --blue:rgb(52,120,190);
  --sans:"Excalifont",Inter,system-ui,sans-serif;
  --mono:"Consolas","Cascadia Mono","DejaVu Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:1600px;height:1050px;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden;}
svg{display:block;} text{font-family:var(--sans);} .mono{font-family:var(--mono);}
</style></head><body>

<defs>

    <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="17" cy="17" r="1.2" fill="rgb(224,224,222)"/></pattern>
</defs>

<rect width="1600" height="1050" fill="var(--bg)"/>
<rect width="1600" height="1050" fill="url(#dots)" opacity="0.5"/>

  <rect x="332"  y="692" width="210" height="108" rx="16" stroke="var(--blue)" stroke-width="3" fill="rgba(52,120,190,0.05)"/>

  <rect x="1147" y="704" width="14" height="5"  rx="2" stroke="var(--blue)" stroke-width="2.5" fill="var(--bg)"/>
  <rect x="1147" y="709" width="30" height="18" rx="3" stroke="var(--blue)" stroke-width="2.5" fill="var(--bg)"/>

</g>

<!-- ===================== TEXT (all crisp, OUTSIDE #rough) ===================== -->

<!-- claim-title + subtitle -->
<text x="800" y="58" font-size="44" font-weight="700" text-anchor="middle" fill="var(--ink)">The Three Levels Compose &#8212; They Don&#8217;t Compete</text>
<text x="800" y="100" font-size="25" text-anchor="middle" fill="var(--dim)">Read the arrows, not the names &#8212; each routes IN to its own workflows, and reaches OUT to shared skills</text>

<!-- LEVEL 1 tags + orchestrator names -->
<text x="450"  y="166" font-size="16" text-anchor="middle" fill="var(--dim)">SKILL SYSTEM / ORCHESTRATOR &#183; wires the rest</text>
<text x="1150" y="166" font-size="16" text-anchor="middle" fill="var(--dim)">SKILL SYSTEM / ORCHESTRATOR &#183; wires the rest</text>
